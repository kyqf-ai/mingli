      });
  }

  function evaluatePatternAndStrength(ctx) {
    const { nodes, thermalState } = ctx;
    const dmWx = nodes.dG.currentWx, dmGan = nodes.dG.char;
    const isYinGan = ['乙', '丁', '己', '辛', '癸'].includes(dmGan);
    // V2.6：从格比率阈值（阴干0.30，阳干0.22）——此处与determineFullPattern保持一致
    const fromRatioThreshold = isYinGan ? 0.30 : 0.22;

    let allyScore = 0, enemyScore = 0, resScore = 0, selfScore = 0; 
    const dmRoots = getRootsData(nodes, dmWx);
    let hasRootLocal = dmRoots.mainCount > 0 || dmRoots.subCount > 0;
    ctx.dmRoots = dmRoots; // V2.8: expose for UI三才指标

    for(let key in nodes) {
      if(key === 'dG') continue; 
      let n = nodes[key];
      if(!n.isActive()) continue; 

      const weights = { mZ: n.hasState('重伤') ? 8 : (n.isTransformed && n.transformedWx !== n.originalWx) ? 28 : 28, dZ: 22, yZ: 16, hZ: 12 };
      let baseWeight = weights[key] || 12;

      let finalEnergy = baseWeight * n.energy;
      let role = getShiShenName(dmWx, n.effectiveWx);

      let rootBonus = 0, enemyRootBonus = 0, localSelf = 0, localRes = 0; 

      if (n.type === '支') {
        const hidden = DICT.HIDDEN[n.char] || [];
        if (!(n.isTransformed && n.transformedWx !== n.originalWx)) {
          const activeHidden = hidden.map((h, i) => ({ h, i, w: h ? (DICT.HIDDEN_WEIGHT[i] || 0.1) : 0 })).filter(x => x.h);
          const totalW = activeHidden.reduce((s, x) => s + x.w, 0) || 1;

          activeHidden.forEach(({ h, i, w }) => {
            let wx = DICT.WX[h];
            let subRole = getShiShenName(dmWx, wx);
            let subEnergy = finalEnergy * (w / totalW); 

            if (['比劫', '印星'].includes(subRole)) {
              rootBonus += subEnergy;
              if (subRole === '比劫') localSelf += subEnergy;
              if (subRole === '印星') localRes += subEnergy;
            } else {
              enemyRootBonus += subEnergy;
            }
          });
          finalEnergy = 0;
        }
      }

      if (role === '比劫') {
        localSelf += finalEnergy; allyScore += finalEnergy + rootBonus; enemyScore += enemyRootBonus; selfScore += localSelf; resScore += localRes;
      } else if (role === '印星') {
        localRes += finalEnergy; allyScore += finalEnergy + rootBonus; enemyScore += enemyRootBonus; selfScore += localSelf; resScore += localRes;
      } else {
        enemyScore += finalEnergy + enemyRootBonus;
        let dampening = 0.35;
        allyScore += rootBonus * dampening; selfScore += localSelf * dampening; resScore += localRes * dampening;
      }
    }

    // 修正点 #5：母慈灭子检测后强制身弱，不再被后续比率覆盖
    let forceWeakVerdict = false;
    if (!hasRootLocal && resScore > selfScore * 2.8 && selfScore < 20 && thermalState !== '寒冻') {
        let penalty = resScore * 0.3; 
        allyScore -= penalty; enemyScore += penalty * 0.5; 
        ctx.log('Stage 6.2 气机', `⚠️ 母慈灭子：印星（${resScore.toFixed(1)}）过旺，日主无根不受生，生扶反化为重压。`);
        hasRootLocal = false; 
        forceWeakVerdict = true;
    } else if (resScore > selfScore * 2.8) {
        ctx.log('Stage 6.2 气机', `💡 印星虽旺（${resScore.toFixed(1)}），但日主有强根（${selfScore.toFixed(1)}），论「身旺印旺」，免遭母多灭子之灾。`);
    }

    let ratio = allyScore / (enemyScore || 1);
    let verdict = '';

    const dayGanStates = nodes.dG.states.join('');
    const deLing = dayGanStates.includes('当旺') || dayGanStates.includes('得相');
    const deDi   = dmRoots.mainCount > 0;
    const deShi  = ratio > 1.0;
    ctx.log('Stage 6.2 三才',
      `得令：${deLing ? '✅' : '❌'}（日干[${nodes.dG.char}]在[${nodes.mZ.char}]月，${deLing ? '当旺/得相' : '休囚死绝'}）| ` +
      `得地：${deDi ? '✅' : '❌'}（月令/日支本气通根 ${dmRoots.mainCount > 0 ? '有' : '无'}）| ` +
      `得势：${deShi ? '✅' : '❌'}（同类比率 ${ratio.toFixed(2)}）`
    );
    
    if (forceWeakVerdict) {
        verdict = '身弱 (母慈灭子)';
    } else if (!hasRootLocal) {
        if (thermalState !== '常温') verdict = '身弱 (调候优先)';
        else if (ratio < fromRatioThreshold && !hasCloseSupport(nodes, dmWx)) verdict = isYinGan ? '真从格 (阴干易从)' : '真从格 (阳干无根失势)'; 
        else if (ratio < 0.48) verdict = '假从 / 极弱';
        else verdict = '身弱 (杀重身轻)';
    } else if (ratio > 3.8) {
        if (!hasStrongEnemy(nodes, dmWx)) verdict = '真专旺格 (纯粹无杂)';
        else verdict = '假专旺 / 极强';
    } else if (ratio > 1.45 || (ratio > 1.28 && deLing && deDi)) verdict = '身强 (可担财官)'; 
    else if (ratio < 0.70 || (ratio < 0.82 && !deLing && !deDi)) verdict = '身弱 (需印比生扶)'; 
    else verdict = '中和 (平衡流转)';

    ctx.log('Stage 6.3 坍缩', `势能比率: ${ratio.toFixed(2)} (同类${allyScore.toFixed(1)} vs 异类${enemyScore.toFixed(1)})。通根检测: ${hasRootLocal ? '有根' : '无根'}`);

    const patternResult = determineFullPattern(ctx, dmWx, allyScore, enemyScore, dmRoots, verdict);

    if (patternResult.pattern.includes('食') || patternResult.pattern.includes('伤')) {
      if (verdict.includes('身弱') && !verdict.includes('从') && hasTrueRoot(nodes, dmWx)) {
        let outTally = 0, resTally2 = 0;
        Object.values(nodes).forEach(nn => {
          if (!nn.isActive() || nn.isVoid) return;
          let r = getShiShenName(dmWx, nn.effectiveWx);
          if (r === '食伤') outTally += nn.energy;
          if (r === '印星') resTally2 += nn.energy;
        });
        
        if (ratio > 1 && resTally2 < outTally * 1.5) {
          verdict = '身旺 (食伤泄秀)';
          ctx.log('Stage 6.4 修正', `💡 格局修正：月令成食伤格，日主有真根且食伤未被印星压制，由「身弱」修正为「身旺(食伤泄秀)」，以流通秀气为重。`);
        } else if (ratio <= 0.28) {
          ctx.log('Stage 6.4 修正', `⚠️ 食伤格但比率极低（${ratio.toFixed(2)}），仍维持「身弱」判定（极弱局不可泄秀）。`);
        } else {
          ctx.log('Stage 6.4 修正', `⚠️ 食伤格但印星过强（${resTally2.toFixed(1)} > 食伤${outTally.toFixed(1)}×1.5），食伤受制，维持「身弱」不修正。`);
        }
      }
    }

    let finalPatternStr = `${patternResult.pattern} · ${patternResult.desc}`;
    
    // V2.2：次级特殊格局标注（杀印相生/食伤生财/伤官配印/财官双美）
    detectMinorSpecialPatterns(ctx, dmWx, nodes, patternResult, verdict);
    if (patternResult.minorFlag) {
      finalPatternStr += ` ▸ ${patternResult.minorFlag.replace(/·$/, '')}`;
    }

    const triGods = determineTriGodsSystem(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx);
    
    return { verdict, patternStr: finalPatternStr, triGods, ally: allyScore, enemy: enemyScore };
  }
  
  // ========== Part 3 开始（紧接 Part 2 末尾 evaluatePatternAndStrength 之后） ==========

  function determineFullPattern(ctx, dmWx, allyScore, enemyScore, dmRoots, verdict) {
    const { nodes } = ctx;
    const mZ = nodes.mZ;
    const dmGan = nodes.dG.char;
    const isYinGan = ['乙', '丁', '己', '辛', '癸'].includes(dmGan);
    const fromRatioThreshold = isYinGan ? 0.30 : 0.22;

    // ── V2.8 月令空亡警告：月令若空亡，格局失去根基 ──
    if (mZ.isVoid) {
      ctx.log('Stage 6.0 格局', `⚠️ 月令[${mZ.char}]落入空亡，格局失根！月令所代表之气大幅衰减，本命格局力量薄弱，须大运岁运冲实方可应验，以最近月令实支取格为参考。`);
      ctx.tag('tag-warn', `⭕ 月令空亡·格弱`);
    }

    // ──────────────────────────────────────────────────────────────────────
    // V2.0 修正（Bug#1）：删除"月干透出最高优先级"逻辑。
    // 子平真诠：格局以月令为本，月干本身无法独立成格。
    // 月干若透出月令之气，将在下方"月令藏干透出"段落自然命中（mG已包含在stems数组内），
    // 无需在此单独拦截——否则甲日子月（藏癸）若月干为庚，会被误判为"金格"。
    // ──────────────────────────────────────────────────────────────────────

    // V2.0 调整优先级顺序（古典）：化气格 > 专旺格/从格 > 月令透干 > 建禄/月刃 > 兜底
    // ── Fix Bug#3 V2.0：化气格移至最优先（古典：日干合化身份转变最先判定）──
    // ── V2.6 强化化气格验证条件 ──
    const huaMap0 = { '甲己':'土', '乙庚':'金', '丙辛':'水', '丁壬':'木', '戊癸':'火' };
    for (let neighbor0 of [nodes.mG, nodes.hG]) {
      if (!neighbor0 || !neighbor0.isActive() || neighbor0.isVoid) continue;
      const huaWx0 = huaMap0[dmGan + neighbor0.char] || huaMap0[neighbor0.char + dmGan];
      if (huaWx0 && nodes.mZ.effectiveWx === huaWx0) {
        // 化气格须：①月令得势 ②化神五行在全局占明显优势 ③合化双方未被他干争合
        // ── V2.6 新增验证 ④：日主地支无本气之根（化而不化则格不成立）──
        // ── V2.6 新增验证 ⑤：遥合（时干）须化神占比≥55%（近合月干≥45%）──
        // ── V2.6 新增验证 ⑥：克化神的忌神在全局占比不得超过12% ──
        const monthIsStrong = nodes.mZ.hasState('当旺') || nodes.mZ.hasState('得相');
        const { wxE, totalE } = getWxEnergyMap(nodes);
        const huaPct = totalE > 0 ? (wxE[huaWx0] || 0) / totalE : 0;

        // ④ 日主本气之根检测：若日支或其他地支以本气通根日主，则化气不纯
        const dmOriginalWx = DICT.WX[dmGan];
        const dmOriginalRoots = getRootsData(nodes, dmOriginalWx);
        const dmHasOriginalRoot = dmOriginalRoots.mainCount > 0; // 主气通根即不化

        // ⑤ 近合（月干）阈值45%，遥合（时干）须55%
        const isNearStem = (neighbor0.id === 'mG');
        const huaThreshold = isNearStem ? 0.45 : 0.55;

        // ⑥ 化神忌神（克化神之五行）检测
        const huaKe = { '土':'木', '金':'火', '水':'土', '木':'金', '火':'水' };
        const jiWxForHua = huaKe[huaWx0]; // 克化神之五行
        const jiPct = totalE > 0 ? (wxE[jiWxForHua] || 0) / totalE : 0;

        // 检测争合：邻干中是否还有其他天干与日主或neighbor0合
        const otherStems = [nodes.yG, nodes.mG, nodes.hG].filter(s => s.id !== neighbor0.id && s.id !== 'dG');
        const rivalForDM = otherStems.some(s => huaMap0[dmGan + s.char] || huaMap0[s.char + dmGan]);
        const rivalForNeighbor = otherStems.some(s => DICT.HE_GAN[neighbor0.char] === s.char);

        const stemLabel = isNearStem ? '月干（近合）' : '时干（遥合）';
        if (!monthIsStrong) {
          ctx.log('Stage 6.0 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但月令气弱不得势，化气格不成立，降为普通格局。`);
        } else if (huaPct < huaThreshold) {
          ctx.log('Stage 6.0 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但化神全局占比仅${Math.round(huaPct*100)}%（须≥${Math.round(huaThreshold*100)}%），化气不纯，格局不成立。`);
        } else if (dmHasOriginalRoot) {
          ctx.log('Stage 6.0 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但日主在地支有本气[${dmOriginalWx}]主气通根，本性未泯，化气格不成立。`);
        } else if (jiPct > 0.12) {
          ctx.log('Stage 6.0 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但克化神之[${jiWxForHua}]占比${Math.round(jiPct*100)}%（须≤12%），化气受制，格局不成立。`);
        } else if (rivalForDM || rivalForNeighbor) {
          ctx.log('Stage 6.0 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但存在争合，化气格不成立。`);
        } else {
          ctx.log('Stage 6.0 格局', `✅ 化气格成立（最高优先）：日干[${dmGan}]与${stemLabel}[${neighbor0.char}]合化${huaWx0}，月令得势，化神占比${Math.round(huaPct*100)}%≥${Math.round(huaThreshold*100)}%，日主无本气通根，忌神[${jiWxForHua}]占比${Math.round(jiPct*100)}%≤12%，无争合。`);
          ctx.log('Stage 6.9 复核', `🔍 二次验证[${huaWx0}化气格]：①月令得势✅ ②化神占比${Math.round(huaPct*100)}%✅ ③日主无本气通根✅ ④忌神不超标✅ ⑤无争合✅ → 格局确立。`);
          return { pattern: `${huaWx0}化气格`, type: 'special', desc: `日干与${neighbor0.label}合化${huaWx0}成功（${stemLabel}）` };
        }
      }
    }

    // ── V2.2 两气成象格（双清格） ── 优先于专旺格，避免误判木火通明为曲直格
    const twoElemResult = checkTwoElementPattern(ctx, nodes);
    if (twoElemResult) {
      ctx.log('Stage 6.0 格局', `✅ 两气成象格成立（${twoElemResult.name}）：${twoElemResult.desc}`);
      ctx.log('Stage 6.9 复核', `🔍 二次验证[${twoElemResult.pattern}]：两气合计≥90%，各气≥20%，克神阈值通过，格局纯正。`);
      ctx.tag('tag-combo', `🌟 ${twoElemResult.pattern}`);
      return twoElemResult;
    }

    // ── V2.2 三气流通格 ──
    const threeFlowResult = checkThreeFlowPattern(ctx, nodes);
    if (threeFlowResult) {
      ctx.log('Stage 6.0 格局', `✅ 三气流通格成立：${threeFlowResult.desc}`);
      ctx.log('Stage 6.9 复核', `🔍 二次验证[${threeFlowResult.pattern}]：链条总占比≥92%+月令在链+各气≥12%，断链检测通过，三气确实流通顺畅。`);
      ctx.tag('tag-combo', `🌊 ${threeFlowResult.pattern}`);
      return threeFlowResult;
    }

    // ── V2.4 神煞格局（魁罡/日贵/专禄/归禄）──
    const shenshaPattern = checkShenShaPatterns(ctx, nodes);
    if (shenshaPattern) {
      ctx.log('Stage 6.9 复核', `🔍 二次验证[${shenshaPattern.pattern}]：神煞格局以日柱固定组合为基础，已在Stage 6.0完成冲破/官杀/财星等破格条件检测，格局有效。`);
      return shenshaPattern;
    }

    if (allyScore / (enemyScore || 1) > 3.8 && !hasStrongEnemy(nodes, dmWx)) {
      const wxName = {'木':'曲直格','火':'炎上格','土':'稼穑格','金':'从革格','水':'润下格'};
      // 专旺格：日主五行须就是那个极旺的五行（日主同气方为"专旺"，否则仍论从格）
      // ── V2.6 新增双重验证 ──
      // ① 月令须支持该五行（日主在月令为当旺、得相，或月令主气/化气为该五行）
      // ② 该五行须有多地支通根（主气通根≥2 或 主气≥1+余气≥2）
      if (wxName[dmWx]) {
        const dmInMonthStrong = nodes.dG.hasState('当旺') || nodes.dG.hasState('得相');
        const mZMainWx = DICT.WX[(DICT.HIDDEN[nodes.mZ.char]||[])[0] || nodes.mZ.char];
        const monthSupportsDm = dmInMonthStrong || (nodes.mZ.effectiveWx === dmWx) || (mZMainWx === dmWx);

        const rootsForDm = getRootsData(nodes, dmWx);
        const hasMultiRoots = rootsForDm.mainCount >= 2 || (rootsForDm.mainCount >= 1 && rootsForDm.subCount >= 1);

        if (!monthSupportsDm) {
          ctx.log('Stage 6.0 格局', `⚠️ 全局${dmWx}气旺（比率${(allyScore/(enemyScore||1)).toFixed(2)}），但日主[${dmGan}]在月令[${nodes.mZ.char}]不得势（非当旺/得相），专旺格存疑，降为极强身旺格局处理。`);
          // 不return，继续往下走正格逻辑
        } else if (!hasMultiRoots) {
          ctx.log('Stage 6.0 格局', `⚠️ 全局${dmWx}气旺，日主得令，但地支通根不足（主气根${rootsForDm.mainCount}个，余气根${rootsForDm.subCount}个），专旺格不够纯粹，降为普通格局。`);
        } else {
          ctx.log('Stage 6.0 格局', `✅ 专旺格成立：全局${dmWx}气专旺，日主[${dmGan}]与旺气同性，月令得势，地支有${rootsForDm.mainCount}个主气根，入${wxName[dmWx]}，顺势而行。`);
          ctx.log('Stage 6.9 复核', `🔍 二次验证[${wxName[dmWx]}]：①旺衰比${(allyScore/(enemyScore||1)).toFixed(2)}>3.8✅ ②无强异类✅ ③月令得势✅ ④多地支通根(主气根${rootsForDm.mainCount})✅ → 专旺格确立。`);
          return { pattern: wxName[dmWx], type: 'special', desc: `全局${dmWx}气专旺，月令得势，顺其势而行` };
        }
      }
    }

    const ratio = allyScore / (enemyScore || 1);
    const noRoot = dmRoots.mainCount === 0 && dmRoots.subCount === 0;
    // ── V2.6 从格条件细化 ──
    // ① 阳干极难从（须比率≤0.22），阴干稍易（须≤0.30）——《子平真诠》阳干有担当不轻易从
    // ② 月令主气须为所从之气（月令权重4倍，决定从的方向）
    // ③ 日主周围（月干/时干）无贴身生扶才可从
    // fromRatioThreshold 已在函数头部定义
    if (ratio < fromRatioThreshold && noRoot && !hasCloseSupport(nodes, dmWx)) {
      const counts = { '官杀':0, '财星':0, '食伤':0 };
      ['yG','mG','hG','yZ','mZ','dZ','hZ'].forEach(k => {
        const n = nodes[k];
        const role = getShiShenName(dmWx, n.effectiveWx);
        if (n.isActive() && counts.hasOwnProperty(role)) {
          // 月令权重提升至4，地支1.5，天干1
          const w = (k === 'mZ') ? 4 : (n.type === '支' ? 1.5 : 1);
          counts[role] += w;
        }
      });

      // 月令主气对应角色优先作为从的对象
      const mZMainHidden = (DICT.HIDDEN[nodes.mZ.char]||[])[0];
      const mZMainWx = mZMainHidden ? DICT.WX[mZMainHidden] : nodes.mZ.effectiveWx;
      const mZMainRole = getShiShenName(dmWx, mZMainWx);
      let maxRole;
      if (counts.hasOwnProperty(mZMainRole) && counts[mZMainRole] > 0) {
        // 月令主气有效参与，优先从月令决定之角色
        maxRole = mZMainRole;
        ctx.log('Stage 6.0 格局', `📌 月令[${nodes.mZ.char}]主气为${mZMainRole}（${mZMainWx}），从格以月令主导，从${maxRole}。`);
      } else {
        maxRole = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        ctx.log('Stage 6.0 格局', `📌 月令非所从之气，取权重最大角色：从${maxRole}（权重${counts[maxRole].toFixed(1)}）。`);
      }

      // V2.6 二次验证：从格月令须含被从五行之气（月令若为生日主之气，则不成真从）
      const monthHelpsAlly = (nodes.mZ.effectiveWx === dmWx) || 
                              (DICT.WX[(DICT.HIDDEN[nodes.mZ.char]||[])[0]] === dmWx);
      if (monthHelpsAlly && !verdict?.includes('假从')) {
        ctx.log('Stage 6.0 格局', `⚠️ 日主虽无根且比率低（${ratio.toFixed(2)}），但月令[${nodes.mZ.char}]主气为日主同类，月令护身，从格不成立，论假从/极弱。`);
        const isFakeCong = true;
        const patLabel = `偏从${maxRole}格`;
        return { pattern: patLabel, type: 'special', desc: `日主无根但月令护身，势近从格而不成真从（假从）` };
      }

      const isFakeCong = verdict && verdict.includes('假从');
      const patLabel = isFakeCong ? `偏从${maxRole}格` : `从${maxRole}格`;
      ctx.log('Stage 6.0 格局', `${isFakeCong ? '⚠️ 偏从格（假从）' : '✅ 从格成立'}：日主无根（比率${ratio.toFixed(2)}，${isYinGan?'阴干':'阳干'}阈值${fromRatioThreshold}），弃命从${maxRole}，入${patLabel}。`);
      if (!isFakeCong) {
        ctx.log('Stage 6.9 复核', `🔍 二次验证[${patLabel}]：①无根✅ ②比率${ratio.toFixed(2)}<${fromRatioThreshold}✅ ③无贴身生扶✅ ④月令不护身✅ → 从格确立。`);
      }
      return { pattern: patLabel, type: 'special', desc: `日主无根，${isFakeCong ? '势近从格但根气尚存（假从）' : '从于旺势'}` };
    }

    // ── V2.2 半壁格（两神相持格）── 在从格之后检测，两神大体均衡交战
    const halfWallResult = checkHalfWallPattern(ctx, nodes);
    if (halfWallResult) {
      ctx.log('Stage 6.0 格局', `⚔️ 半壁格成立：${halfWallResult.desc}`);
      ctx.tag('tag-warn', `⚔️ ${halfWallResult.name}`);
      return halfWallResult;
    }

    const effectiveMonthWx = mZ.isTransformed ? mZ.transformedWx : DICT.WX[(DICT.HIDDEN[mZ.char]||[])[0] || mZ.char];
    if (effectiveMonthWx === dmWx) {
      // ── V2.6 建禄/月刃格：月令被冲破则格局减弱，但仍以日主同气论（《子平真诠》：月令仍是基础）──
      const mZIsBroken = nodes.mZ.hasState('重伤') || (nodes.mZ.hasState('受冲') && nodes.mZ.energy < 0.35);
      const phaseInMonth = (DICT.QI_PHASE[dmGan] || {})[mZ.char];
      const patternName = phaseInMonth === '帝旺' ? '月刃格' : '建禄格';
      let dynamicDesc;
      if (mZIsBroken) {
        dynamicDesc = `${patternName}月令被冲破，格局力量减弱，以${allyScore < enemyScore ? '印比生扶' : '月令余气'}论，须大运补救`;
        ctx.log('Stage 6.0 格局', `⚠️ 月令与日主同气，理应入${patternName}，但月令[${mZ.char}]被冲破（重伤/受冲），格局有损。${dynamicDesc}`);
      } else {
        dynamicDesc = allyScore < enemyScore ? '比肩/刃秉令，但全局克泄交加，反喜印比生扶' : (patternName === '建禄格' ? '比肩秉令，身强喜财官' : '羊刃当权，喜七杀制刃');
        ctx.log('Stage 6.0 格局', `✅ 月令与日主同气，入${patternName}。${dynamicDesc}`);
      }
      return { pattern: mZIsBroken ? `${patternName}（月令受损）` : patternName, type: 'misc', desc: dynamicDesc };
    }

    /* 月令藏干透出成格（《子平真诠》：以先透者为先，两干俱透则取旺者） */
    const hidden = DICT.HIDDEN[mZ.char];
    const stems = [nodes.yG, nodes.mG, nodes.hG];
    // V2.6：收集所有透出藏干，按藏干顺序（本气→中气→余气）优先，同顺序取能量更旺者
    const matchedStems = hidden.map((h, hi) => {
      if (!h) return null;
      const s = stems.find(st => st.char === h && st.isActive() && !st.isVoid);
      return s ? { stem: s, hiddenIdx: hi, h } : null;
    }).filter(Boolean);

    if (matchedStems.length > 0) {
      // 取本气优先；同藏干顺序下取透出多者（多透则以先透/本气为准）
      const best = matchedStems.reduce((a, b) => {
        if (a.hiddenIdx !== b.hiddenIdx) return a.hiddenIdx < b.hiddenIdx ? a : b;
        return a.stem.energy >= b.stem.energy ? a : b;
      });
      const role = getShiShenName(dmWx, DICT.WX[best.h]);
      const purityNote = matchedStems.length > 1
        ? `（月令有${matchedStems.length}干透出，取${best.hiddenIdx === 0 ? '本气' : best.hiddenIdx === 1 ? '中气' : '余气'}[${best.h}]为主格）`
        : '';
      ctx.log('Stage 6.0 格局', `✅ 正格成立：月令[${mZ.char}]藏干[${best.h}]透出天干，成${role}格。${purityNote}`);
      return { pattern: `${role}格`, type: 'standard', desc: `月令透出${best.h}${purityNote}，成${role}格` };
    }

    if (mZ.isTransformed && mZ.transformedWx !== mZ.originalWx) {
      const role = getShiShenName(dmWx, mZ.transformedWx);
      ctx.log('Stage 6.0 格局', `✅ 正格成立：月令合化${mZ.transformedWx}，以${role}为格。`);
      return { pattern: `${role}格`, type: 'standard', desc: `月令合化，以${role}为格` };
    }

    const mainRole = getShiShenName(dmWx, effectiveMonthWx);
    ctx.log('Stage 6.0 格局', `✅ 正格：月令本气${effectiveMonthWx}取${mainRole}格，藏干未透，格局力量稍弱。`);
    return { pattern: `${mainRole}格`, type: 'standard', desc: `月令本气为${mainRole}，未透` };
  }

  /* =====================================================================
     V2.0 喜用神量化评分系统（保持 V1.9 核心，调整专旺/从格用神）
     ===================================================================== */

  const TIAOHUO = {
    '子': { '火': 85, '木': 35, '土': 10,  '金':-20, '水':-45 },
    '丑': { '火': 70, '木': 25, '土':  5,  '金':-15, '水':-35 },
    '寅': { '火': 15, '金': 25, '水': 15,  '木':-20, '土':  5 },
    '卯': { '火': 15, '金': 35, '水': 15,  '木':-30, '土':  5 },
    '辰': { '水': 20, '金': 15, '火': 10,  '木':-10, '土':-30 },
    '巳': { '水': 80, '金': 35, '木': 15,  '土':-25, '火':-55 },
    '午': { '水': 90, '金': 35, '木': 15,  '土':-35, '火':-65 },
    '未': { '水': 65, '金': 25, '木': 10,  '土':-50, '火':-40 },
    '申': { '火': 25, '木': 25, '水': 15,  '金':-30, '土':  5 },
    '酉': { '火': 25, '木': 30, '水': 15,  '金':-35, '土':  5 },
    '戌': { '水': 25, '火': 15, '木': 15,  '金':-20, '土':-35 },
    '亥': { '火': 80, '木': 35, '土': 10,  '金':-25, '水':-50 }
  };

  const PAT_ROLE = {
    // 《子平真诠》：官格喜印，印能化官生身；官格忌食伤（制官）、忌比劫（助身恃强）
    '官杀格': { '印星': 85, '财星': 45, '食伤':-30, '比劫':-30, '官杀': 60 },
    // 七杀格：食神制杀最贵，印星化杀次之；财生杀为喜（有财则杀有来源）
    '七杀格': { '印星': 72, '食伤': 55, '财星': 38, '比劫':-25, '官杀': 55 },
    // 财格：食伤生财最美；官杀护财有功；比劫争财最忌；印克食伤不利生财
    '财格':   { '食伤': 85, '官杀': 60, '比劫':-80, '印星':-40, '财星':  8 },
    // 食神格：财星顺食生财最贵；官杀为忌（食神格若见印，印克食神破格）
    '食神格': { '财星': 88, '比劫': 22, '官杀':-35, '印星':-58, '食伤': 72 },
    // 伤官格：无官杀则喜财（伤官生财）；有官杀须印护（伤官见官须印化）
    '伤官格': { '财星': 78, '印星': 58, '比劫': 18, '官杀':-42, '食伤': 68 },
    // 印格：官杀生印最美；比劫分印次之；财破印最忌（财克印星）
    '印格':   { '官杀': 72, '比劫': 28, '食伤':-22, '财星':-70, '印星':  8 },
    // 建禄格：月令比劫秉令，以财官食伤流通为贵；忌再助比劫，印比之乡更嫌
    '建禄格': { '官杀': 72, '财星': 65, '食伤': 42, '印星':-38, '比劫':-35 },
    // 月刃格：刃利须官杀制，方见威权；财官同现最美；比劫助刃最忌
    '月刃格': { '官杀': 88, '财星': 52, '食伤': 28, '印星':-48, '比劫':-70 }
  };

  function getPatRoleScore(patName, role) {
    if (!patName) return 0;
    let key = '';
    if (patName.includes('月刃')) key = '月刃格';
    else if (patName.includes('建禄')) key = '建禄格';
    else if (patName.includes('七杀')) key = '七杀格';
    else if (patName.includes('伤官')) key = '伤官格';
    else if (patName.includes('食神') || patName.includes('食')) key = '食神格';
    else if (patName.includes('正官') || patName.includes('官')) key = '官杀格';
    else if (patName.includes('财')) key = '财格';
    else if (patName.includes('印')) key = '印格';
    return (PAT_ROLE[key] && PAT_ROLE[key][role] !== undefined) ? PAT_ROLE[key][role] : 0;
  }

  function computeWuXingScores(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx) {
    const WXS = ['木','火','土','金','水'];
    const ratio = allyScore / (enemyScore || 1);
    const monthZhi = nodes.mZ.char;
    const patName  = patternResult?.pattern || '';

    const isQiang = verdict.includes('身强') || verdict.includes('旺') || verdict.includes('极强');
    const isRuo   = verdict.includes('身弱') || verdict.includes('极弱') || verdict.includes('假从');

    let wxE = { '木':0,'火':0,'土':0,'金':0,'水':0 }, totalE = 0;
    Object.values(nodes).forEach(n => {
      if (!n.isActive()) return;
      let w = 1.0;
      if (n.id === 'dG') w = 1.5;
      else if (n.type === '支') w = (n.id === 'mZ') ? 2.5 : 1.5;
      if (n.isVoid) w *= 0.2;
      wxE[n.effectiveWx] += n.energy * w;
      totalE += n.energy * w;
    });

    const results = {};

    WXS.forEach(wx => {
      const role   = getShiShenName(dmWx, wx);
      const wxPct  = totalE > 0 ? wxE[wx] / totalE : 0.2;

      let D1 = 50;
      const strength = isQiang ? Math.min((ratio - 1.0) / 2.5, 1.0) : 0;
      const weakness = isRuo   ? Math.min((1.0 / Math.max(ratio, 0.05) - 1) / 2.5, 1.0) : 0;

      let patternAdjusted = false;
      if ((patName.includes('食神') || patName.includes('伤官') || patName.includes('食伤')) && isQiang) {
        if (role === '食伤') {
          D1 = 72 + strength * 26;
          patternAdjusted = true;
        } else if (role === '官杀') {
          D1 = 32;
          patternAdjusted = true;
        }
      }

      if (!patternAdjusted) {
        if (isQiang) {
          if      (role === '官杀') D1 = 60 + strength * 36;
          else if (role === '食伤') D1 = 52 + strength * 30;
          else if (role === '财星') D1 = 42 + strength * 18;
          else if (role === '比劫') D1 = Math.max(0, 28 - strength * 48);
          else if (role === '印星') D1 = Math.max(0, 18 - strength * 38);
        } else if (isRuo) {
          if      (role === '印星') D1 = 60 + weakness * 36;
          else if (role === '比劫') D1 = 52 + weakness * 30;
          else if (role === '食伤') D1 = Math.max(0, 30 - weakness * 38);
          else if (role === '财星') D1 = Math.max(0, 22 - weakness * 38);
          else if (role === '官杀') D1 = Math.max(0, 25 - weakness * 45);
        } else {
          if      (role === '官杀') D1 = 58;
          else if (role === '食伤') D1 = 55;
          else if (role === '财星') D1 = 52;
          else if (role === '印星') D1 = 46;
          else if (role === '比劫') D1 = 42;
        }
      }
      D1 = Math.max(0, Math.min(100, D1));

      if (isRuo && role === '官杀') {
        let offE = 0, resE = 0;
        Object.values(nodes).forEach(n => {
          if (!n.isActive() || n.isVoid) return;
          const r = getShiShenName(dmWx, n.effectiveWx);
          const w = n.type === '支' ? 1.5 : 1.0;
          if (r === '官杀') offE += n.energy * w;
          if (r === '印星') resE += n.energy * w;
        });
        if (offE > resE * 1.8) D1 = Math.max(0, D1 - 30);
      }

      const rawD2 = getPatRoleScore(patName, role);
      const D2 = Math.max(0, Math.min(100, (rawD2 + 100) / 2));

      const tiaoRaw = (TIAOHUO[monthZhi] || {})[wx] ?? 0;
      // ── V2.6 调候评分细化：极寒极热月令调候影响更大，温和季节影响较小 ──
      // 极端月（巳午亥子）：0.6倍增幅；次极端月（辰戌丑未·三伏三九）：0.4倍；温和月：0.3倍
      const tiaoExtreme = ['巳','午','亥','子'].includes(monthZhi);
      const tiaoMild    = ['寅','卯','申','酉'].includes(monthZhi);
      const tiaoMult    = tiaoExtreme ? 0.60 : tiaoMild ? 0.30 : 0.45;
      const D3 = Math.max(0, Math.min(100, 50 + tiaoRaw * tiaoMult));

      let D4;
      if      (wxPct === 0)   D4 = 92;
      else if (wxPct < 0.07)  D4 = 75;
      else if (wxPct < 0.14)  D4 = 58;
      else if (wxPct < 0.24)  D4 = 40;
      else if (wxPct < 0.36)  D4 = 22;
      else                     D4 =  8;

      if ((patName.includes('食神') || patName.includes('伤官') || patName.includes('食伤')) && role === '官杀') {
        D4 = Math.max(0, D4 - 42);
      }

      const TONG_GUAN = { '金木':'水','木金':'水','水火':'木','火水':'木','木土':'火','土木':'火','土水':'金','水土':'金','火金':'土','金火':'土' };
      let D5 = 50;
      Object.entries(TONG_GUAN).forEach(([pair, mediator]) => {
        if (wx !== mediator) return;
        const eA = wxE[pair[0]] || 0, eB = wxE[pair[1]] || 0;
        if (eA > 0 && eB > 0) {
          const conflictPct = Math.min(eA, eB) / (totalE || 1);
          if (conflictPct > 0.07) D5 = Math.min(100, D5 + Math.round(conflictPct * 380));
        }
      });
      WXS.forEach(other => {
        if (other === wx || !DICT.SHISHEN[wx]) return;
        if (DICT.SHISHEN[wx].off === other && (wxE[other] || 0) / (totalE || 1) > 0.30) {
          D5 = Math.max(0, D5 - 15);
        }
      });
      D5 = Math.max(0, Math.min(100, D5));

      // ── V2.6 五维权重：旺衰(40%)+格局(25%)+调候(15%)+补缺(10%)+流通(10%) ──
      // 提升旺衰和格局权重（理论核心），降低补缺和流通权重（辅助维度）
      const total = D1*0.40 + D2*0.25 + D3*0.15 + D4*0.10 + D5*0.10;
      results[wx] = { total, D1:Math.round(D1), D2:Math.round(D2), D3:Math.round(D3), D4:Math.round(D4), D5:Math.round(D5), role };
    });

    // ── 通关熔断机制（V2.1新增，对应《滴天髓》"两神交战"）──
    // 若两种五行各占全局能量 > 28% 且互为克制，强制提升中介五行得分以反映"和事佬"地位
    const FUSE_PAIRS = [['金','木','水'],['木','土','火'],['土','水','金'],['水','火','木'],['火','金','土']];
    FUSE_PAIRS.forEach(([a, b, m]) => {
      const pctA = (wxE[a]||0) / (totalE||1), pctB = (wxE[b]||0) / (totalE||1);
      if (pctA > 0.28 && pctB > 0.28) {
        const severity = Math.min(pctA, pctB); // 越接近均势，越需通关
        results[m].total = Math.min(100, results[m].total * 1.5 + severity * 60);
        results[m].fusing = `${a}${b}交战`;
      }
    });

    return results;
  }

  function determineTriGodsSystem(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx) {
    let gods = { yongShen: [], xiShen: [], jiShen: [], xianShen: [] };
    const { thermalState } = ctx;
    const S = DICT.SHISHEN[dmWx];
    const wrap = (arr) => [...new Set(arr)].filter(Boolean).map(wx => ({ wx, role: getShiShenName(dmWx, wx) }));

    // ── V2.2 两气成象格用神 ──
    if (patternResult?.type === 'special_two') {
      const pr = patternResult;
      // 用神：两气本身（以较弱者为用，较强者为喜，起平衡）
      const { wxE, totalE } = getWxEnergyMap(nodes);
      const eA = wxE[pr.wx1] || 0, eB = wxE[pr.wx2] || 0;
      const yong = eA < eB ? pr.wx1 : pr.wx2;
      const xi   = eA < eB ? pr.wx2 : pr.wx1;
      gods.yongShen = wrap([yong]);
      gods.xiShen   = wrap([xi]);
      gods.jiShen   = wrap(pr.jiWx);
      gods.xianShen = wrap([]);
      ctx.log('Stage 7.0 喜用', `🌟 两气成象格（${pr.name}）：${pr.note}。两气中较弱者[${yong}]补充为用神，较强者[${xi}]为喜，忌神[${pr.jiWx.join('')}]破局。`);
      return gods;
    }

    // ── V2.2 三气流通格用神 ──
    if (patternResult?.type === 'special_three') {
      const pr = patternResult;
      // 用神：枢纽五行（流通链中段），喜链条两端，忌克链条之神
      gods.yongShen = wrap([pr.pivot]);
      gods.xiShen   = wrap(pr.chain.filter(wx => wx !== pr.pivot));
      gods.jiShen   = wrap(pr.ji);
      gods.xianShen = wrap([]);
      ctx.log('Stage 7.0 喜用', `🌊 三气流通格（${pr.chain.join('→')}）：枢纽[${pr.pivot}]为用神，链条两端[${pr.chain.filter(w=>w!==pr.pivot).join('')}]为喜，忌[${pr.ji.join('')}]冲克链条。`);
      return gods;
    }

    // ── V2.2 半壁格用神 ──
    if (patternResult?.type === 'special_half') {
      const pr = patternResult;
      // 用神：通关五行；喜势弱一方（补弱求平衡）；忌助强方及破通关之神
      gods.yongShen = wrap([pr.mediator]);
      gods.xiShen   = wrap([pr.weaker]);
      gods.jiShen   = wrap([pr.stronger, ...pr.ji]);
      gods.xianShen = wrap([]);
      ctx.log('Stage 7.0 喜用',
        `⚔️ 半壁格（${pr.name}）：[${pr.wxA}]vs[${pr.wxB}]势均力敌（比值${pr.ratio?.toFixed(2)||'?'}），` +
        `首用通关[${pr.mediator}]调和，略补弱方[${pr.weaker}]求平；` +
        `忌助强方[${pr.stronger}]及破通关[${pr.ji.join('')}]。`);
      return gods;
    }

    // ── V2.4 神煞格局用神 ──
    if (patternResult?.type === 'special_shensha') {
      const pr = patternResult;
      const sub = pr.sub;

      if (sub === 'kuigang') {
        // 魁罡格：喜官杀制衡（使刚烈有用武之地），忌财（财破魁罡最凶），忌印（印抑威权之气）
        // 比劫助旺魁罡，食伤泄秀均可作喜
        gods.yongShen = wrap([S.off]);
        gods.xiShen   = wrap([dmWx, S.out]);
        gods.jiShen   = wrap([S.wea, S.res]);
        gods.xianShen = wrap([]);
        ctx.log('Stage 7.0 喜用',
          `🗡️ 魁罡格[${pr.dayPillar}]用神：官杀[${S.off}]制魁罡之烈为用神；` +
          `比劫[${dmWx}]助旺、食伤[${S.out}]顺泄为喜；` +
          `财[${S.wea}]破格最凶、印[${S.res}]压制威权均为忌。`);
        return gods;
      }

      if (sub === 'riguì') {
        // 日贵格：贵气清纯，喜贵人星继续扶助，喜印绶护身；忌冲克日支之神、忌官杀七杀
        gods.yongShen = wrap([S.res]);        // 印绶护贵
        gods.xiShen   = wrap([dmWx, S.out]); // 比劫助旺，食伤顺流泄秀
        gods.jiShen   = wrap([S.off]);        // 七杀冲克贵气
        gods.xianShen = wrap([S.wea]);
        ctx.log('Stage 7.0 喜用',
          `⭐ 日贵格[${pr.dayPillar}]用神：印星[${S.res}]护贵为用神；` +
          `比劫[${dmWx}]助旺、食伤[${S.out}]泄秀为喜；` +
          `官杀[${S.off}]冲克贵气为忌；财星[${S.wea}]为闲。`);
        return gods;
      }

      if (sub === 'zhuanlu' || sub === 'guilu') {
        // 专禄/归禄格：禄格身强，食神最贵（禄食相配），财星顺流；忌官杀攻禄，忌冲合禄位
        const pLabel = sub === 'zhuanlu' ? '专禄' : '归禄';
        gods.yongShen = wrap([S.out]);         // 食伤泄秀（食神最贵）
        gods.xiShen   = wrap([S.wea]);         // 财星顺流
        gods.jiShen   = wrap([S.off]);         // 官杀攻禄为忌
        gods.xianShen = wrap([S.res, dmWx]);   // 印比闲神（已根深无需再扶）
        ctx.log('Stage 7.0 喜用',
          `🌿 ${pLabel}格[${pr.dGan}禄在${pr.luZhi}]用神：食伤[${S.out}]泄秀顺流为用（禄食相配最贵）；` +
          `财星[${S.wea}]顺食伤之秀为喜；官杀[${S.off}]攻禄为忌；印比[${S.res}·${dmWx}]为闲。`);
        return gods;
      }
    }

    if (thermalState === '寒冻') {
      // ── V2.6 调候守卫：若命局已形成从格/专旺格/化气格，调候仍以格局为主，不强制反向 ──
      const isSpecialPattern = patternResult?.type === 'special' || patternResult?.type === 'special_shensha';
      if (isSpecialPattern) {
        ctx.log('Stage 7.0 喜用', `❄️ 调候寒冻检出，但命局已成[${patternResult.pattern}]，格局优先于调候，从格局用神逻辑处理。`);
        // 不return，继续走后续格局逻辑（已在前面返回了special类型）
      } else {
        const rx = ctx.tiaohuoRx || { yong:'火', xi:'木', ji:['水','金'], desc:'寒冻以火暖局为先' };
        ctx.log('Stage 7.0 喜用', `❄️ 调候优先（穷通宝鉴）：${rx.desc}`);
        gods.yongShen = [{ wx: rx.yong, role: '调候用神' }];
        gods.xiShen   = [{ wx: rx.xi,   role: '调候喜神' }];
        gods.jiShen   = rx.ji.map(w => ({ wx: w, role: '调候忌神' }));
        gods.xianShen = [];
        return gods;
      }
    }
    if (thermalState === '酷热') {
      // ── V2.6 调候守卫：同上 ──
      const isSpecialPattern = patternResult?.type === 'special' || patternResult?.type === 'special_shensha';
      if (isSpecialPattern) {
        ctx.log('Stage 7.0 喜用', `🔥 调候酷热检出，但命局已成[${patternResult.pattern}]，格局优先，从格局用神逻辑处理。`);
      } else {
        const rx = ctx.tiaohuoRx || { yong:'水', xi:'金', ji:['火','土'], desc:'酷热以水润局为先' };
        ctx.log('Stage 7.0 喜用', `🔥 调候优先（穷通宝鉴）：${rx.desc}`);
        gods.yongShen = [{ wx: rx.yong, role: '调候用神' }];
        gods.xiShen   = [{ wx: rx.xi,   role: '调候喜神' }];
        gods.jiShen   = rx.ji.map(w => ({ wx: w, role: '调候忌神' }));
        gods.xianShen = [];
        return gods;
      }
    }
    if (ctx.logs.some(l => l.msg.includes('母慈灭子'))) {
      ctx.log('Stage 7.0 喜用', `⚠️ 母慈灭子格局：印旺为重病，首取财星（${S.wea}）破印救身为用；比劫（${dmWx}）分担印星生扶之力为喜；官杀（${S.off}）生印助纣为虐，必为大忌。`);
      gods.yongShen = wrap([S.wea]);           // 用神：财星（破印）
      gods.xiShen   = wrap([dmWx, S.out]);     // 喜神：比劫（分担印力）、食伤（生财，但需防受克）
      gods.jiShen   = wrap([S.res, S.off]);    // 忌神：印星（病灶本原）、官杀（生助病灶）
      gods.xianShen = wrap([]);
      return gods;
    }
	// 1. 子旺母衰 (食伤泄尽)
    if (ctx.logs.some(l => l.msg.includes('被抽干'))) {
      ctx.log('Stage 7.0 喜用', `⚠️ 子旺母衰格局：食伤极旺抽干日主，首取印星（${S.res}）制食救身为用；比劫虽能帮身但易被食伤化泄，仅作闲神；财（${S.wea}）官（${S.off}）皆为大忌。`);
      gods.yongShen = wrap([S.res]);        // 用神：印星
      gods.xiShen   = wrap([]);             
      gods.jiShen   = wrap([S.out, S.wea, S.off]); // 忌神：食伤、财、官
      gods.xianShen = wrap([dmWx]);         // 闲神：比劫
      return gods;
    }

    // 2. 财多身弱 / 反克 (被反噬)
    if (ctx.logs.some(l => l.msg.includes('被反噬'))) {
      ctx.log('Stage 7.0 喜用', `⚠️ 财重压身格局：财星极旺反克日主，首取比劫（${dmWx}）帮身分财为用；印星（${S.res}）虽能生身但需防财星破印，作喜神；官杀（${S.off}）、食伤（${S.out}）皆为忌。`);
      gods.yongShen = wrap([dmWx]);         // 用神：比劫
      gods.xiShen   = wrap([S.res]);        // 喜神：印星
      gods.jiShen   = wrap([S.wea, S.off, S.out]); // 忌神：财、官、食伤
      gods.xianShen = wrap([]);
      return gods;
    }

    // 3. 衰神激旺 (犯旺)
    if (ctx.logs.some(l => l.msg.includes('衰神激旺'))) {
      ctx.log('Stage 7.0 喜用', `🌋 犯旺格局：极旺之神被微弱衰神激怒，不可逆其锋芒，唯有食伤（${S.out}）顺流泄秀为用；财星（${S.wea}）化解为喜；官杀（${S.off}）惹祸为绝忌。`);
      gods.yongShen = wrap([S.out]);        // 用神：食伤顺势
      gods.xiShen   = wrap([S.wea]);        // 喜神：财星
      gods.jiShen   = wrap([S.off, S.res]); // 忌神：激怒它的官杀、堵塞流通的印星
      gods.xianShen = wrap([dmWx]);
      return gods;
    }
    if (patternResult?.type === 'special' && patternResult.pattern.includes('化气格')) {
      const huaWx = patternResult.pattern.charAt(0);
      const HS = DICT.SHISHEN[huaWx];
      if (HS) {
        ctx.log('Stage 7.0 喜用', `🔄 化气格[${huaWx}化]：化神（${huaWx}）为用，生化神者（${HS.res}）为喜；克化神（${HS.off}）、耗化神（${HS.wea}）为忌；化神食伤（${HS.out}）为闲。`);
        gods.yongShen = wrap([huaWx]);
        gods.xiShen   = wrap([HS.res]);
        gods.jiShen   = wrap([HS.off, HS.wea]);
        gods.xianShen = wrap([HS.out]);
      }
      return gods;
    }
    if (verdict.includes('专旺格')) {
      // 修正 #3：专旺格食伤由闲神改为喜神（顺局泄秀）
      ctx.log('Stage 7.0 喜用', `⭐ 专旺格（${patternResult.pattern}）：旺神（${dmWx}）顺势为用；印星（${S.res}）生旺为喜；食伤（${S.out}）顺流泄秀亦为喜；官杀（${S.off}）、财星（${S.wea}）破格为大忌。`);
      gods.yongShen = wrap([dmWx]);
      gods.xiShen   = wrap([S.res, S.out]); // 食伤加入喜神
      gods.jiShen   = wrap([S.off, S.wea]);
      gods.xianShen = wrap([]);
      return gods;
    }
    if (verdict.includes('从格') || (patternResult?.type === 'special' && patternResult.pattern.startsWith('从'))) {
      const patName = patternResult?.pattern || '';
      let logDesc = '';
      if (patName.includes('从财')) {
        logDesc = `从财格：财星（${S.wea}）为用神，食伤（${S.out}）生财为喜；印星（${S.res}）克财、比劫（${dmWx}）争财为忌；官杀（${S.off}）护财为闲。`;
        gods.yongShen = wrap([S.wea]); gods.xiShen = wrap([S.out]); gods.jiShen = wrap([S.res, dmWx]); gods.xianShen = wrap([S.off]);
      } else if (patName.includes('从食') || patName.includes('从伤')) {
        // 修正 #4：从食伤格忌神仅印星，比劫生食伤非忌
        logDesc = `从食伤格：食伤（${S.out}）为用神，财星（${S.wea}）顺食伤之秀为喜，比劫生食伤亦为喜；印星（${S.res}）克制食伤为大忌；官杀（${S.off}）制身助食伤为闲。`;
        gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea, dmWx]); gods.jiShen = wrap([S.res]); gods.xianShen = wrap([S.off]);
      } else {
        // 从官杀格：官杀为用，财生官为喜；食伤制官为大忌；比劫助身反从为忌；
        // V2.6：印星化官为闲（化官后官虽减弱，但印生身亦有害从局，列为次忌）
        logDesc = `从官杀格：官杀（${S.off}）为用神，财星（${S.wea}）生官为喜；食伤（${S.out}）制官为大忌，比劫（${dmWx}）助身反从为忌；印星（${S.res}）化官生身，不利从局，列为次忌。`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.out, dmWx, S.res]); gods.xianShen = wrap([]);
      }
      ctx.log('Stage 7.0 喜用', logDesc);
      return gods;
    }

    // V2.6 五维评分系统（普通格局）
    ctx.log('Stage 7.0 喜用', `📊 V2.6 五维评分系统启动：旺衰(40%)+格局(25%)+调候(15%)+补缺(10%)+流通(10%)`);

    const scores = computeWuXingScores(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx);

    // 熔断日志
    const fusingItems = Object.entries(scores).filter(([,s]) => s.fusing);
    if (fusingItems.length > 0) {
      fusingItems.forEach(([wx, s]) => {
        ctx.log('Stage 7.0 熔断', `⚡ 两神交战熔断：[${s.fusing}]，通关五行[${wx}]强制跃升为首要用神候选。`);
      });
      ctx.tag('tag-info', `⚡ 通关熔断`);
    }

    const sorted = Object.entries(scores).sort((a, b) => b[1].total - a[1].total);

    // ── V2.5 次级特殊格局用神微调（须在分配 gods 之前完成排序调整）──
    const mf = patternResult?.minorFlag || '';
    if (mf.includes('伤官配印')) {
      // 伤官配印：印星强制提升为用神候选（排到第一位）
      const resWx = S.res;
      const resIdx = sorted.findIndex(([wx]) => wx === resWx);
      if (resIdx > 0) {
        const resEntry = sorted.splice(resIdx, 1)[0];
        sorted.unshift(resEntry);
        ctx.log('Stage 7.1 微调', `🔶 伤官配印微调：印星[${resWx}]强制提升为首选用神（调整后重新分配）。`);
      }
    }
    if (mf.includes('财官双美')) {
      ctx.log('Stage 7.1 微调', `👑 财官双美：财[${S.wea}]官[${S.off}]相生，评分自然靠前，请以用神/喜神参考。`);
    }

    const topScore    = sorted[0][1].total;
    const bottomScore = sorted[4][1].total;
    const midpoint    = (topScore + bottomScore) / 2;

    sorted.forEach(([wx, s], idx) => {
      const label = `${s.role}·${s.total.toFixed(0)}分`;
      const item  = { wx, role: label };
      if (idx === 0) {
        gods.yongShen.push(item);
      } else if (s.total >= midpoint + 5) {
        gods.xiShen.push(item);
      } else if (s.total <= midpoint - 5) {
        gods.jiShen.push(item);
      } else {
        gods.xianShen.push(item);
      }
    });

    const scoreLog = sorted.map(([wx, s]) =>
      `【${wx}${s.total.toFixed(0)}分${s.fusing ? '🔥' : ''}】旺衰${s.D1}·格局${s.D2}·调候${s.D3}·补缺${s.D4}·流通${s.D5}`
    ).join('  ');
    ctx.log('Stage 7.1 明细', scoreLog);

    ctx.log('Stage 7.2 结论',
      `用神:${gods.yongShen.map(g=>g.wx).join('')}  喜神:${gods.xiShen.map(g=>g.wx).join('') || '无'}  ` +
      `忌神:${gods.jiShen.map(g=>g.wx).join('') || '无'}  闲神:${gods.xianShen.map(g=>g.wx).join('') || '无'}`
    );

    return gods;
  }

  function renderUI(ctx, diag) {
    document.getElementById('outputArea').style.display = 'block';
    const baziPlain = `${ctx.nodes.yG.char}${ctx.nodes.yZ.char} ${ctx.nodes.mG.char}${ctx.nodes.mZ.char} ${ctx.nodes.dG.char}${ctx.nodes.dZ.char} ${ctx.nodes.hG.char}${ctx.nodes.hZ.char}`;
    
    const grid = document.getElementById('nodeGrid');
    grid.innerHTML = '';
    const layout = [ {g: ctx.nodes.yG, z: ctx.nodes.yZ, t: '年柱'}, {g: ctx.nodes.mG, z: ctx.nodes.mZ, t: '月柱'}, {g: ctx.nodes.dG, z: ctx.nodes.dZ, t: '日柱'}, {g: ctx.nodes.hG, z: ctx.nodes.hZ, t: '时柱'} ];
    
    layout.forEach(col => {
      let colDiv = document.createElement('div');
      colDiv.className = 'pillar-col';
      colDiv.innerHTML = `<div class="pillar-header">${col.t}</div><div class="pillar-nayin">${col.g.naYin || '——'}</div>`;
      
      [col.g, col.z].forEach(n => {
        let isDm = n.id === 'dG' ? 'dm' : ''; let isVoid = n.isVoid ? 'is-void' : '';
        let exactGod = n.id === 'dG' ? '日主' : getExactShiShenName(ctx.nodes.dG.char, n.char, n.effectiveWx);
        
        let badgesHtml = n.states.map(s => {
          let c = 'status-normal';
          if (['被反噬','被抽干','蚍蜉撼树','冰冻无用'].some(k => s.includes(k))) c = 'status-fatal';
          else if (['争妒合','从化','化冲'].some(k => s.includes(k))) c = 'status-damping';
          else if (['旺','相','根','生','气','枢纽','主','被激怒','中神'].some(k => s.includes(k))) c = 'status-buff';
          else if (['冲','重伤','死','囚','截','泄','受克','压','空亡','寒木','熔融','刑','害'].some(k => s.includes(k))) c = 'status-nerf';
          else if (['合','会','绊','化'].some(k => s.includes(k))) c = 'status-transform';
          return `<span class="status-badge ${c}">${s}</span>`;
        }).join('');
        
        let phaseHtml = n.qiPhase ? `<div class="node-phase">${n.qiPhase}</div>` : '';
        let shenshaHtml = n.shenshas.length > 0 ? `<div class="node-shensha">${n.shenshas.map(sh => {
          const cls = ctx._shenshaClassMap?.[sh] || 'sh-default';
          return `<span class="shensha-badge ${cls}">${sh}</span>`;
        }).join('')}</div>` : '';

        let hiddenStemsHtml = '';
        if (n.type === '支') {
            let hiddenArr = DICT.HIDDEN[n.char] || [];
            if (hiddenArr.length > 0) {
                let hiddenBadges = hiddenArr.map(h => {
                    if (!h) return '';
                    let hWx = DICT.WX[h];
                    let hGod = getExactShiShenName(ctx.nodes.dG.char, h, hWx);
                    return `<span class="hidden-stem-badge" title="藏干: ${h} (${hWx})">${h}·${hGod}</span>`;
                }).join('');
                hiddenStemsHtml = `<div class="node-hidden-stems">${hiddenBadges}</div>`;
            }
        }

        colDiv.innerHTML += `<div class="node-card ${isDm} ${isVoid}" title="能量: ${n.energy.toFixed(2)} | 原五行: ${n.originalWx} | 当前: ${n.effectiveWx}">
            ${phaseHtml} <div class="node-char">${n.char}</div> <div class="node-wx wx-${n.effectiveWx}">${n.effectiveWx} · ${exactGod}</div>
            <div class="node-status">${badgesHtml}</div> 
            ${hiddenStemsHtml}
            ${shenshaHtml} </div>`;
      });
      grid.appendChild(colDiv);
    });

    // ── V2.4 神煞总览面板 ──
    const shenshaPanel = document.getElementById('shenshaPanel');
    const shenshaConfig = [
      { key:'天乙贵人', cls:'si-tianyi',   icon:'⭐', note:'逢凶化吉，贵人相助，出行有贵扶持' },
      { key:'文昌',     cls:'si-wenchang', icon:'📚', note:'聪慧好学，文采出众，利学业考试' },
      { key:'禄神',     cls:'si-lu',       icon:'🌿', note:'禄位临支，身根稳固，衣食丰足' },
      { key:'将星',     cls:'si-jiang',    icon:'🏆', note:'领导权威，统帅之才，利官场仕途' },
      { key:'驿马',     cls:'si-yima',     icon:'🐎', note:'流动迁移，奔波四方，利行商外出' },
      { key:'羊刃',     cls:'si-yangren',  icon:'⚔️', note:'锋芒毕露，刚烈好胜，需制衡为吉' },
      { key:'桃花',     cls:'si-taohua',   icon:'🌸', note:'人缘出众，风情浪漫，异性缘旺' },
      { key:'华盖',     cls:'si-huagai',   icon:'🎭', note:'孤高清雅，艺术才华，宜宗教玄学' },
    ];
    const allZhis = ctx._shenshaNodes || [];
    let shenshaItems = [];
    shenshaConfig.forEach(cfg => {
      const found = allZhis.filter(z => z.shenshas.includes(cfg.key));
      if (found.length === 0) return;
      const locStr = found.map(z => `${z.label}·${z.char}`).join('、');
      shenshaItems.push(
        `<div class="shensha-item ${cfg.cls}">
          <span class="shensha-item-name">${cfg.icon} ${cfg.key}</span>
          <span class="shensha-item-loc">${locStr}</span>
         </div>`
      );
    });
    if (shenshaItems.length > 0) {
      shenshaPanel.style.display = 'block';
      shenshaPanel.innerHTML =
        `<div class="shensha-panel-title">🌟 神煞总览 <span style="font-size:0.8rem;font-weight:600;color:#5e7a63;">（悬停查看含义）</span></div>` +
        `<div class="shensha-grid">${shenshaItems.join('')}</div>`;
    } else {
      shenshaPanel.style.display = 'none';
    }

    const mainDash = document.getElementById('mainDashboard');

    // ── V2.8 计算五行占比供UI使用 ──
    const wxColors = { '木':'#2b8a3e','火':'#e03131','土':'#e67700','金':'#868e96','水':'#1c7ed6' };
    let wxEui = {'木':0,'火':0,'土':0,'金':0,'水':0}, totalEui = 0;
    Object.values(ctx.nodes).forEach(n => {
      if (!n.isActive()) return;
      let w = n.type==='支' ? (n.id==='mZ'?2.5:1.5) : 1.0;
      if (n.isVoid) w *= 0.2;
      wxEui[n.effectiveWx] += n.energy * w; totalEui += n.energy * w;
    });
    const wxPcts = {};
    ['木','火','土','金','水'].forEach(wx => { wxPcts[wx] = totalEui > 0 ? Math.round(wxEui[wx]/totalEui*100) : 0; });

    // ── V2.8 三才指标（得令/得地/得势）──
    const dmStates = ctx.nodes.dG.states.join('');
    const sc_deLing = dmStates.includes('当旺') || dmStates.includes('得相');
    const sc_deDi   = ctx.dmRoots ? (ctx.dmRoots.mainCount > 0) : false;
    const sc_deShi  = diag.ally > diag.enemy;
    const sancaiHtml = `
      <div class="sancai-row">
        <div class="sancai-badge ${sc_deLing ? 'sancai-yes':'sancai-no'}">
          ${sc_deLing ? '✅':'❌'} 得令<span class="sancai-sub">${ctx.nodes.mZ.char}月</span>
        </div>
        <div class="sancai-badge ${sc_deDi ? 'sancai-yes':'sancai-no'}">
          ${sc_deDi ? '✅':'❌'} 得地<span class="sancai-sub">地支通根</span>
        </div>
        <div class="sancai-badge ${sc_deShi ? 'sancai-yes':'sancai-no'}">
          ${sc_deShi ? '✅':'❌'} 得势<span class="sancai-sub">同类占优</span>
        </div>
      </div>`;

    // ── V2.8 五行分布条形图 ──
    const wxOrder = ['木','火','土','金','水'];
    const barSegs = wxOrder.map(wx => {
      const pct = wxPcts[wx];
      if (pct < 1) return '';
      return `<div class="wuxing-bar-seg wxseg-${wx}" style="width:${pct}%">${pct>=8 ? wx+' '+pct+'%' : pct>=4 ? pct+'%' : ''}</div>`;
    }).join('');
    const legendItems = wxOrder.map(wx => `
      <span class="wx-legend-item">
        <span class="wx-legend-dot" style="background:${wxColors[wx]}"></span>${wx} ${wxPcts[wx]}%
      </span>`).join('');
    const wuxingBarHtml = `
      <div class="wuxing-bar">${barSegs}</div>
      <div class="wuxing-legend">${legendItems}</div>`;

    // ── V2.8 格局分层显示（名称 + 说明分离）──
    const patParts = diag.patternStr.split(' · ');
    const patName  = patParts[0] || diag.patternStr;
    const patRest  = patParts.slice(1).join(' · ');
    // 提取次级格局标注（▸ 后面部分）
    const patMinorMatch = patRest.match(/▸\s*(.+)$/);
    const patDescClean  = patRest.replace(/▸.*$/, '').trim();
    const patMinorStr   = patMinorMatch ? patMinorMatch[1] : '';

    mainDash.innerHTML = `
      <div class="panel-left">
        <div class="panel-title">⚖️ 旺衰定局</div>
        <div class="ratio-bar">
          <div class="ratio-ally" id="barAlly">同类生扶</div>
          <div class="ratio-enemy" id="barEnemy">异类克耗</div>
        </div>
        ${sancaiHtml}
        <div class="result-huge" id="finalVerdict">${diag.verdict}</div>
        ${wuxingBarHtml}
        <div class="report-box" style="margin-top:12px;">
          <h4>🏛️ 格局</h4>
          <div class="pattern-name">${patName}</div>
          ${patDescClean ? `<div class="pattern-desc">${patDescClean}</div>` : ''}
          ${patMinorStr  ? `<div class="pattern-minor">▸ ${patMinorStr}</div>` : ''}
        </div>
        <div class="report-box" style="margin-top:10px;">
          <h4>🎯 喜用神速览</h4>
          <div class="gods-matrix" id="godsMatrix"></div>
        </div>
        <div style="margin-top: 16px; padding-top: 14px; border-top: 1px solid #dee2e6;">
            <h4 style="font-size:0.82rem;font-weight:800;color:var(--accent);margin-bottom:8px;">📝 命主八字</h4>
            <input type="text" id="baziPlainText" readonly style="width:100%; background: #f8f9fa; font-family: 'Courier New', monospace; font-size: 1.15rem; text-align: center; letter-spacing: 3px; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; color: #204d32; font-weight: 700;" value="${baziPlain}">
        </div>
      </div>
      <div class="panel-right">
        <div class="panel-title">📋 完整推演审计（可逐条复核）</div>
        <div class="system-tags" id="systemTags"></div>
        <ul class="log-list" id="auditLogs"></ul>
      </div>
    `;

    document.getElementById('systemTags').innerHTML = ctx.tags.map(t => `<span class="sys-tag ${t.type}">${t.msg}</span>`).join('');
    
    const ul = document.getElementById('auditLogs');
    ul.innerHTML = '';
    ctx.logs.forEach((l, i) => {
      let li = document.createElement('li'); li.className = 'log-item'; li.style.animationDelay = `${i * 0.04}s`;
      li.innerHTML = `<span class="log-phase">${l.phase}</span> <span>${l.msg}</span>`; ul.appendChild(li);
    });

    let total = diag.ally + diag.enemy;
    let allyPct = total === 0 ? 50 : Math.round((diag.ally / total) * 100);
    document.getElementById('barAlly').style.width = `${allyPct}%`;
    document.getElementById('barAlly').innerText = `同类生扶 ${allyPct}%`;
    document.getElementById('barEnemy').innerText = `异类克耗 ${100 - allyPct}%`;

    const godsMatrix = document.getElementById('godsMatrix');
    godsMatrix.innerHTML = '';
    const godCells = [ {key:'yongShen', label:'⭐ 用神', cls:'cell-yong', badgeCls:'badge-yong'}, {key:'xiShen', label:'✅ 喜神', cls:'cell-xi', badgeCls:'badge-xi'}, {key:'jiShen', label:'🚫 忌神', cls:'cell-ji', badgeCls:'badge-ji'}, {key:'xianShen', label:'⚪ 闲神', cls:'cell-xian', badgeCls:'badge-xian'} ];
    godCells.forEach(def => {
      const data = diag.triGods[def.key] || [];
      const cell = document.createElement('div'); cell.className = `god-cell ${def.cls}`;
      let badges = data.length ? data.map(item => `<span class="god-badge ${def.badgeCls}"><span>${item.wx}</span><span class="god-badge-wx">${item.role}</span></span>`).join('') : `<span class="god-empty">—</span>`;
      cell.innerHTML = `<div class="god-cell-title">${def.label}</div><div class="god-badges">${badges}</div>`;
      godsMatrix.appendChild(cell);
    });

    setTimeout(() => { const logs = document.getElementById('auditLogs'); if (logs) logs.scrollTop = logs.scrollHeight; }, 300);
  }

  window.onload = bootQuantumEngine;
</script>
</body>
</html>
