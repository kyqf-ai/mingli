        p1.addState('冲克占优', winnerMult); p0.addState('重伤', injuryMult);
        ctx.log('Stage 5.0 冲突', `${distLabel}：[${p1.char}]压制[${p0.char}]（${e1.toFixed(2)} vs ${e0.toFixed(2)}）。`);
      } else {
        p0.addState('受冲', clashMult); p1.addState('受冲', clashMult);
        ctx.log('Stage 5.0 冲突', `${distLabel}：[${p0.char}]↔[${p1.char}]势均力敌，两败俱伤。`);
      }
    });

    const allZhi = [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ];
    const XING_HAI = {
      xing: {'子':'卯','卯':'子','寅':'巳','巳':'申','申':'寅','丑':'戌','戌':'未','未':'丑'},
      hai: {'子':'未','未':'子','丑':'午','午':'丑','寅':'巳','巳':'寅','卯':'辰','辰':'卯','申':'亥','亥':'申','酉':'戌','戌':'酉'}
    };
    const SELF_XING_ZHI = new Set(['辰','午','酉','亥']);
    allZhi.forEach((z1, i) => {
      allZhi.forEach((z2, j) => {
        if (i >= j) return;
        if (z1.char === z2.char && SELF_XING_ZHI.has(z1.char)) {
          z1.addState('自刑', 0.85); z2.addState('自刑', 0.85);
          ctx.log('Stage 5.1 刑害', `[${z1.char}${z2.char}]自刑，气机内耗。`);
          ctx.tag('tag-warn', `⚡ ${z1.char}自刑`);
        }
        if (XING_HAI.xing[z1.char] === z2.char) { z1.addState('刑', 0.75); z2.addState('刑', 0.75); ctx.log('Stage 5.1 刑害', `[${z1.char}${z2.char}]相刑，气机受制。`); ctx.tag('tag-warn', `⚡ ${z1.char}${z2.char}刑`);}
        if (XING_HAI.hai[z1.char] === z2.char) { z1.addState('害', 0.8); z2.addState('害', 0.8); ctx.log('Stage 5.1 刑害', `[${z1.char}${z2.char}]相害，暗中损伤。`); ctx.tag('tag-warn', `⚡ ${z1.char}${z2.char}害`);}
      });
    });
  }

  /**
   * processMediation(ctx)
   * Stage 5.0（后处理）— 检测五行通关调停关系。
   *
   * 若两个节点存在相克关系，且命局中有"通关"五行的节点处于中间位置，
   * 则通关神能够缓和克制，克方和被克方受到的损伤有所减轻，
   * 通关节点本身获得"枢纽"加成。
   *
   * MEDIATION_MAP：金-木之间通关=水，木-土之间通关=火，等。
   * 通关节点在同柱或相邻柱之间有效（按位置索引判断接近程度）。
   */
  function processMediation(ctx) {
    const { nodes } = ctx;
    const MEDIATION_MAP = { '金-木': '水', '木-土': '火', '土-水': '金', '水-火': '木', '火-金': '土' };
    let nodeArr = Object.values(nodes);
    let mediatedPairs = new Set();
    
    for (let i = 0; i < nodeArr.length; i++) {
      for (let j = 0; j < nodeArr.length; j++) {
        if (i === j) continue;
        let A = nodeArr[i], B = nodeArr[j];
        if (!A.isActive() || !B.isActive() || DICT.SHISHEN[A.effectiveWx].off !== B.effectiveWx) continue;

        let mediatorWx = MEDIATION_MAP[`${A.effectiveWx}-${B.effectiveWx}`];
        if (mediatorWx) {
          let mediators = nodeArr.filter(n => n.effectiveWx === mediatorWx && n.isActive() && !n.isVoid);
          if (mediators.length > 0) {
            let strongestC = mediators.reduce((prev, curr) => (prev.energy > curr.energy) ? prev : curr);
            if (strongestC.energy < 0.6) continue;
            
            let pairId = `${A.id}->${B.id}`;
            if (mediatedPairs.has(pairId)) continue;
            mediatedPairs.add(pairId);

            A.addState('通关泄', 1.0); B.addState('受化生', 1.0); strongestC.addState('枢纽', 1.1);
            ctx.log('Stage 5.5 通关', `[${A.char}(${A.effectiveWx})]克[${B.char}(${B.effectiveWx})]，枢纽[${strongestC.char}(${mediatorWx})]居中化解，克力缓和。`);
          }
        }
      }
    }
  }

  /**
   * processFuyinFanyin(ctx)
   * Stage 5.6 — 检测伏吟和反吟。
   *
   * 伏吟：两柱天干地支完全相同（同气相召），标记 tag-warn。
   *       象征命运重复、暗动不宁，某些宫位重叠还有特殊含义。
   *
   * 反吟：两柱天干互克（天克）且地支互冲（地冲），标记 tag-warn。
   *       象征气机激荡，动荡变迁，吉凶事多从此柱体现。
   *
   * 遍历所有柱对（C(4,2)=6对），逐一检测。
   */
  function processFuyinFanyin(ctx) {
    const { nodes } = ctx;
    let pillars = [ {name: '年柱', g: nodes.yG, z: nodes.yZ}, {name: '月柱', g: nodes.mG, z: nodes.mZ}, {name: '日柱', g: nodes.dG, z: nodes.dZ}, {name: '时柱', g: nodes.hG, z: nodes.hZ} ];
    for(let i=0; i<pillars.length; i++){
        for(let j=i+1; j<pillars.length; j++){
            let p1 = pillars[i], p2 = pillars[j];
            if(p1.g.char === p2.g.char && p1.z.char === p2.z.char) { 
                ctx.tag('tag-warn', `⚠️ ${p1.name}${p2.name}伏吟`); 
                ctx.log('Stage 5.6 伏吟', `${p1.name}与${p2.name}干支完全重叠（伏吟），同气相召，暗动不宁。`);
            }
            let ganChong = DICT.SHISHEN[p1.g.effectiveWx]?.off === p2.g.effectiveWx || DICT.SHISHEN[p2.g.effectiveWx]?.off === p1.g.effectiveWx;
            let zhiChong = DICT.CHONG_ZHI[p1.z.char] === p2.z.char;
            if(ganChong && zhiChong) { 
                ctx.tag('tag-warn', `⚡ ${p1.name}${p2.name}反吟`); 
                ctx.log('Stage 5.6 反吟', `${p1.name}与${p2.name}天克地冲（反吟），气机激荡，动荡不安。`);
            }
        }
    }
  }

  /**
   * processQuantumPhaseTransitions(ctx)
   * Stage 5.8 — 五行极端状态（相变）检测：调候、反克、过泄、衰神激旺。
   *
   * ① 调候（穷通宝鉴法）：
   *    - 寒冻（亥子丑月）：水金能量超过日主阈值且火不足 → 水节点冰冻（分阴水/阳水分级处理）
   *      木节点受冻（×0.70~0.82），写入 ctx.tiaohuoRx（调候用神推荐）
   *    - 酷热（巳午未月）：火土能量超过日主阈值且水不足 → 土节点燥化，金节点受熔融（×0.6）
   *      写入 ctx.tiaohuoRx（以水润局为调候首选）
   *
   * ② 五行反克（克极则反）：
   *    FAN_KE_DICT：当某五行被克神压制超过3.5倍 → 触发反克，克神节点被标记'被反噬'(×0.3)
   *    例：土重木折、金多火熄、水多土流、木坚金缺、火多水涸
   *
   * ③ 过度泄气（食伤过旺）：
   *    XIE_JIN_DICT：日主无强根且食伤超过日主5.5倍 → 被抽干(×0.2)，同类节点受害
   *    例：火多木焚、土多火晦、金多土虚、水多金沉、木多水缩
   *
   * ④ 衰神激旺：
   *    当日主五行占全局75%+，少量对立五行（<15%）尝试克制 → 反令旺神更激，
   *    衰神被标记'蚍蜉撼树'(×0.1)，旺神被标记'被激怒'(×1.5)
   */
  function processQuantumPhaseTransitions(ctx) {
      const { nodes } = ctx;
      const dmWx = nodes.dG.currentWx;
      const dmGanForTiao = nodes.dG.char; 
      
      const { wxE: globalWxEnergy, totalE: totalEnergy } = getWxEnergyMap(nodes, true);

      const isDeepWinter = ['亥', '子', '丑'].includes(nodes.mZ.char);
      const isDeepSummer = ['巳', '午', '未'].includes(nodes.mZ.char);
      
      if (isDeepWinter) {
          const coldEnergy = globalWxEnergy['水'] + globalWxEnergy['金'];
          const dmColdSensitivity = {
            '甲':0.40,'乙':0.40,'丙':0.42,'丁':0.42,
            '戊':0.44,'己':0.44,'庚':0.44,'辛':0.44,
            '壬':0.52,'癸':0.52  
          };
          const coldThreshold = dmColdSensitivity[dmGanForTiao] || 0.45;
          if (coldEnergy > totalEnergy * coldThreshold && globalWxEnergy['火'] < totalEnergy * 0.15) {
              ctx.thermalState = '寒冻'; 

              // ── 分级冰冻参数（按月令深浅） ──────────────────────────────
              // 亥月：初冬，壬水临官，寒意渐起但水势仍强，仅轻度受冻
              // 子月：严冬，寒极，癸水/子支冰冻最重，壬水大减但仍有势
              // 丑月：季冬，土掩寒水，介于子月与亥月之间
              const monthZhi = nodes.mZ.char;
              const FREEZE_PARAM = {
                // [isYinWater_mult, isYangWater_mult, label_yin, label_yang]
                '亥': [0.40, 0.60, '冰封减力', '冰封减力'],
                '子': [0.12, 0.22, '冰冻无用', '冰冻无用'],
                '丑': [0.20, 0.32, '冰冻无用', '冰封减力'],
              };
              const fp = FREEZE_PARAM[monthZhi] || [0.20, 0.35, '冰冻无用', '冰封减力'];

              // 局内（日元除外）是否存在有效明火——有则解冻一级（×1.8，上限0.80）
              const hasFireSupport = Object.values(nodes).some(nd =>
                  nd.id !== 'dG' && nd.effectiveWx === '火' && nd.isActive() && !nd.isVoid
              );

              // 寒木受冻：亥月略轻（0.82），子/丑月较重（0.70）
              const woodFreezeMult = (monthZhi === '亥') ? 0.82 : 0.70;

              Object.values(nodes).forEach(n => {
                  if (n.id === 'dG') return;
                  if (n.effectiveWx === '水') {
                      // 癸水（天干）与子水（地支独藏癸）属阴水/小水，最易冻结
                      // 壬水（天干）与亥支壬水属阳水/大水，寒而不竭
                      const isYinWater = (n.char === '癸' || n.char === '子');
                      let mult  = isYinWater ? fp[0] : fp[1];
                      let label = isYinWater ? fp[2] : fp[3];
                      if (hasFireSupport) mult = Math.min(mult * 1.8, 0.80);
                      n.addState(label, mult);
                  }
                  if (n.effectiveWx === '木') n.addState('寒木受冻', woodFreezeMult);
              });

              // 详细日志：体现分级结果
              const yinPct  = Math.round((hasFireSupport ? Math.min(fp[0]*1.8,0.80) : fp[0]) * 100);
              const yangPct = Math.round((hasFireSupport ? Math.min(fp[1]*1.8,0.80) : fp[1]) * 100);
              ctx.log('Stage 5.8 调候',
                  `❄️ 寒冻（${monthZhi}月）：水金过旺（${Math.round(coldEnergy/totalEnergy*100)}%），缺火暖局` +
                  `${hasFireSupport ? '（局有余火，解冻一级）' : ''}` +
                  ` ▸ 癸/子水留力约${yinPct}%，壬/亥水留力约${yangPct}%，寒木受冻至${Math.round(woodFreezeMult*100)}%` +
                  `，[${dmGanForTiao}]调候优先触发`
              );
              const winterRx = {
                '甲': { yong:'火', xi:'木',  ji:['水','金'], desc:'甲木寒冬，首取丙火照暖，木旺为辅，水金助寒为忌' },
                '乙': { yong:'火', xi:'木',  ji:['水','金'], desc:'乙木寒冬，丙丁并用照暖，木旺为辅' },
                '丙': { yong:'木', xi:'土',  ji:['水','金'], desc:'丙火寒冬，木生火续焰为先，土厚蓄暖为辅' },
                '丁': { yong:'木', xi:'火',  ji:['水','金'], desc:'丁火寒冬，木为灯芯续焰第一，丙火为辅' },
                '戊': { yong:'火', xi:'木',  ji:['水'],      desc:'戊土寒冬，丙火暖土为用，木生火为喜' },
                '己': { yong:'火', xi:'木',  ji:['水'],      desc:'己土寒冬，丙丁暖土为用，木生火为喜' },
                '庚': { yong:'火', xi:'木',  ji:['水','金'], desc:'庚金寒冬，丁火锻金为先，丙火次之，木为辅' },
                '辛': { yong:'火', xi:'土',  ji:['水'],      desc:'辛金寒冬，丙火照暖为用，土厚蓄温为喜' },
                '壬': { yong:'土', xi:'火',  ji:['金','水'], desc:'壬水寒冬，戊土为堤截水为用，丙火温暖次之' },
                '癸': { yong:'火', xi:'木',  ji:['水','金'], desc:'癸水寒冬，丙火蒸发为用，木泄水势为喜' },
              };
              ctx.tiaohuoRx = winterRx[dmGanForTiao] || { yong:'火', xi:'木', ji:['水','金'], desc:'寒冻调候，以火暖局为先' };
              ctx.log('Stage 5.8 调候', `📖 穷通宝鉴·${dmGanForTiao}日：${ctx.tiaohuoRx.desc}`);
          }
      } else if (isDeepSummer) {
          const hotEnergy = globalWxEnergy['火'] + globalWxEnergy['土'];
          const dmHotSensitivity = {
            '甲':0.42,'乙':0.42,'丙':0.52,'丁':0.52,  
            '戊':0.44,'己':0.44,'庚':0.40,'辛':0.40,  
            '壬':0.42,'癸':0.42
          };
          const hotThreshold = dmHotSensitivity[dmGanForTiao] || 0.45;
          const waterLackThreshold = 0.15;
          if (hotEnergy > totalEnergy * hotThreshold && globalWxEnergy['水'] < totalEnergy * waterLackThreshold) {
              ctx.thermalState = '酷热'; 
              ctx.log('Stage 5.8 调候', `🔥 酷热：全局火土过旺（${Math.round(hotEnergy/totalEnergy*100)}%），缺水润局，[${dmGanForTiao}]日主酷热门槛${Math.round(hotThreshold*100)}%，触发调候优先`);
              Object.values(nodes).forEach(n => {
                  if (n.id === 'dG') return; 
                  if (n.effectiveWx === '土') n.addState('燥土脆金', 1.0); 
                  if (n.effectiveWx === '金') n.addState('受熔融', 0.6);
              });
              const summerRx = {
                '甲': { yong:'水', xi:'金',  ji:['火','土'], desc:'甲木酷热，癸水滋根为用，庚金发水为喜，火土增燥为忌' },
                '乙': { yong:'水', xi:'金',  ji:['火','土'], desc:'乙木酷热，癸水滋润为用，金发水源为喜' },
                '丙': { yong:'水', xi:'金',  ji:['土','火'], desc:'丙火酷热，壬水既济为用，金生水为喜，土晦火为忌' },
                '丁': { yong:'水', xi:'木',  ji:['土','火'], desc:'丁火酷热，壬水为用，甲木引丁不可少，土埋木晦为忌' },
                '戊': { yong:'水', xi:'金',  ji:['火','土'], desc:'戊土酷热燥烈，壬癸水润土为用，金发水源为喜' },
                '己': { yong:'水', xi:'金',  ji:['火','土'], desc:'己土酷热，癸水滋润为用，金为喜' },
                '庚': { yong:'水', xi:'土',  ji:['火'],      desc:'庚金酷热受熔，壬水泄气降温为用，土生金为喜，火炽为绝忌' },
                '辛': { yong:'水', xi:'金',  ji:['火','土'], desc:'辛金酷热，壬水洗涤为用，金比助旺为喜' },
                '壬': { yong:'金', xi:'水',  ji:['土','火'], desc:'壬水酷热涸竭，庚金发水为用，水比为喜，土火增燥为忌' },
                '癸': { yong:'金', xi:'水',  ji:['土','火'], desc:'癸水酷热，辛金发水为用，水比为喜，土克水为忌' },
              };
              ctx.tiaohuoRx = summerRx[dmGanForTiao] || { yong:'水', xi:'金', ji:['火','土'], desc:'酷热调候，以水润局为先' };
              ctx.log('Stage 5.8 调候', `📖 穷通宝鉴·${dmGanForTiao}日：${ctx.tiaohuoRx.desc}`);
          }
      }

      const FAN_KE_DICT = { '木': '土重木折', '火': '金多火熄', '土': '水多土流', '金': '木坚金缺', '水': '火多水涸' };
      const XIE_JIN_DICT = { '木': '火多木焚', '火': '土多火晦', '土': '金多土虚', '金': '水多金沉', '水': '木多水缩' };

      const chains = [
          { base: '木', off: '土', out: '火' }, { base: '火', off: '金', out: '土' },
          { base: '土', off: '水', out: '金' }, { base: '金', off: '木', out: '水' },
          { base: '水', off: '火', out: '木' }
      ];

      chains.forEach(c => {
          if (c.base !== dmWx) return;
          let eBase = globalWxEnergy[c.base], eOff = globalWxEnergy[c.off], eOut = globalWxEnergy[c.out];   
          if (eBase < 0.1) return; 

          if (eOff > eBase * 3.5) {
              const term = FAN_KE_DICT[c.base];
              ctx.log('Stage 5.8 相变', `💥 ${term}：[${c.off}]能量约为[${c.base}]的${(eOff/eBase).toFixed(1)}倍，触发反克重伤。`);
              ctx.tag('tag-fatal', `💥 ${term}`);
              Object.values(nodes).forEach(n => { if (n.id !== 'dG' && n.effectiveWx === c.base) n.addState('被反噬', 0.3); });
          }

          const rootData = getRootsData(nodes, c.base);
          const hasStrongRoot = rootData.mainCount > 0 || rootData.subCount >= 2;

          if (!hasStrongRoot && eOut > eBase * 5.5) {
              const term = XIE_JIN_DICT[c.base];
              ctx.log('Stage 5.8 相变', `🩸 ${term}：食伤[${c.out}]约为日主同类的${(eOut/eBase).toFixed(1)}倍且无强根支撑，日主元气被过度耗泄。`);
              ctx.tag('tag-fatal', `🩸 ${term}`);
              Object.values(nodes).forEach(n => { if (n.id !== 'dG' && n.effectiveWx === c.base) n.addState('被抽干', 0.2); });
          }

          if (eBase > totalEnergy * 0.75) {
              let enemy = DICT.SHISHEN[c.base].off; 
              let eEnemy = globalWxEnergy[enemy];
              if (eEnemy > 0 && eEnemy < totalEnergy * 0.15) {
                  ctx.log('Stage 5.8 相变', `🌋 衰神激旺：[${enemy}]（占比不足15%）试图压制极旺之[${c.base}]，以卵击石，反令旺神激动。`);
                  ctx.tag('tag-fatal', `🌋 衰神激旺 (${enemy}犯${c.base})`);
                  Object.values(nodes).forEach(n => {
                      if (n.id === 'dG') return; 
                      if (n.effectiveWx === enemy) n.addState('蚍蜉撼树', 0.1); 
                      if (n.effectiveWx === c.base) n.addState('被激怒', 1.5); 
                  });
              }
          }
      });
  }

  /**
   * revisitTransformRatio(ctx)
   * Stage 4.4 — 补算合绊节点的冲力减益（修正 transformRatio）。
   *
   * 背景：calcTransformRatio 在 processCombinations 阶段运行时，
   *        冲状态尚未写入，因此无法考虑冲的影响。
   *        本函数在 processBranchInteractions 之后，重新扫描所有
   *        有 targetWx 且未完全合化的绊局节点，按冲的强度减少其渗透率。
   *
   * 冲减益规则：
   *   - 冲方极弱（energy<0.5）且合方总能量>冲方3倍 → 蜉蝣撼树，仅扣 0.05
   *   - 冲方有力（energy≥0.5）且处于重伤 → 扣 0.30
   *   - 冲方有力且仅受冲 → 扣 0.20
   *   - transformRatio 最终钳位在 [0.0, 1.0]
   */
  // ── V3.0 核心修正：processBranchInteractions 写入冲态后，重算合绊节点的冲减益 ──
  // calcTransformRatio 在 processCombinations 阶段运行时，冲状态尚未写入，
  // 此函数在冲态确立后对所有合绊节点补算冲力减益，修正 transformRatio。
  function revisitTransformRatio(ctx) {
      const { nodes } = ctx;
      const zhiNodes = [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ];
      const stems    = [nodes.yG, nodes.mG, nodes.dG, nodes.hG];

      zhiNodes.forEach(m => {
          // 只处理：有 targetWx 且尚未完全合化的绊局节点
          if (!m.targetWx || m.isTransformed) return;

          let clashPenalty = 0;
          if (m.hasState('受冲') || m.hasState('重伤')) {
              const chongChar = DICT.CHONG_ZHI[m.char];
              const chongNode = zhiNodes.find(z => z.char === chongChar);

              // 估算合局方总能量（同 targetWx 的绊局字 + 同行天干）
              const comboMembers = zhiNodes.filter(z => z.targetWx === m.targetWx && !z.isTransformed);
              let targetWxEnergy = 0;
              comboMembers.forEach(mb => targetWxEnergy += mb.energy);
              stems.forEach(s => { if (s.effectiveWx === m.targetWx) targetWxEnergy += s.energy; });

              const chongEnergy = chongNode ? chongNode.energy : 0.3;

              if (chongEnergy < 0.5 && targetWxEnergy > chongEnergy * 3) {
                  // 蜉蝣撼树：冲方极弱，减益极小
                  clashPenalty = Math.max(clashPenalty, 0.05);
                  ctx.log('Stage 4.1 修正', `  复检[${m.char}]冲态：冲方[${chongChar||'?'}]势单（${chongEnergy.toFixed(2)} vs 合方${targetWxEnergy.toFixed(2)}），蜉蝣撼树，减益仅-0.05`);
              } else if (chongEnergy >= 0.5) {
                  clashPenalty = Math.max(clashPenalty, m.hasState('重伤') ? 0.30 : 0.20);
                  ctx.log('Stage 4.1 修正', `  复检[${m.char}]冲态：受有力冲[${chongChar||'?'}]（${chongEnergy.toFixed(2)}），化气减益-${clashPenalty.toFixed(2)}`);
              }
          }

          if (clashPenalty > 0) {
              const oldRatio = m.transformRatio;
              m.transformRatio = Math.max(0.0, Math.min(1.0, m.transformRatio - clashPenalty));
              ctx.log('Stage 4.1 修正', `  [${m.char}]化气渗透率修正：${Math.round(oldRatio*100)}% → ${Math.round(m.transformRatio*100)}%（冲减益 -${Math.round(clashPenalty*100)}%）`);
          }
      });
  }

  /**
   * evaluatePatternAndStrength(ctx)
   * Stage 6+ — 综合评估旺衰、格局、喜用神，返回 diagnosis 对象。
   *
   * 返回 diag 结构：
   *   ally       — 同类生扶分（印星+比劫加权总分）
   *   enemy      — 异类克耗分（官杀+财星+食伤加权总分）
   *   verdict    — 旺衰结论字符串（如"身强·偏旺"/"身弱·极弱"/"从财格"）
   *   patternStr — 格局描述字符串（用于UI展示）
   *   triGods    — 喜用神体系 {yongShen, xiShen, jiShen, xianShen}
   *
   * 内部调用链：
   *   1. getWxEnergyMap()      — 锁定全局五行能量快照到 ctx._wxCache
   *   2. evaluateStrength()    — 综合 ally/enemy 比值和通根数量判断旺衰等级
   *   3. detectMainPattern()   — 扫描主格（正格/特殊格/从格/化气格等）
   *   4. detectAndLogSupplementaryPatterns() — 扫描旁格（两气/三气/半壁/神煞格）
   *   5. determineTriGodsSystem() — 根据旺衰+格局确定喜用忌闲体系
   *
   * 旺衰分数权重（节点类型 × 位置系数 × energy）：
   *   月支 28（未被重伤）/ 15（重伤）；日支 22；年支 16；时支 12
   *   月干 ×1.40；时干 ×1.20；年干 ×0.80（天干基础 12 × 位置系数）
   *   地支能量按藏干权重拆分后分别计入 ally/enemy
   *   合绊中间态按 transformRatio 拆分到两侧
   */
  function evaluatePatternAndStrength(ctx) {
    const { nodes, thermalState } = ctx;
    const dmWx = nodes.dG.currentWx, dmGan = nodes.dG.char;
    const isYinGan = ['乙', '丁', '己', '辛', '癸'].includes(dmGan);
    const fromRatioThreshold = isYinGan ? 0.30 : 0.22;

    // 节点能量在此阶段已稳定，计算一次缓存全程复用
    ctx._wxCache = getWxEnergyMap(nodes);

    let allyScore = 0, enemyScore = 0, resScore = 0, selfScore = 0; 
    const dmRoots = getRootsData(nodes, dmWx);
    let hasRootLocal = dmRoots.mainCount > 0 || dmRoots.subCount > 0;
    ctx.dmRoots = dmRoots; 

    for(let key in nodes) {
      if(key === 'dG') continue; 
      let n = nodes[key];
      if(!n.isActive()) continue; 

      // 【V3.2 修正】月令重伤时 energy 已乘惩罚系数，权重从 8 提至 15 避免双重削弱
      const weights = { mZ: n.hasState('重伤') ? 15 : (n.isTransformed && n.transformedWx !== n.originalWx) ? 28 : 28, dZ: 22, yZ: 16, hZ: 12 };
      // V3.2：天干引入位置系数（月干紧贴月令最重，时干紧邻日主次之，年干最远）
      const stemPosFactor = { yG: 0.80, mG: 1.40, hG: 1.20 };
      let baseWeight = n.type === '干' ? 12 * (stemPosFactor[key] || 1.0) : (weights[key] || 12);

      let finalEnergy = baseWeight * n.energy;
      let role = getShiShenName(dmWx, n.effectiveWx);

      let rootBonus = 0, enemyRootBonus = 0, localSelf = 0, localRes = 0; 

      if (n.type === '支') {
        const hidden = DICT.HIDDEN[n.char] || [];
        if (!(n.isTransformed && n.transformedWx !== n.originalWx)) {
          // V3.0：合绊中间态按 transformRatio 拆分能量
          if (n.transformRatio > 0 && n.targetWx) {
            // 转移部分 → 按 targetWx 角色计入
            const transferE   = finalEnergy * n.transformRatio;
            const transferRole = getShiShenName(dmWx, n.targetWx);
            if (['比劫', '印星'].includes(transferRole)) {
              rootBonus += transferE;
              if (transferRole === '比劫') localSelf += transferE;
              if (transferRole === '印星') localRes  += transferE;
            } else {
              enemyRootBonus += transferE;
            }
            // 残留部分 → 按原藏干权重分配
            const residualE = finalEnergy * (1 - n.transformRatio);
            const activeH = hidden.map((h, i) => ({ h, i, w: h ? (getHiddenWeights(n.char)[i] || 0.05) : 0 })).filter(x => x.h);
            const totW = activeH.reduce((s, x) => s + x.w, 0) || 1;
            activeH.forEach(({ h, i, w }) => {
              let wx = DICT.WX[h];
              let subRole = getShiShenName(dmWx, wx);
              let subE = residualE * (w / totW);
              if (['比劫', '印星'].includes(subRole)) {
                rootBonus += subE;
                if (subRole === '比劫') localSelf += subE;
                if (subRole === '印星') localRes  += subE;
              } else {
                enemyRootBonus += subE;
              }
            });
          } else {
            const activeHidden = hidden.map((h, i) => ({ h, i, w: h ? (getHiddenWeights(n.char)[i] || 0.05) : 0 })).filter(x => x.h);
            const totalW = activeHidden.reduce((s, x) => s + x.w, 0) || 1;

            activeHidden.forEach(({ h, i, w }) => {
              let wx = DICT.WX[h];
              let subRole = getShiShenName(dmWx, wx);
              let subEnergy = finalEnergy * (w / totalW); 

              if (['比劫', '印星'].includes(subRole)) {
                rootBonus += subEnergy;
                if (subRole === '比劫') localSelf += subEnergy;
                if (subRole === '印星') localRes += subEnergy;
              } else {
                enemyRootBonus += subEnergy;
              }
            });
          }
          finalEnergy = 0;
        }
      }

      if (role === '比劫') {
        localSelf += finalEnergy; allyScore += finalEnergy + rootBonus; enemyScore += enemyRootBonus; selfScore += localSelf; resScore += localRes;
      } else if (role === '印星') {
        localRes += finalEnergy; allyScore += finalEnergy + rootBonus; enemyScore += enemyRootBonus; selfScore += localSelf; resScore += localRes;
      } else {
        enemyScore += finalEnergy + enemyRootBonus;
        let dampening = 0.35;
        allyScore += rootBonus * dampening; selfScore += localSelf * dampening; resScore += localRes * dampening;
      }
    }

    let forceWeakVerdict = false;
    if (!hasRootLocal && resScore > selfScore * 2.8 && selfScore < 20 && thermalState !== '寒冻') {
        const { wxE, totalE } = ctx._wxCache;
        const resWx = DICT.SHISHEN[dmWx].res; // 日主的印星五行
        const weaWx = DICT.SHISHEN[dmWx].wea; // 日主的财星五行
        const offWx = DICT.SHISHEN[dmWx].off; // 日主的官杀五行
        const outWx = DICT.SHISHEN[dmWx].out; // 日主的食伤五行
        const resPct = (wxE[resWx] || 0) / totalE;
        const weaPct = (wxE[weaWx] || 0) / totalE;
        if (weaPct > resPct && weaPct > 0.4) {
            ctx.log('Stage 6.1 气机', `💡 财破印先行：印虽重（印${Math.round(resPct*100)}%）但财更旺（财${Math.round(weaPct*100)}% > 40%），财星已破印星，印不能护身，不触发母慈灭子，按财多身弱论处。`);
        } else {
        let penalty = resScore * 0.3;
        allyScore -= penalty;
        enemyScore += penalty * 0.5;
        ctx.log('Stage 6.1 气机', `⚠️ 母慈灭子：印星（${resScore.toFixed(1)}）过旺，日主无根不受生，生扶反化为重压。`);
        forceWeakVerdict = true;
        }
    } else if (resScore > selfScore * 2.8) {
        ctx.log('Stage 6.1 气机', `💡 印星虽旺（${resScore.toFixed(1)}），但日主有强根（${selfScore.toFixed(1)}），论「身旺印旺」，免遭母多灭子之灾。`);
    }

    let ratio = allyScore / (enemyScore || 1);
    let verdict = '';

    const dayGanStates = Array.from(nodes.dG.states).join('');
    const deLing = dayGanStates.includes('当旺') || dayGanStates.includes('得相');
    // V3.0 修正：得地需有本气通根（主气根），余气根仅算「通根」不算「得地」
    const deDi = dmRoots.mainCount > 0;
    const deShi  = ratio > 1.0;
    ctx.log('Stage 6.2 三才',
      `得令：${deLing ? '✅' : '❌'}（日干[${nodes.dG.char}]在[${nodes.mZ.char}]月，${deLing ? '当旺/得相' : '休囚死绝'}）| ` +
      `得地：${deDi ? '✅' : '❌'}（本气根${dmRoots.mainCount}个${dmRoots.subCount > 0 ? `，余气通根${dmRoots.subCount}个` : ''}）| ` +
      `得势：${deShi ? '✅' : '❌'}（同类比率 ${ratio.toFixed(2)}）`
    );
    
    if (forceWeakVerdict) {
        verdict = '身弱 (母慈灭子)';
} else if (!hasRootLocal) {
        if (thermalState !== '常温') verdict = '身弱 (调候优先)';
        else if (ratio < fromRatioThreshold && !hasCloseSupport(nodes, dmWx)) verdict = isYinGan ? '真从格 (阴干易从)' : '真从格 (阳干无根失势)';
        else if (ratio < fromRatioThreshold) verdict = '假从格 (根虚有助)';
        else if (ratio < 0.48) verdict = '极弱 (无根有生扶)';
        else verdict = '身弱 (克泄重)';
    } else if (ratio > 3.8) {
        // 新增：提取月令的季节本气，检测“天时”是否克伐日主
        const mZOriginalWx = DICT.WX[(DICT.HIDDEN[nodes.mZ.char]||[])[0] || nodes.mZ.char];
        const isSeasonOpposed = DICT.SHISHEN[dmWx].off === mZOriginalWx; // 季节本气是官杀
        
        if (isSeasonOpposed) {
            verdict = '极强 / 身旺 (受制天时)';
            ctx.log('Stage 6.1 气机', `⚠️ 同类极旺（比率${ratio.toFixed(1)}），但生于[${nodes.mZ.char}]月，天时本气为官杀。所谓“夏金不言从革/秋木不作曲直”，受制于天时炎凉，不可跨越至专旺，定为极强身旺。`);
        } else if (!hasStrongEnemy(nodes, dmWx)) {
            verdict = '真专旺格 (纯粹无杂)';
        } else {
            verdict = '假专旺 / 极强';
        }
    } else if (ratio > 1.45 || (ratio > 1.28 && (deLing || deDi)) || (deLing && deDi && deShi)) verdict = '身强 (可担财官)'; 
    else if (ratio < 0.70 || (ratio < 0.82 && !deLing && !deDi)) verdict = '身弱 (需印比生扶)'; 
    else verdict = '中和 (平衡流转)';

    ctx.log('Stage 6.3 旺衰', `同类生扶：${allyScore.toFixed(1)}，异类克耗：${enemyScore.toFixed(1)}，势能比率：${ratio.toFixed(2)}。通根：${hasRootLocal ? `主气根${dmRoots.mainCount}个、余气根${dmRoots.subCount}个` : '无根'}。`);

    const patternResult = determineFullPattern(ctx, dmWx, allyScore, enemyScore, dmRoots, verdict);

    detectAndLogSupplementaryPatterns(ctx, nodes, dmWx);

    if (patternResult.pattern.includes('食') || patternResult.pattern.includes('伤')) {
      if (verdict.includes('身弱') && !verdict.includes('从') && hasTrueRoot(nodes, dmWx)) {
        let outTally = 0, resTally2 = 0;
        Object.values(nodes).forEach(nn => {
          if (!nn.isActive() || nn.isVoid) return;
          let r = getShiShenName(dmWx, nn.effectiveWx);
          if (r === '食伤') outTally += nn.energy;
          if (r === '印星') resTally2 += nn.energy;
        });
        
        if (ratio > 1 && resTally2 < outTally * 1.5) {
          verdict = '身旺 (食伤泄秀)';
          ctx.log('Stage 6.6 修正', `💡 格局修正：月令成食伤格，日主有真根且食伤未被印星压制，由「身弱」修正为「身旺(食伤泄秀)」，以流通秀气为重。`);
        } else if (ratio <= 0.28) {
          ctx.log('Stage 6.6 修正', `⚠️ 食伤格但比率极低（${ratio.toFixed(2)}），仍维持「身弱」判定（极弱局不可泄秀）。`);
        } else {
          ctx.log('Stage 6.6 修正', `⚠️ 食伤格但印星过强（${resTally2.toFixed(1)} > 食伤${outTally.toFixed(1)}×1.5），食伤受制，维持「身弱」不修正。`);
        }
      }
    }

    let finalPatternStr = `${patternResult.pattern} · ${patternResult.desc}`;
    
    detectMinorSpecialPatterns(ctx, dmWx, nodes, patternResult, verdict);
    if (patternResult.minorFlag) {
      finalPatternStr += ` ▸ ${patternResult.minorFlag.replace(/·$/, '')}`;
    }

    const triGods = determineTriGodsSystem(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx);
    
    return { verdict, patternStr: finalPatternStr, triGods, ally: allyScore, enemy: enemyScore };
  }

  /**
   * determineFullPattern(ctx, dmWx, allyScore, enemyScore, dmRoots, verdict)
   * 格局完整判定器（evaluatePatternAndStrength 内部调用）。
   *
   * 判定顺序（优先级从高到低）：
   *   1. 化气格  — 日主与相邻天干五合，月令得势且化神占比足够
   *   2. 专旺格  — 一行得气（从强）：曲直/炎上/稼穑/从革/润下
   *   3. 从格    — 从财/从官杀/从食伤（日主极弱且无真根）
   *   4. 正格    — 月令透干，按月令藏干所含最强十神角色定格：
   *                 官格/财格/食神格/伤官格/印格/建禄格/月刃格
   *                 （子平真诠八正格为核心判定依据）
   *
   * 格局返回结构：
   *   { pattern, desc, type, minorFlag, wxFocus }
   *   type：'standard'（正格）/ 'special'（特殊格/从化格）/ 'special_shensha' 等
   *   minorFlag：次级格局标注（如"杀印相生·财官双美"），追加在主格之后
   *
   * 月令空亡处理：月令旬空时格局失根，记录警告日志后仍按月令推格，
   *   但在后续旺衰评估中将月令权重大幅降低（月令失令）。
   */
  function determineFullPattern(ctx, dmWx, allyScore, enemyScore, dmRoots, verdict) {
    const { nodes } = ctx;
    const mZ = nodes.mZ;
    const dmGan = nodes.dG.char;
    const isYinGan = ['乙', '丁', '己', '辛', '癸'].includes(dmGan);
    const fromRatioThreshold = isYinGan ? 0.30 : 0.22;

    if (mZ.isVoid) {
      ctx.log('Stage 6.4 格局', `⚠️ 月令[${mZ.char}]落入空亡，格局失根！月令所代表之气大幅衰减，本命格局力量薄弱，须大运岁运冲实方可应验，以最近月令实支取格为参考。`);
      ctx.tag('tag-warn', `⭕ 月令空亡·格弱`);
    }

    const huaMap0 = { '甲己':'土', '乙庚':'金', '丙辛':'水', '丁壬':'木', '戊癸':'火' };
    for (let neighbor0 of [nodes.mG, nodes.hG]) {
      if (!neighbor0 || !neighbor0.isActive() || neighbor0.isVoid) continue;
      const huaWx0 = huaMap0[dmGan + neighbor0.char] || huaMap0[neighbor0.char + dmGan];
      if (huaWx0 && nodes.mZ.effectiveWx === huaWx0) {
        const monthIsStrong = nodes.mZ.hasState('当旺') || nodes.mZ.hasState('得相');
        const { wxE, totalE } = getWxEnergyMap(nodes);
        const huaPct = totalE > 0 ? (wxE[huaWx0] || 0) / totalE : 0;

        const dmOriginalWx = DICT.WX[dmGan];
        const dmOriginalRoots = getRootsData(nodes, dmOriginalWx);
        const dmHasOriginalRoot = dmOriginalRoots.mainCount > 0; 

        const isNearStem = (neighbor0.id === 'mG');
        const huaThreshold = isNearStem ? 0.45 : 0.55;

        const huaKe = { '土':'木', '金':'火', '水':'土', '木':'金', '火':'水' };
        const jiWxForHua = huaKe[huaWx0]; 
        const jiPct = totalE > 0 ? (wxE[jiWxForHua] || 0) / totalE : 0;

        const otherStems = [nodes.yG, nodes.mG, nodes.hG].filter(s => s.id !== neighbor0.id && s.id !== 'dG');
        const rivalForDM = otherStems.some(s => huaMap0[dmGan + s.char] || huaMap0[s.char + dmGan]);
        const rivalForNeighbor = otherStems.some(s => DICT.HE_GAN[neighbor0.char] === s.char);

        const stemLabel = isNearStem ? '月干（近合）' : '时干（遥合）';
        if (!monthIsStrong) {
          ctx.log('Stage 6.4 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但月令气弱不得势，化气格不成立，降为普通格局。`);
        } else if (huaPct < huaThreshold) {
          ctx.log('Stage 6.4 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但化神全局占比仅${Math.round(huaPct*100)}%（须≥${Math.round(huaThreshold*100)}%），化气不纯，格局不成立。`);
        } else if (dmHasOriginalRoot) {
          ctx.log('Stage 6.4 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但日主在地支有本气[${dmOriginalWx}]主气通根，本性未泯，化气格不成立。`);
        } else if (jiPct > 0.12) {
          ctx.log('Stage 6.4 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但克化神之[${jiWxForHua}]占比${Math.round(jiPct*100)}%（须≤12%），化气受制，格局不成立。`);
        } else if (rivalForDM || rivalForNeighbor) {
          ctx.log('Stage 6.4 格局', `⚠️ 日干[${dmGan}]与${stemLabel}[${neighbor0.char}]有化${huaWx0}之象，但存在争合，化气格不成立。`);
        } else {
          ctx.log('Stage 6.4 格局', `✅ 化气格成立（最高优先）：日干[${dmGan}]与${stemLabel}[${neighbor0.char}]合化${huaWx0}，月令得势，化神占比${Math.round(huaPct*100)}%≥${Math.round(huaThreshold*100)}%，日主无本气通根，忌神[${jiWxForHua}]占比${Math.round(jiPct*100)}%≤12%，无争合。`);
          return { pattern: `${huaWx0}化气格`, type: 'special', desc: `日干与${neighbor0.label}合化${huaWx0}成功（${stemLabel}）` };
        }
      }
    }

    if (allyScore / (enemyScore || 1) > 3.8 && !hasStrongEnemy(nodes, dmWx)) {
      const wxName = {'木':'曲直格','火':'炎上格','土':'稼穑格','金':'从革格','水':'润下格'};
      if (wxName[dmWx]) {
        const dmInMonthStrong = nodes.dG.hasState('当旺') || nodes.dG.hasState('得相');
        const mZMainWx = DICT.WX[(DICT.HIDDEN[nodes.mZ.char]||[])[0] || nodes.mZ.char];
        // V3.0 修正：若月令本身是合绊中间态高度化气节点，其原五行已大量渗出，
        // monthSupportsDm 需额外检查月令的真实残留五行占比是否仍支撑日主
        const mZTransformRatioForDm = nodes.mZ.transformRatio || 0;
        const mZEffectivelyLostOriginal = mZTransformRatioForDm > 0.6; // 月令60%以上气势已转移
        const monthSupportsDm = !mZEffectivelyLostOriginal && (dmInMonthStrong || (nodes.mZ.effectiveWx === dmWx) || (mZMainWx === dmWx));

        const rootsForDm = getRootsData(nodes, dmWx);
        const hasMultiRoots = rootsForDm.mainCount >= 2 || (rootsForDm.mainCount >= 1 && rootsForDm.subCount >= 1);
        
        // 新增：天时拦截
        const isSeasonOpposed = DICT.SHISHEN[dmWx].off === mZMainWx; 

        if (isSeasonOpposed) {
          ctx.log('Stage 6.4 格局', `⚠️ 全局${dmWx}气极旺且合局，但生于[${nodes.mZ.char}]月，天时本气为官杀。违背自然气候（如夏金不作从革），专旺格不成立，降为普通极强格局。`);
        } else if (!monthSupportsDm) {
          if (mZEffectivelyLostOriginal) {
            ctx.log('Stage 6.4 格局', `⚠️ 月令[${nodes.mZ.char}]参与合绊，化气渗透率${Math.round(mZTransformRatioForDm*100)}%，原五行气势已大量转移，不再为日主[${dmGan}]提供月令依托，专旺格条件受损，降为极强格局处理。`);
          } else {
            ctx.log('Stage 6.4 格局', `⚠️ 全局${dmWx}气旺（比率${(allyScore/(enemyScore||1)).toFixed(2)}），但日主[${dmGan}]在月令[${nodes.mZ.char}]不得势（非当旺/得相），专旺格存疑，降为极强身旺格局处理。`);
          }
        } else if (!hasMultiRoots) {
          ctx.log('Stage 6.4 格局', `⚠️ 全局${dmWx}气旺，日主得令，但地支通根不足（主气根${rootsForDm.mainCount}个，余气根${rootsForDm.subCount}个），专旺格不够纯粹，降为普通格局。`);
        } else {
          ctx.log('Stage 6.4 格局', `✅ 专旺格成立：全局${dmWx}气专旺，日主[${dmGan}]与旺气同性，月令得势，地支有${rootsForDm.mainCount}个主气根，入${wxName[dmWx]}，顺势而行。`);
          return { pattern: wxName[dmWx], type: 'special', desc: `全局${dmWx}气专旺，月令得势，顺其势而行` };
        }
      }
    }
    const ratio = allyScore / (enemyScore || 1);
    const noRoot = dmRoots.mainCount === 0 && dmRoots.subCount === 0;

    // 【V3.2 修正·偏差3】从格预判需用「纯净比率」：剥除敌方地支中零星印比 dampening 贡献，
    // 避免因极弱八字中微量余气被放大 0.35 倍而导致 ratio 虚高、误判无法成从
    let pureAllyScore = 0, pureEnemyScore = 0;
    for (let key in nodes) {
      if (key === 'dG') continue;
      let n = nodes[key];
      if (!n.isActive()) continue;
      const pw = { mZ: n.hasState('重伤') ? 15 : 28, dZ: 22, yZ: 16, hZ: 12 };
      let pFinalEnergy = (pw[key] || 12) * n.energy;
      let pRole = getShiShenName(dmWx, n.effectiveWx);
      if (n.type === '支' && !(n.isTransformed && n.transformedWx !== n.originalWx)) {
        const pH = DICT.HIDDEN[n.char] || [];
        const pAH = pH.map((h, i) => ({ h, w: h ? (DICT.HIDDEN_WEIGHT[i] || 0.1) : 0 })).filter(x => x.h);
        const pTW = pAH.reduce((s, x) => s + x.w, 0) || 1;
        let pRootBonus = 0, pEnemyRootBonus = 0;
        pAH.forEach(({ h, w }) => {
          const pSubRole = getShiShenName(dmWx, DICT.WX[h]);
          const pSubE = pFinalEnergy * (w / pTW);
          if (['比劫', '印星'].includes(pSubRole)) pRootBonus += pSubE;
          else pEnemyRootBonus += pSubE;
        });
        pFinalEnergy = 0;
        if (['比劫', '印星'].includes(pRole)) { pureAllyScore += pRootBonus; pureEnemyScore += pEnemyRootBonus; }
        else { pureEnemyScore += pFinalEnergy + pEnemyRootBonus; /* 纯净模式：敌方地支内印比完全不计入 ally */ }
      } else {
        if (['比劫', '印星'].includes(pRole)) pureAllyScore += pFinalEnergy;
        else pureEnemyScore += pFinalEnergy;
      }
    }
    const pureRatio = pureAllyScore / (pureEnemyScore || 1);

    // 【V3.2 修正】恢复 hasCloseSupport 检测：日主虽无地支根，但月干/时干有紧邻印比生扶，则不可从
    if (pureRatio < fromRatioThreshold && noRoot && !hasCloseSupport(nodes, dmWx)) {
      const counts = { '官杀':0, '财星':0, '食伤':0 };
      ['yG','mG','hG','yZ','mZ','dZ','hZ'].forEach(k => {
        const n = nodes[k];
        const role = getShiShenName(dmWx, n.effectiveWx);
        if (n.isActive() && counts.hasOwnProperty(role)) {
          const w = (k === 'mZ') ? 4 : (n.type === '支' ? 1.5 : 1);
          counts[role] += w;
        }
      });

      const mZMainHidden = (DICT.HIDDEN[nodes.mZ.char]||[])[0];
      const mZMainWx = mZMainHidden ? DICT.WX[mZMainHidden] : nodes.mZ.effectiveWx;
      const mZMainRole = getShiShenName(dmWx, mZMainWx);
      let maxRole;
      if (counts.hasOwnProperty(mZMainRole) && counts[mZMainRole] > 0) {
        maxRole = mZMainRole;
        ctx.log('Stage 6.4 格局', `📌 月令[${nodes.mZ.char}]主气为${mZMainRole}（${mZMainWx}），从格以月令主导，从${maxRole}。`);
      } else {
        maxRole = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        ctx.log('Stage 6.4 格局', `📌 月令非所从之气，取权重最大角色：从${maxRole}（权重${counts[maxRole].toFixed(1)}）。`);
      }

      const monthHelpsAlly = (nodes.mZ.effectiveWx === dmWx);
      if (monthHelpsAlly && !verdict?.includes('假从')) {
        ctx.log('Stage 6.4 格局', `⚠️ 日主虽无根且比率低（${ratio.toFixed(2)}），但月令[${nodes.mZ.char}]主气为日主同类，月令护身，从格不成立，论假从/极弱。`);
        const isFakeCong = true;
        const patLabel = `偏从${maxRole}格`;
        return { pattern: patLabel, type: 'special', desc: `日主无根但月令护身，势近从格而不成真从（假从）` };
      }

      const isFakeCong = verdict && verdict.includes('假从');
      const patLabel = isFakeCong ? `偏从${maxRole}格` : `从${maxRole}格`;
      ctx.log('Stage 6.4 格局', `${isFakeCong ? '⚠️ 偏从格（假从）' : '✅ 从格成立'}：日主无根（比率${ratio.toFixed(2)}，${isYinGan?'阴干':'阳干'}阈值${fromRatioThreshold}），弃命从${maxRole}，入${patLabel}。`);
      return { pattern: patLabel, type: 'special', desc: `日主无根，${isFakeCong ? '势近从格但根气尚存（假从）' : '从于旺势'}` };
    }

    const effectiveMonthWx = mZ.isTransformed ? mZ.transformedWx : DICT.WX[(DICT.HIDDEN[mZ.char]||[])[0] || mZ.char];
    if (effectiveMonthWx === dmWx) {
      const mZIsBroken = nodes.mZ.hasState('重伤') || (nodes.mZ.hasState('受冲') && nodes.mZ.energy < 0.35);
      const phaseInMonth = (DICT.QI_PHASE[dmGan] || {})[mZ.char];
      const patternName = phaseInMonth === '帝旺' ? '月刃格' : '建禄格';
      let dynamicDesc;
      if (mZIsBroken) {
        dynamicDesc = `${patternName}月令被冲破，格局力量减弱，以${allyScore < enemyScore ? '印比生扶' : '月令余气'}论，须大运补救`;
        ctx.log('Stage 6.4 格局', `⚠️ 月令与日主同气，理应入${patternName}，但月令[${mZ.char}]被冲破（重伤/受冲），格局有损。${dynamicDesc}`);
      } else {
        dynamicDesc = allyScore < enemyScore ? '比肩/刃秉令，但全局克泄交加，反喜印比生扶' : (patternName === '建禄格' ? '比肩秉令，身强喜财官' : '羊刃当权，喜七杀制刃');
        ctx.log('Stage 6.4 格局', `✅ 月令与日主同气，入${patternName}。${dynamicDesc}`);
      }
      return { pattern: mZIsBroken ? `${patternName}（月令受损）` : patternName, type: 'misc', desc: dynamicDesc };
    }

    const hidden = DICT.HIDDEN[mZ.char];
    const stems = [nodes.yG, nodes.mG, nodes.hG];
    const matchedStems = hidden.map((h, hi) => {
      if (!h) return null;
      const s = stems.find(st => st.char === h && st.isActive() && !st.isVoid);
      return s ? { stem: s, hiddenIdx: hi, h } : null;
    }).filter(Boolean);

    if (matchedStems.length > 0) {
      const best = matchedStems.reduce((a, b) => {
        if (a.hiddenIdx !== b.hiddenIdx) return a.hiddenIdx < b.hiddenIdx ? a : b;
        return a.stem.energy >= b.stem.energy ? a : b;
      });
      const role = getExactShiShenName(dmGan, best.h, DICT.WX[best.h]);
      const purityNote = matchedStems.length > 1
        ? `（月令有${matchedStems.length}干透出，取${best.hiddenIdx === 0 ? '本气' : best.hiddenIdx === 1 ? '中气' : '余气'}[${best.h}]为主格）`
        : '';
      ctx.log('Stage 6.4 格局', `✅ 正格成立：月令[${mZ.char}]藏干[${best.h}]透出天干，成${role}格。${purityNote}`);
      return { pattern: `${role}格`, type: 'standard', desc: `月令透出${best.h}${purityNote}，成${role}格` };
    }

    if (mZ.isTransformed && mZ.transformedWx !== mZ.originalWx) {
      const role = getShiShenName(dmWx, mZ.transformedWx);
      ctx.log('Stage 6.4 格局', `✅ 正格成立：月令合化${mZ.transformedWx}，以${role}为格。`);
      return { pattern: `${role}格`, type: 'standard', desc: `月令合化，以${role}为格` };
    }

    const mainHiddenChar = DICT.HIDDEN[mZ.char]?.[0] || '';
    const mainRole = mainHiddenChar
      ? getExactShiShenName(dmGan, mainHiddenChar, effectiveMonthWx)
      : getShiShenName(dmWx, effectiveMonthWx);
    ctx.log('Stage 6.4 格局', `⚠️ 正格：月令本气${effectiveMonthWx}取${mainRole}格，藏干未透，格局力量稍弱。`);
    return { pattern: `${mainRole}格`, type: 'standard', desc: `月令本气为${mainRole}，未透` };
  }

  /**
   * detectAndLogSupplementaryPatterns(ctx, nodes, dmWx)
   * Stage 6.5 — 检测并记录旁格（辅助格局参考）。
   *
   * 旁格不覆盖主格，仅作参考标注。按优先顺序检测四类：
   *   1. checkTwoElementPattern  — 两气成象（《滴天髓》）：全局仅含两种五行
   *   2. checkThreeFlowPattern   — 三气流通（《滴天髓》）：三种五行形成生克循环链
   *   3. checkHalfWallPattern    — 半壁格（《滴天髓》两神相持）：两种五行势均力敌
   *   4. checkShenShaPatterns    — 神煞格局：魁罡格/日贵格/专禄格等
   *
   * 每种旁格检测成立后：
   *   - 写入 ctx.supplementaryPatterns 数组（供 renderUI 展示）
   *   - 添加 tag-combo / tag-warn 标签
   *   - 在 Stage 6.5 日志中记录参考用神建议
   */
  function detectAndLogSupplementaryPatterns(ctx, nodes, dmWx) {
    const S = DICT.SHISHEN[dmWx];
    const supplementary = [];

    const twoElem = checkTwoElementPattern(ctx, nodes);
    if (twoElem) {
      const yongHint = `两气中较弱者[${twoElem.wx1}]为补充用神，忌[${twoElem.jiWx.join('')}]破局`;
      ctx.tag('tag-combo', `📖 旁格·${twoElem.pattern}`);
      ctx.log('Stage 6.5 旁格', `📖 [《滴天髓》两气成象] ${twoElem.pattern} 成立：${twoElem.desc}。${twoElem.note}。参考用神建议：${yongHint}。`);
      supplementary.push({ pattern: twoElem.pattern, source: '《滴天髓》两气成象', desc: twoElem.desc, yongHint, type: 'supp_two' });
    }

    const threeFlow = checkThreeFlowPattern(ctx, nodes);
    if (threeFlow) {
      const yongHint = `枢纽[${threeFlow.pivot}]为参考用神，忌[${threeFlow.ji.join('')}]断链`;
      ctx.tag('tag-combo', `📖 旁格·${threeFlow.pattern}`);
      ctx.log('Stage 6.5 旁格', `📖 [《滴天髓》三气流通] ${threeFlow.pattern} 成立：${threeFlow.desc}。参考用神建议：${yongHint}。`);
      supplementary.push({ pattern: threeFlow.pattern, source: '《滴天髓》三气流通', desc: threeFlow.desc, yongHint, type: 'supp_three' });
    }

    const halfWall = checkHalfWallPattern(ctx, nodes);
    if (halfWall) {
      const yongHint = `通关[${halfWall.mediator}]为首要参考用神，略补弱方[${halfWall.weaker}]`;
      ctx.tag('tag-warn', `📖 旁格·${halfWall.name}`);
      ctx.log('Stage 6.5 旁格', `📖 [《滴天髓》两神相持] ${halfWall.pattern} 成立：${halfWall.desc}。参考用神建议：${yongHint}。`);
      supplementary.push({ pattern: halfWall.pattern, source: '《滴天髓》两神相持', desc: halfWall.desc, yongHint, type: 'supp_half' });
    }

    const shenshaPattern = checkShenShaPatterns(ctx, nodes);
    if (shenshaPattern) {
      let yongHint = '';
      const sub = shenshaPattern.sub;
      if (sub === 'kuigang')    yongHint = `参考用神：官杀[${S.off}]制魁罡；忌财[${S.wea}]破格`;
      else if (sub === 'riguì') yongHint = `参考用神：印星[${S.res}]护贵；忌官杀[${S.off}]冲克`;
      else if (sub === 'zhuanlu' || sub === 'guilu') yongHint = `参考用神：食伤[${S.out}]泄秀；忌官杀[${S.off}]攻禄`;
      else yongHint = shenshaPattern.desc;

      ctx.log('Stage 6.5 旁格', `📖 [神煞格局] ${shenshaPattern.pattern}：${shenshaPattern.desc}。参考用神建议：${yongHint}。`);
      supplementary.push({ pattern: shenshaPattern.pattern, source: '神煞格局', desc: shenshaPattern.desc, yongHint, type: 'supp_shensha' });
    }

    ctx.supplementaryPatterns = supplementary;

    if (supplementary.length === 0) {
      ctx.log('Stage 6.5 旁格', `无符合条件的旁格（两气成象/三气流通/半壁格/神煞格局均未达成立标准）。`);
    } else {
      ctx.log('Stage 6.5 旁格', `共检出 ${supplementary.length} 项旁格参考（来源：${supplementary.map(s=>s.source).join('、')}）。主格仍以《子平真诠》判断为准，旁格仅供辅助分析。`);
    }
  }

  /**
   * TIAOHUO — 调候分数表：TIAOHUO[月支][五行] = 调候原始分值（-100~+100）。
   * 反映穷通宝鉴中各月份对每种五行用神的冷热需求（正值=喜，负值=忌）。
   * 极端月份（巳/午/亥/子）分值更大，平和月份（寅/卯/申/酉）适中。
   */
  const TIAOHUO = {
    '子': { '火': 85, '木': 35, '土': 10,  '金':-20, '水':-45 },
    '丑': { '火': 70, '木': 25, '土':  5,  '金':-15, '水':-35 },
    '寅': { '火': 15, '金': 25, '水': 15,  '木':-20, '土':  5 },
    '卯': { '火': 15, '金': 35, '水': 15,  '木':-30, '土':  5 },
    '辰': { '水': 20, '金': 15, '火': 10,  '木':-10, '土':-30 },
    '巳': { '水': 80, '金': 35, '木': 15,  '土':-25, '火':-55 },
    '午': { '水': 90, '金': 35, '木': 15,  '土':-35, '火':-65 },
    '未': { '水': 65, '金': 25, '木': 10,  '土':-50, '火':-40 },
    '申': { '火': 25, '木': 25, '水': 15,  '金':-30, '土':  5 },
    '酉': { '火': 25, '木': 30, '水': 15,  '金':-35, '土':  5 },
    '戌': { '水': 25, '火': 15, '木': 15,  '金':-20, '土':-35 },
    '亥': { '火': 80, '木': 35, '土': 10,  '金':-25, '水':-50 }
  };

  /**
   * PAT_ROLE — 格局角色分数表：PAT_ROLE[格局名][十神角色] = 格局导向分值（-100~+100）。
   * 反映《子平真诠》各格对十神角色的喜忌倾向：正值表示该格喜此角色，负值表示忌。
   * 例：官杀格喜印星(85)、忌食伤(-30)；食神格喜财星(88)、忌印星(-58)。
   * 在 computeWuXingScores 中作为 D2 维度的基础数据。
   */
  const PAT_ROLE = {
    '官杀格': { '印星': 85, '财星': 45, '食伤':-30, '比劫':-30, '官杀': 60 },
    '七杀格': { '印星': 72, '食伤': 55, '财星': 38, '比劫':-25, '官杀': 55 },
    '财格':   { '食伤': 85, '官杀': 60, '比劫':-80, '印星':-40, '财星':  8 },
    '食神格': { '财星': 88, '比劫': 22, '官杀':-35, '印星':-58, '食伤': 72 },
    '伤官格': { '财星': 78, '印星': 58, '比劫': 18, '官杀':-42, '食伤': 68 },
    '印格':   { '官杀': 72, '比劫': 28, '食伤':-22, '财星':-70, '印星':  8 },
    // V3.8 修正：建禄格无财官时食伤为第一用神，食伤分值从42→68，避免"有量"的食伤被D4惩罚后排名落后财星
    '建禄格': { '官杀': 72, '财星': 65, '食伤': 88, '印星':-38, '比劫':-35 },
    '月刃格': { '官杀': 88, '财星': 52, '食伤': 28, '印星':-48, '比劫':-70 }
  };

  function getPatRoleScore(patName, role) {
    if (!patName) return 0;
    let key = '';
    if (patName.includes('月刃')) key = '月刃格';
    else if (patName.includes('建禄') || patName.includes('专禄') || patName.includes('归禄')) key = '建禄格';
    else if (patName.includes('七杀')) key = '七杀格';
    else if (patName.includes('伤官')) key = '伤官格';
    else if (patName.includes('食神') || patName.includes('食')) key = '食神格';
    else if (patName.includes('正官') || patName.includes('官')) key = '官杀格';
    else if (patName.includes('财')) key = '财格';
    else if (patName.includes('印')) key = '印格';
    return (PAT_ROLE[key] && PAT_ROLE[key][role] !== undefined) ? PAT_ROLE[key][role] : 0;
  }

  /**
   * computeWuXingScores (V3.6 调候四档重构版)
   *
   * 核心修复（相较 V3.5）：
   *   1. 权重四档化：调候 w3 按"紧迫程度"分四档，体现命理层级差异
   *
   *      ┌─────────────────────────────────────────────────────────────────┐
   *      │  档位          触发条件                w1    w2    w3    w4    w5│
   *      │  特殊格局      从/专旺/化气            5%   70%    5%   10%   10%│
   *      │  调候为命      穷通宝鉴触发寒冻/酷热   17%  17%   50%    9%    7%│
   *      │  调候重压·子午  子/午月且未达寒冻/酷热  22%  22%   34%   11%   11%│
   *      │  调候轻压·极端  亥/丑/巳/未且未达上档  25%  25%   25%   13%   12%│
   *      │  平和月        寅/卯/辰/申/酉/戌      30%  30%   12%   14%   14%│
   *      └─────────────────────────────────────────────────────────────────┘
   *
   *      命理依据：《穷通宝鉴》明言"调候为急"时（寒冻/酷热），无调候用神
   *      则格局用神再好亦是空谈——调候是存活前提，格局是发展方向，两者
   *      不在同一层级。因此"调候为命"档将 w3 提至 50%（过半），使调候
   *      用神在综合得分中具有压倒性地位，与命理原则一致。
   *      子/午月为寒热之极（寒极/热极），压力远大于亥丑巳未，单独设档。
   *
   * V3.5 继承修复（不变）：
   *   2. D1 极强局修正：月刃格极强时官杀制刃仍得高分
   *   3. D4 月令感知：月令本气不受泛滥惩罚
   *   4. D5 通关：触发阈值 8%
   *   5. 从格/化气/专旺：D1 退位 + D2 主导
   *
   * V3.8 修正：
   *   D4 新增格局用神豁免（isPatternYong：D2>60）：
   *   病神才受泛滥惩罚，用神"有量"是加分项；建禄格食伤等格局正用五行量多不扣分。
   */
  function computeWuXingScores(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx) {
    const WXS = ['木','火','土','金','水'];
    const patName = patternResult?.pattern || '';
    const { wxE, totalE } = ctx._wxCache || getWxEnergyMap(nodes, false, 1.5);
    const results = {};

    // ── 1. 状态感知 ──
    const isQiang  = verdict.includes('身强') || verdict.includes('旺') || verdict.includes('极强');
    const isJiQiang= verdict.includes('极强');
    const isRuo    = verdict.includes('身弱') || verdict.includes('极弱');
    const isCong   = patName.includes('从') || verdict.includes('从');
    const isZhuan  = patName.includes('专旺') || patName.includes('曲直') || patName.includes('炎上') || patName.includes('稼穑') || patName.includes('从革') || patName.includes('润下');
    const isHua    = patName.includes('化气');

    // 极强局的格局类型——月刃格极强时官杀制刃为正用，不可打 0
    const isYueLin = patName.includes('月刃');

    // 从格核心追求角色
    let congRole = '';
    if (isCong) {
        if (patName.includes('财')) congRole = '财星';
        else if (patName.includes('杀') || patName.includes('官')) congRole = '官杀';
        else if (patName.includes('儿') || patName.includes('食') || patName.includes('伤')) congRole = '食伤';
    }

    // ── 2. 动态权重分配（V3.6 四档调候重构） ──
    // 极端寒热月：子丑亥（寒）/ 午巳未（热）
    const monthZhi = nodes.mZ.char;
    const EXTREME_THERMAL_ZHI = new Set(['子','丑','亥','午','巳','未']);
    const isExtremeThermal = EXTREME_THERMAL_ZHI.has(monthZhi);
    // 寒热之极月（子=寒极，午=热极）：比亥丑巳未更极端
    const isPolarThermal = (monthZhi === '子' || monthZhi === '午');

    // 基准权重（平和月：寅/卯/辰/申/酉/戌）
    let w1 = 0.30, w2 = 0.30, w3 = 0.12, w4 = 0.14, w5 = 0.14;

    // 调候档位标签（供日志输出）
    let tiaoWeightLabel = '平和月·调候参考';

    if (isCong || isZhuan || isHua) {
      // 特殊格局：顺势优先，调候退位
      w1 = 0.05; w2 = 0.70; w3 = 0.05; w4 = 0.10; w5 = 0.10;
      tiaoWeightLabel = '特殊格局·顺势主导';
    } else if (ctx.thermalState === '寒冻' || ctx.thermalState === '酷热') {
      // ── 档一：调候为命（穷通宝鉴触发）──
      // 寒冻/酷热是存活前提，格局用神是发展方向，两者不在同一层级。
      // w3 过半（50%），使调候用神在综合得分中具有压倒性地位。
      w1 = 0.17; w2 = 0.17; w3 = 0.50; w4 = 0.09; w5 = 0.07;
      tiaoWeightLabel = `调候为命·${ctx.thermalState}（穷通宝鉴级）`;
    } else if (isPolarThermal) {
      // ── 档二：调候重压·子/午月 ──
      // 子月（寒极）/午月（热极）：调候压力极大，仅因五行配合未达阈值而未触发寒冻/酷热。
      // 调候权重 34%，仅次于"调候为命"档。
      w1 = 0.22; w2 = 0.22; w3 = 0.34; w4 = 0.11; w5 = 0.11;
      tiaoWeightLabel = `调候重压·${monthZhi}月（寒热之极）`;
    } else if (isExtremeThermal) {
      // ── 档三：调候轻压·亥/丑/巳/未月 ──
      // 极端月份但非子午，调候与格局并重（25%:25%）。
      w1 = 0.25; w2 = 0.25; w3 = 0.25; w4 = 0.13; w5 = 0.12;
      tiaoWeightLabel = `调候轻压·${monthZhi}月（极端月）`;
    }
    // ── 档四：平和月——沿用基准权重，调候仅作参考 ──

    // ── 月令本气识别（供 D4 月令感知使用）──
    const monthMainHidden = (DICT.HIDDEN[monthZhi] || [])[0];
    const monthMainWx = monthMainHidden ? DICT.WX[monthMainHidden] : (DICT.WX[monthZhi] || '');

    WXS.forEach(wx => {
      const role  = getShiShenName(dmWx, wx);
      const wxPct = totalE > 0 ? (wxE[wx] || 0) / totalE : 0;

      // ── D1: 旺衰扶抑维度 (0-100) ──
      let D1 = 50;
      if (isCong || isZhuan) {
        D1 = 50; // 特殊格局 D1 退位，由 D2 主导
      } else if (isJiQiang) {
        // V3.5 修正：极强局以格局类型二次判断
        // 月刃格极强 → 官杀制刃为首选正用，不可打 0
        if (isYueLin && role === '官杀') {
          D1 = 80;
        } else if (role === '食伤') {
          D1 = 88; // 泄秀为通用首选
        } else if (role === '官杀') {
          D1 = 15; // 非月刃格极强，官杀克身为忌（但非 0，留余地）
        } else if (role === '财星') {
          D1 = 42; // 财引食伤，中性偏用
        } else {
          D1 = 50;
        }
      } else if (isQiang) {
        if (['官杀', '食伤', '财星'].includes(role)) D1 = Math.max(30, 85 - (wxPct * 50));
        if (['印星', '比劫'].includes(role)) D1 = 15;
      } else if (isRuo) {
        if (['印星', '比劫'].includes(role)) D1 = Math.max(30, 85 - (wxPct * 30));
        if (['官杀', '食伤', '财星'].includes(role)) D1 = 15;
      }

      // 极弱见重官杀：近于危局
      if (isRuo && role === '官杀' && wxPct > 0.25) D1 = 5;
      // 印旺母慈灭子：印过多反为病
      if (role === '印星' && wxPct > 0.40 && !isRuo) D1 = 10;

      // ── D2: 格局喜忌维度 (0-100) ──
      let D2 = 50;
      const bs = ctx.breakStatus;

      if (isCong) {
        if (role === congRole) D2 = 100;
        else if (role === '印星' || role === '比劫') D2 = 0;
        else D2 = 70;
      } else if (isZhuan) {
        if (wx === dmWx) D2 = 100;
        else if (role === '印星' || role === '食伤') D2 = 80;
        else D2 = 0;
      } else if (bs && bs.isBroken && bs.rescueType !== 'none') {
        if (wx === bs.rescuerWx) D2 = 100;
        else if (wx === bs.breakerWx) D2 = 0;
        else D2 = 50;
      } else {
        const rawD2 = getPatRoleScore(patName, role);
        D2 = Math.max(0, Math.min(100, (rawD2 + 100) / 2));
      }

      // ── D3: 调候维度 (0-100) ──
      const tiaoRaw = (TIAOHUO[monthZhi] || {})[wx] ?? 0;
      let D3 = Math.max(0, Math.min(100, 50 + tiaoRaw));

      // ── D4: 病药生机维度 (0-100) — V3.8 格局用神豁免修正 ──
      // 核心原则：月令当令之气力量大是正常现象（"得令"），不应受泛滥惩罚；
      // 惩罚仅针对非月令的高占比五行（群聚而无令）。
      // V3.8 新增：D2>60 的格局积极五行（用神）亦豁免泛滥惩罚——
      //   病神才需要惩罚多，用神"有量"是加分项而非减分项。
      let D4 = 50;
      const hasRootOrStem = Object.values(nodes).some(n =>
        (n.type === '干' && n.effectiveWx === wx && n.isActive() && !n.isVoid) ||
        (n.type === '支' && n.isActive() && !n.isVoid && (DICT.HIDDEN[n.char]||[]).some(h => h && DICT.WX[h] === wx))
      );
      // 当前五行是否为月令本气（月支主气）
      const isMonthMainQi = (monthMainWx === wx);
      // 核心用神豁免（从格/专旺）
      const isAbsoluteYong = (isZhuan && wx === dmWx) || (isCong && role === congRole);
      // V3.8：格局积极用神豁免——D2 高分表明该五行是格局正用，"量多"是优点而非病症
      // 注意：此处 D2 已在上方计算完毕，可直接引用
      const isPatternYong = (D2 > 60);

      if (isAbsoluteYong) {
        D4 = 92; // 核心用神越多越好，豁免一切惩罚
      } else if (wxPct === 0) {
        // 命局完全无此五行：有透干/通根则"隐而有用"，否则"虚而无源"
        D4 = hasRootOrStem ? 58 : 12;
      } else if (wxPct <= 0.12) {
        D4 = 88; // 适量，最佳区间
      } else if (wxPct <= 0.25) {
        D4 = 70; // 偏多，尚可
      } else {
        // wxPct > 0.25（偏旺区间）：
        //   月令本气 → 得令宽容；
        //   格局用神（D2>60）→ 有量为佳，豁免惩罚；
        //   病神（既非月令本气又非格局用神）→ 施以惩罚
        D4 = (isMonthMainQi || isPatternYong) ? 72 : 22;
      }

      // ── D5: 通关化解维度 (0-100) — V3.5 降低阈值 ──
      // V3.4 阈值 15%（导致大量真实交战格局通关缺失）→ V3.5 降至 8%
      let maxD5 = 50;
      const TONG_GUAN = {
        '金木':'水','木金':'水','水火':'木','火水':'木',
        '木土':'火','土木':'火','土水':'金','水土':'金',
        '火金':'土','金火':'土'
      };

      Object.entries(TONG_GUAN).forEach(([pair, mediator]) => {
        if (wx !== mediator) return;
        const eA = totalE > 0 ? (wxE[pair[0]] || 0) / totalE : 0;
        const eB = totalE > 0 ? (wxE[pair[1]] || 0) / totalE : 0;
        // 阈值 8%：双方均有势力即认定存在交战
        if (eA > 0.08 && eB > 0.08) {
          // 势均力敌（各 25% 以上）→ 通关需求极强；一强一弱 → 中度
          const conflictIntensity = Math.min(eA, eB);
          // 8%→约 74 分，15%→约 95 分，25%→100 分上限
          const score = 50 + (conflictIntensity * 300);
          maxD5 = Math.max(maxD5, Math.min(100, score));
        }
      });
      const D5 = maxD5;

      // ── 3. 综合加权得分 ──
      const total = (D1 * w1) + (D2 * w2) + (D3 * w3) + (D4 * w4) + (D5 * w5);
      results[wx] = {
        total,
        D1: Math.round(D1), D2: Math.round(D2), D3: Math.round(D3),
        D4: Math.round(D4), D5: Math.round(D5), role,
        weights: { w1, w2, w3, w4, w5 }
      };
    });

    // ── 4. 权重档位日志（仅输出一次，用首个循环后记录） ──
    ctx.log('Stage 7.5 权重', `⚖️ 权重档位：${tiaoWeightLabel} → 扶抑${Math.round(w1*100)}% / 格局${Math.round(w2*100)}% / 调候${Math.round(w3*100)}% / 病药${Math.round(w4*100)}% / 通关${Math.round(w5*100)}%`);

    return results;
  }

  /**
   * determineTriGodsSystem(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx)
   * Stage 7.0 — 确定喜用神体系（用神/喜神/忌神/闲神）。
   *
   * 优先级（从高到低）：
   *   1. 调候优先（寒冻/酷热）：格局未成特殊格时，直接采用穷通宝鉴调候推荐
   *   2. 五行极端状态：母慈灭子/被抽干/被反噬/衰神激旺 各有专门的喜忌逻辑
   *   3. 化气格：以化神为核心构建喜忌体系
   *   4. 专旺格：顺旺神之势，忌克旺神的五行
   *   5. 从格（从财/从食伤/从官杀）：随强者，忌帮弱方的五行
   *   6. 普通格局（子平真诠正格逻辑）：由 zipingYongShenRules 细分处理
   *
   * 返回：{ yongShen, xiShen, jiShen, xianShen }
   *   每项为 [{wx:'木', role:'食伤'}, ...] 结构
   *
   * V3.3 升级：双轨并行仲裁架构
   *   原"调候一刀切早返回"改为：暂存调候方案 → 子平主逻辑跑完 → Stage 7.2 仲裁融合
   *   三种仲裁结果：
   *     ① 调候用神 ∈ 格局喜用 → "调候格局同归，上佳之造"，强化用神
   *     ② 调候用神 ∈ 格局忌神 → "调候与格局交战"，在忌神上标注(调候极需)
   *     ③ 调候用神 ∈ 格局闲神 → 将闲神提拔为喜神（调候喜神）
   */
  function determineTriGodsSystem(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx) {
    let gods = { yongShen: [], xiShen: [], jiShen: [], xianShen: [] };
    const { thermalState } = ctx;
    const S = DICT.SHISHEN[dmWx];
    const wrap = (arr) => [...new Set(arr)].filter(Boolean).map(wx => ({ wx, role: getShiShenName(dmWx, wx) }));

    // ==========================================
    // 轨 1：调候暂存（不再早返回，仅记录待仲裁）
    // ==========================================
    let tiaoHouRx = null;
    const isSpecialPattern = patternResult?.type === 'special' || patternResult?.type === 'special_shensha';

    if (thermalState === '寒冻') {
      if (isSpecialPattern) {
        ctx.log('Stage 7.0 喜用', `❄️ 调候寒冻检出，但命局已成[${patternResult.pattern}]，格局优先于调候，从格局用神逻辑处理。`);
      } else {
        tiaoHouRx = ctx.tiaohuoRx || { yong:'火', xi:'木', ji:['水','金'], desc:'寒冻以火暖局为先' };
        ctx.log('Stage 7.0 喜用', `❄️ 寒冻调候（穷通宝鉴）暂存待仲裁：${tiaoHouRx.desc}（将与子平格局并轨融合）`);
      }
    }
    if (thermalState === '酷热') {
      if (isSpecialPattern) {
        ctx.log('Stage 7.0 喜用', `🔥 调候酷热检出，但命局已成[${patternResult.pattern}]，格局优先，从格局用神逻辑处理。`);
      } else {
        tiaoHouRx = ctx.tiaohuoRx || { yong:'水', xi:'金', ji:['火','土'], desc:'酷热以水润局为先' };
        ctx.log('Stage 7.0 喜用', `🔥 酷热调候（穷通宝鉴）暂存待仲裁：${tiaoHouRx.desc}（将与子平格局并轨融合）`);
      }
    }
    if (ctx.logs.some(l => l.msg.includes('母慈灭子'))) {
      ctx.log('Stage 7.0 喜用', `⚠️ 母慈灭子格局：印旺为重病，首取财星（${S.wea}）破印救身为用；比劫（${dmWx}）分担印星生扶之力为喜；官杀（${S.off}）生印助纣为虐，必为大忌。`);
      gods.yongShen = wrap([S.wea]);           
      gods.xiShen   = wrap([dmWx, S.out]);     
      gods.jiShen   = wrap([S.res, S.off]);    
      gods.xianShen = wrap([]);
      return gods;
    }
    if (ctx.logs.some(l => l.msg.includes('被抽干'))) {
      ctx.log('Stage 7.0 喜用', `⚠️ 子旺母衰格局：食伤极旺抽干日主，首取印星（${S.res}）制食救身为用；比劫虽能帮身但易被食伤化泄，仅作闲神；财（${S.wea}）官（${S.off}）皆为大忌。`);
      gods.yongShen = wrap([S.res]);        
      gods.xiShen   = wrap([]);             
      gods.jiShen   = wrap([S.out, S.wea, S.off]); 
      gods.xianShen = wrap([dmWx]);         
      return gods;
    }
    if (ctx.logs.some(l => l.msg.includes('被反噬'))) {
      ctx.log('Stage 7.0 喜用', `⚠️ 财重压身格局：财星极旺反克日主，首取比劫（${dmWx}）帮身分财为用；印星（${S.res}）虽能生身但需防财星破印，作喜神；官杀（${S.off}）、食伤（${S.out}）皆为忌。`);
      gods.yongShen = wrap([dmWx]);         
      gods.xiShen   = wrap([S.res]);        
      gods.jiShen   = wrap([S.wea, S.off, S.out]); 
      gods.xianShen = wrap([]);
      return gods;
    }
    if (ctx.logs.some(l => l.msg.includes('衰神激旺'))) {
      ctx.log('Stage 7.0 喜用', `🌋 犯旺格局：极旺之神被微弱衰神激怒，不可逆其锋芒，唯有食伤（${S.out}）顺流泄秀为用；财星（${S.wea}）化解为喜；官杀（${S.off}）惹祸为绝忌。`);
      gods.yongShen = wrap([S.out]);        
      gods.xiShen   = wrap([S.wea]);        
      gods.jiShen   = wrap([S.off, S.res]); 
      gods.xianShen = wrap([dmWx]);
      return gods;
    }
    if (patternResult?.type === 'special' && patternResult.pattern.includes('化气格')) {
      const huaWx = patternResult.pattern.charAt(0);
      const HS = DICT.SHISHEN[huaWx];
      if (HS) {
        ctx.log('Stage 7.0 喜用', `🔄 化气格[${huaWx}化]：化神（${huaWx}）为用，生化神者（${HS.res}）为喜；克化神（${HS.off}）、耗化神（${HS.wea}）为忌；化神食伤（${HS.out}）为闲。`);
        gods.yongShen = wrap([huaWx]);
        gods.xiShen   = wrap([HS.res]);
        gods.jiShen   = wrap([HS.off, HS.wea]);
        gods.xianShen = wrap([HS.out]);
      }
      return gods;
    }
    if (verdict.includes('专旺格')) {
      ctx.log('Stage 7.0 喜用', `⭐ 专旺格（${patternResult.pattern}）：旺神（${dmWx}）顺势为用；印星（${S.res}）生旺为喜；食伤（${S.out}）顺流泄秀亦为喜；官杀（${S.off}）、财星（${S.wea}）破格为大忌。`);
      gods.yongShen = wrap([dmWx]);
      gods.xiShen   = wrap([S.res, S.out]); 
      gods.jiShen   = wrap([S.off, S.wea]);
      gods.xianShen = wrap([]);
      return gods;
    }
    if (verdict.includes('从格') || (patternResult?.type === 'special' && patternResult.pattern.includes('从'))) {
      const patName = patternResult?.pattern || '';
      let logDesc = '';
      if (patName.includes('财')) {
        logDesc = `从财格：财星（${S.wea}）为用神，食伤（${S.out}）生财为喜；印星（${S.res}）克财、比劫（${dmWx}）争财为忌；官杀（${S.off}）护财为闲。`;
        gods.yongShen = wrap([S.wea]); gods.xiShen = wrap([S.out]); gods.jiShen = wrap([S.res, dmWx]); gods.xianShen = wrap([S.off]);
      } else if (patName.includes('食') || patName.includes('伤') || patName.includes('儿')) {
        logDesc = `从食伤格：食伤（${S.out}）为用神，财星（${S.wea}）顺食伤之秀为喜，比劫生食伤亦为喜；印星（${S.res}）克制食伤为大忌；官杀（${S.off}）制身助食伤为闲。`;
        gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea, dmWx]); gods.jiShen = wrap([S.res]); gods.xianShen = wrap([S.off]);
      } else if (patName.includes('官') || patName.includes('杀')) {
        logDesc = `从官杀格：官杀（${S.off}）为用神，财星（${S.wea}）生官为喜；食伤（${S.out}）制官为大忌，比劫（${dmWx}）助身反从为忌；印星（${S.res}）化官生身，不利从局，列为次忌。`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.out, dmWx, S.res]); gods.xianShen = wrap([]);
      }

      if (logDesc) {
        ctx.log('Stage 7.0 喜用', logDesc);
        return gods;
      } else {
        // V3.5 修复：从格标注存在但无法匹配具体子类（如"偏从格"/"假从格"）
        // 不再静默跳出，而是显式记录并由子平真诠普通逻辑接管
        ctx.log('Stage 7.0 喜用', `⚠️ 从格标注[${patName}]无法匹配具体财/食伤/官杀子类，降级由子平真诠普通逻辑接管，以旺衰论用。`);
        // 继续向下执行子平主逻辑，不 return
      }
    }

    ctx.log('Stage 7.0 喜用', `📖 子平真诠用神规则启动：格局[${patternResult?.pattern||'?'}] · 旺衰[${verdict}]`);
    const { gods: zpGods, explanation: zpExpl, xiangShen: zpXiang } =
      zipingYongShenRules(dmWx, verdict, patternResult, nodes, allyScore, enemyScore, ctx);
    gods.yongShen = zpGods.yongShen;
    gods.xiShen   = zpGods.xiShen;
    gods.jiShen   = zpGods.jiShen;
    gods.xianShen = zpGods.xianShen;

    ctx.log('Stage 7.1 推导', `📖 ${zpExpl}`);
    if (zpXiang) ctx.log('Stage 7.1 相神', `🔗 相神：${zpXiang}`);

    const mf = patternResult?.minorFlag || '';
    const mqIsQiang = verdict.includes('身强') || verdict.includes('旺') || verdict.includes('极强') || verdict.includes('专旺');
    if (mf.includes('杀印相生') && !mqIsQiang && !gods.yongShen.some(g => g.wx === S.res)) {
      gods.yongShen = wrap([S.res]);
      gods.xiShen   = wrap([S.off, dmWx]);
      gods.jiShen   = wrap([S.wea]);
      gods.xianShen = wrap([S.out]);
      ctx.log('Stage 7.2 修正', `🔗 次级格局「杀印相生」修正：印星[${S.res}]升为用神，官杀[${S.off}]为相，财[${S.wea}]破印为大忌。（日主非身强，覆盖生效）`);
    } else if (mf.includes('杀印相生') && mqIsQiang) {
      ctx.log('Stage 7.2 修正', `⚠️ 次级格局标注含「杀印相生」，但日主身强，杀印相生不适用，维持食制杀用神体系，忽略此覆盖。`);
    }
    if (mf.includes('财官双美') && mqIsQiang) {
      ctx.log('Stage 7.2 修正', `👑 次级格局「财官双美」：财[${S.wea}]官[${S.off}]互生，均列喜用，身强可并重。`);
    }

    // ==========================================
    // Stage 7.2 仲裁：调候 vs 子平格局双轨融合（V3.3新增，V3.5修订）
    // 仅在寒冻/酷热且非特殊格局时触发（tiaoHouRx 已于上方暂存）
    // ==========================================
    if (tiaoHouRx) {
      const tiaoYongWx = tiaoHouRx.yong; // 调候最急需的五行
      const isZpYongXi = gods.yongShen.some(g => g.wx === tiaoYongWx) || gods.xiShen.some(g => g.wx === tiaoYongWx);
      const isZpJi     = gods.jiShen.some(g => g.wx === tiaoYongWx);
      const isZpXian   = gods.xianShen.some(g => g.wx === tiaoYongWx);

      // V3.5 新增：检查命局中此五行是否实际存在（有透干或有地支通根）
      const tiaoWxExistsInChart = Object.values(ctx.nodes).some(n =>
        n.isActive() && !n.isVoid && (
          (n.type === '干' && n.effectiveWx === tiaoYongWx) ||
          (n.type === '支' && (DICT.HIDDEN[n.char]||[]).some(h => h && DICT.WX[h] === tiaoYongWx))
        )
      );

      if (isZpYongXi) {
        ctx.log('Stage 7.2 仲裁', `✨ 【调候格局同归】：调候极需[${tiaoYongWx}]，且在子平格局中亦为喜用神。两派同指一途，此乃上佳之造——得此五行，既成事业，亦顺身心。`);
        ctx.tag('tag-combo', `✨ 调候格局同归·${tiaoYongWx}`);
      } else if (isZpJi) {
        ctx.log('Stage 7.2 仲裁', `⚔️ 【调候与格局交战】：调候急需[${tiaoYongWx}]暖润保命，但在子平格局中[${tiaoYongWx}]恰为破格忌神！命主一生面临两难：追求安逸（顺调候）则事业格局受损；强攻事业（避调候忌）则身心受气候煎熬。`);
        ctx.tag('tag-warn', `⚔️ 调候格局交战·${tiaoYongWx}`);
        // 在忌神条目上标注"调候极需"，提示用户这个五行的矛盾性
        gods.jiShen.forEach(g => { if (g.wx === tiaoYongWx) g.role += '(调候极需)'; });
      } else if (isZpXian) {
        ctx.log('Stage 7.2 仲裁', `🤝 【调候提携闲神】：调候急需[${tiaoYongWx}]，虽在格局中原本列为闲神，但气候恶劣之局，此五行已因调候之急而跃升为重要资源，提拔为"调候喜神"。`);
        ctx.tag('tag-info', `🤝 调候提携·${tiaoYongWx}`);
        // 将闲神提拔为喜神
        gods.xianShen = gods.xianShen.filter(g => g.wx !== tiaoYongWx);
        gods.xiShen.push({ wx: tiaoYongWx, role: '调候喜神' });
      } else if (!tiaoWxExistsInChart) {
        // V3.5 修复：调候用神在命局中根本不存在（既无透干又无地支藏根）
        // 此时不宜直接推入喜神（虚而无根），而是记录为"大运流年补救方向"
        ctx.log('Stage 7.2 仲裁', `📌 【调候缺位】：调候急需[${tiaoYongWx}]，但命局中此五行既未透干，亦无地支藏根，先天缺失。不宜列为当下喜用（虚而无源），须待大运、流年引入此五行方能补救。`);
        ctx.tag('tag-warn', `⚠️ 调候缺位·命局无${tiaoYongWx}`);
        // 在格局用神列表末尾附注（不直接推入 xiShen）
        gods.xianShen.push({ wx: tiaoYongWx, role: '调候缺位(大运补)' });
      } else {
        // 调候用神在格局推演中未被定性，但命局中实际存在
        ctx.log('Stage 7.2 仲裁', `📌 【调候补位】：调候急需[${tiaoYongWx}]，格局推演中该五行未被定性，命局中有根有气，直接补入喜神序列作调候喜神。`);
        gods.xiShen.push({ wx: tiaoYongWx, role: '调候喜神' });
      }
    }

    const monthZhi = ctx.nodes.mZ.char;
    const tiaoNote = (TIAOHUO[monthZhi] || {});
    const tiaoItems = Object.entries(tiaoNote).filter(([,v]) => Math.abs(v) >= 40)
                        .sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
    if (tiaoItems.length > 0) {
      const tiaoStr = tiaoItems.map(([wx, v]) => `${wx}${v > 0 ? '喜' : '忌'}(${v > 0 ? '+' : ''}${v})`).join(' ');
      const tiaoCtxNote = tiaoHouRx
        ? `（已完成双轨仲裁，见Stage 7.2）`
        : `子平真诠格局用神已确定，调候仅供辅助印证。`;
      ctx.log('Stage 7.3 调候', `🌡️ 《穷通宝鉴》调候参考（${monthZhi}月）：${tiaoStr}。${tiaoCtxNote}`);
    }

    ctx.log('Stage 7.4 喜用',
      `用神[《子平真诠》]:${gods.yongShen.map(g=>g.wx).join('')}  ` +
      `喜神:${gods.xiShen.map(g=>g.wx).join('') || '无'}  ` +
      `忌神:${gods.jiShen.map(g=>g.wx).join('') || '无'}  ` +
      `闲神:${gods.xianShen.map(g=>g.wx).join('') || '无'}`
    );

    // ==========================================
    // Stage 7.6 量化：唤醒动态五维打分引擎进行印证
    // ==========================================
    try {
      const wxScores = computeWuXingScores(dmWx, verdict, nodes, allyScore, enemyScore, patternResult, ctx);
      
      // 按总分降序排列
      const sortedScores = Object.entries(wxScores).sort((a, b) => b[1].total - a[1].total);
      const top1 = sortedScores[0]; // 得分最高的五行 (用神候选)
      const top2 = sortedScores[1]; // 次高 (喜神候选)
      const bottom = sortedScores[4]; // 最低 (大忌神候选)

      // 提取动态权重（转换为百分比显示）
      const { w1, w2, w3, w4, w5 } = top1[1].weights;
      const wStr = `权配:[扶抑${Math.round(w1*100)}%/格局${Math.round(w2*100)}%/调候${Math.round(w3*100)}%/病药${Math.round(w4*100)}%/通关${Math.round(w5*100)}%]`;

      // 明细分
      const detailStr = `(扶抑${top1[1].D1} 格局${top1[1].D2} 调候${top1[1].D3} 病药${top1[1].D4} 通关${top1[1].D5})`;

      // 对比《子平真诠》结果，如果不一致，给出智能提醒
      const isMatch = gods.yongShen.some(g => g.wx === top1[0]);
      let matchNote = isMatch 
        ? "与子平主逻辑高度吻合。" 
        : `提示：子平法取[${gods.yongShen.map(g=>g.wx).join('')}]，量化系统另辟蹊径，可作奇门参考。`;

      ctx.log('Stage 7.6 量化', 
        `📊 五维张量交叉印证 ${wStr}：系统测算最佳五行势能为 [${top1[0]}] (总分${Math.round(top1[1].total)} ${detailStr})，大忌 [${bottom[0]}] (${Math.round(bottom[1].total)}分)。${matchNote}`
      );

      // 存入 ctx 供 renderUI 渲染综合用神看板
      ctx.quantResult = {
        top1: { wx: top1[0], score: Math.round(top1[1].total), D1: top1[1].D1, D2: top1[1].D2, D3: top1[1].D3, role: top1[1].role },
        top2: { wx: top2[0], score: Math.round(top2[1].total), role: top2[1].role },
        bottom: { wx: bottom[0], score: Math.round(bottom[1].total), role: bottom[1].role },
        isMatch,
        zpYong: gods.yongShen.map(g => g.wx).join(''),
        zpJi:   gods.jiShen.map(g => g.wx).join(''),
        weights: { w1, w2, w3, w4, w5 }
      };

      // tag 区展示
      ctx.tag(isMatch ? 'tag-info' : 'tag-warn', `📊 算法测算用神: ${top1[0]}`);

    } catch (e) {
      console.warn("量化打分系统执行跳过", e);
    }

    return gods;
  }

  /**
   * checkPatternBreakStatus(patternResult, nodes, dmWx, ctx, verdict)
   * ══════════════════════════════════════════════════════════════════
   * V3.0 破格救应引擎 — 基于《子平真诠》"成格看破格，破格看救应"原则。
   *
   * 处理流程：
   *   1. 分析当前格局的"格神"（用以成格的核心十神角色）
   *   2. 检查命局是否存在忌神克破格神
   *   3. 若有破格，再看是否有"救应神"制住忌神或护住格神
   *   4. 返回 { isBroken, breakerWx, rescuerWx, rescueType, breakScenario, gradeHint }
   *
   * rescueType：
   *   'full'    — 救应充分，格局瑕不掩瑜
   *   'partial' — 救应不足，格局受损但仍可用
   *   'none'    — 无救应，格局破败，改以旺衰论用
   *
   * breakScenario — 供 getRescueGods 路由到对应救应逻辑的标记字符串，
   *   如 'officialBrokenByFoodGod' / 'wealthBrokenByCompare' 等。
   *
   * 辅助内部函数：
   *   stemEffective(wx) — 判断某五行是否有效透干（透干 AND 五行占比>7%）
   *   branchMain(wx)    — 判断某五行在四地支中是否有本气通根
   *
   * 《子平真诠》：格局成，取格神为用；格神受忌神所破，看是否有救应。
   * 有救应 → 救应神升为用神，格局瑕疵但仍成；
   * 无救应 → 格局破败，改以旺衰论用。
   * ══════════════════════════════════════════════════════════════════
   */
  function checkPatternBreakStatus(patternResult, nodes, dmWx, ctx, verdict) {
    verdict = verdict || '';
    const S = DICT.SHISHEN[dmWx];
    const patName = patternResult?.pattern || '';
    const { wxE, totalE } = getWxEnergyMap(nodes);
    const pct = wx => totalE > 0 ? (wxE[wx] || 0) / totalE : 0;

    const out = { isBroken: false, breakerWx: null, breakerDesc: '', rescuerWx: null, rescuerDesc: '',
                  rescueType: 'none',   // 'full' | 'partial' | 'none'
                  breakScenario: '',    // 供 getRescueGods 路由
                  gradeHint: '' };

    // ── 天干是否有力透出（不仅透干，且五行占比足够压制）──
    const stemEffective = (wx) => {
      const has = [nodes.yG, nodes.mG, nodes.hG].some(g => g.isActive() && !g.isVoid && g.effectiveWx === wx);
      return has && pct(wx) > 0.07;
    };
    // ── 地支是否以本气为主（主气通根）──
    const branchMain = (wx) => {
      return [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ].some(z => {
        if (!z.isActive() || z.isVoid) return false;
        const h0 = (DICT.HIDDEN[z.char] || [])[0];
        return h0 && DICT.WX[h0] === wx;
      });
    };

    const offPct  = pct(S.off);
    const resPct  = pct(S.res);
    const outPct  = pct(S.out);
    const weaPct  = pct(S.wea);
    const selfPct = pct(dmWx);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 1. 正官格 — 破格：食伤透干克官
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    if (patName.includes('正官') && !patName.includes('七杀') && !patName.includes('伤官')) {
      if (outPct > 0.10 && stemEffective(S.out)) {
        out.isBroken = true;
        out.breakerWx = S.out;
        out.breakerDesc = `食伤(${S.out}·${Math.round(outPct*100)}%)透干制官，正官格用神被破`;
        out.breakScenario = 'SI_KE_GUAN';
        if (resPct > 0.09 && (stemEffective(S.res) || resPct > outPct * 0.9)) {
          out.rescuerWx = S.res;
          out.rescuerDesc = `印星(${S.res}·${Math.round(resPct*100)}%)制食伤，护住官星`;
          out.rescueType  = resPct >= outPct * 1.1 ? 'full' : 'partial';
          out.gradeHint   = out.rescueType === 'full' ? '官格有印护，格局完整' : '官格被食制、印救之，格有瑕';
        } else {
          out.gradeHint = '正官格食伤破格，无印救应，格局破败';
        }
        return out;
      }
      // ── 官杀混杂：七杀透干（《子平真诠》"正官不可见杀"）──
      // 七杀 = S.off 五行 + 与日主同阴阳（同性相克为杀）
      const dmYY_gc = YY_MAP[nodes.dG.char];
      const hasQiShaStem = [nodes.yG, nodes.mG, nodes.hG].some(g =>
        g.isActive() && !g.isVoid && g.effectiveWx === S.off && YY_MAP[g.char] === dmYY_gc
      );
      if (hasQiShaStem && offPct > 0.08) {
        out.isBroken = true;
        out.breakerWx = S.off;
        out.breakerDesc = `七杀(${S.off}·${Math.round(offPct*100)}%)透干与正官并见，官杀混杂，正官格破`;
        out.breakScenario = 'QISHA_HUN_GUAN';
        if (outPct > 0.09 && stemEffective(S.out)) {
          out.rescuerWx = S.out;
          out.rescuerDesc = `食伤(${S.out}·${Math.round(outPct*100)}%)制七杀留正官，官杀分途，格局有救`;
          out.rescueType = outPct >= offPct * 0.60 ? 'full' : 'partial';
          out.gradeHint = out.rescueType === 'full' ? '官杀混杂，食伤制杀留官，格局有救' : '官杀混杂，食伤制杀但力弱，格有瑕疵';
        } else {
          out.gradeHint = '正官格官杀混杂，无食伤制杀，官杀相混格局破败';
        }
        return out;
      }
      // 比劫过旺令官难制
      if (selfPct > 0.30 && stemEffective(dmWx) && offPct < 0.12) {
        out.isBroken = true;
        out.breakerWx = dmWx;
        out.breakerDesc = `比劫(${dmWx}·${Math.round(selfPct*100)}%)旺透，官星无力制众，官格力量大减`;
        out.breakScenario = 'BIJIE_HUN_GUAN';
        if (resPct > 0.12) {
          out.rescuerWx = S.res;
          out.rescuerDesc = `印星(${S.res}·${Math.round(resPct*100)}%)化比劫为气势，缓解比劫混杂`;
          out.rescueType = 'partial';
          out.gradeHint = '官格比劫混，印化之，格有瑕';
        } else { out.gradeHint = '官格比劫争官，无印化解，格局减弱'; }
        return out;
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 2. 七杀格 — 两种用神路径，各有破格
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const isQiSha = patName.includes('七杀') || patName.includes('官杀格');
    if (isQiSha) {
      const verdictLocal = verdict;
      const isRuoLocal   = verdict.includes('身弱') || verdict.includes('极弱');
      const hasYinXiangLocal = resPct > 0.16 && offPct > 0.08;

      if (!isRuoLocal && !hasYinXiangLocal) {
        // 食制杀路径：印透干夺食（枭印破食制）
        if (resPct > 0.10 && stemEffective(S.res) && outPct > 0.07) {
          const yinDominates = resPct >= outPct * 0.85;
          if (yinDominates) {
            out.isBroken = true;
            out.breakerWx = S.res;
            out.breakerDesc = `印星(${S.res}·${Math.round(resPct*100)}%)透干压制食伤，枭印夺食，食制杀格用神（食伤）被夺`;
            out.breakScenario = 'YIN_DUO_SHI_SHA';
            if (weaPct > 0.09) {
              out.rescuerWx = S.wea;
              out.rescuerDesc = `财星(${S.wea}·${Math.round(weaPct*100)}%)克印(枭)，保住食神制杀之功`;
              out.rescueType = weaPct >= resPct * 0.85 ? 'full' : 'partial';
              out.gradeHint = out.rescueType === 'full' ? '食制杀被枭破，财救之，格局有救' : '食制杀被枭破，财救但力弱，格有瑕疵';
            } else {
              out.gradeHint = '七杀格食制杀，枭印夺食，无财救应，七杀无制，格局破败险局';
            }
            return out;
          }
        }
      }
      if (isRuoLocal || hasYinXiangLocal) {
        // 杀印相生路径：财透干破印
        if (weaPct > 0.11 && stemEffective(S.wea)) {
          out.isBroken = true;
          out.breakerWx = S.wea;
          out.breakerDesc = `财星(${S.wea}·${Math.round(weaPct*100)}%)透干破印，杀印相生链条断裂，印护身之功失`;
          out.breakScenario = 'CAI_PO_YIN_SHA';
          if (selfPct > 0.12 || (branchMain(dmWx))) {
            out.rescuerWx = dmWx;
            out.rescuerDesc = `比劫(${dmWx}·${Math.round(selfPct*100)}%)制财，保住印星护身`;
            out.rescueType = selfPct > weaPct * 0.8 ? 'full' : 'partial';
            out.gradeHint = out.rescueType === 'full' ? '杀印相生被财破，比劫救印，格局有救' : '杀印相生被财破，比劫力弱，格有瑕疵';
          } else {
            out.gradeHint = '杀印相生被财破，无比劫救应，印星被财制，格局破败';
          }
          return out;
        }
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 3. 财格 — 破格：比劫群争
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const isCaiGe = (patName.includes('财格') || (patName.includes('财') && patternResult?.type === 'standard')) && !patName.includes('印') && !patName.includes('从');
    if (isCaiGe) {
      if (selfPct > 0.22 && stemEffective(dmWx)) {
        out.isBroken = true;
        out.breakerWx = dmWx;
        out.breakerDesc = `比劫(${dmWx}·${Math.round(selfPct*100)}%)透干争财，财格用神（财星）被竞争`;
        out.breakScenario = 'BIJIE_ZHENG_CAI';
        if (offPct > 0.08) {
          out.rescuerWx = S.off;
          out.rescuerDesc = `官杀(${S.off}·${Math.round(offPct*100)}%)制比劫，护住财星`;
          out.rescueType = offPct >= selfPct * 0.55 ? 'full' : 'partial';
          out.gradeHint = out.rescueType === 'full' ? '财格比劫争，官制比护财，格局有救' : '财格比劫争，官制力弱，格有瑕疵';
        } else {
          out.gradeHint = '财格比劫争财，无官制比，财星受群劫，格局破';
        }
        return out;
      }
      // ── 财旺生杀：财格七杀透干，财党杀生克身（《子平真诠》财格大忌）──
      const dmYY_cg = YY_MAP[nodes.dG.char];
      const hasQiShaStemCai = [nodes.yG, nodes.mG, nodes.hG].some(g =>
        g.isActive() && !g.isVoid && g.effectiveWx === S.off && YY_MAP[g.char] === dmYY_cg
      );
      if (hasQiShaStemCai && offPct > 0.11) {
        out.isBroken = true;
        out.breakerWx = S.off;
        out.breakerDesc = `七杀(${S.off}·${Math.round(offPct*100)}%)透干，财旺生七杀克身，财格破格`;
        out.breakScenario = 'CAI_SHENG_SHA';
        if (outPct > 0.09 && stemEffective(S.out)) {
          out.rescuerWx = S.out;
          out.rescuerDesc = `食伤(${S.out}·${Math.round(outPct*100)}%)制杀，消七杀之祸，财格得救`;
          out.rescueType = outPct >= offPct * 0.65 ? 'full' : 'partial';
          out.gradeHint = out.rescueType === 'full' ? '财旺生七杀，食伤制杀救格，格局有救' : '财旺生七杀，食伤制杀力弱，格有瑕疵';
        } else {
          out.gradeHint = '财格财旺生七杀，无食伤制杀，日主受克，格局破败';
        }
        return out;
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 4. 食神格 — 破格：偏印枭神夺食
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    if (patName.includes('食神') && !patName.includes('伤官')) {
      if (resPct > 0.12 && stemEffective(S.res) && outPct > 0.06) {
        const xuoRatio = resPct / Math.max(outPct, 0.01);
        if (xuoRatio > 0.9) {   // 印星对食伤比超过0.9才构成"夺食"
          out.isBroken = true;
          out.breakerWx = S.res;
          out.breakerDesc = `偏印枭神(${S.res}·${Math.round(resPct*100)}%)透干压制食神，食神格用神被夺，生财之道断`;
          out.breakScenario = 'YIN_DUO_SHI_SHISHEN';
          if (weaPct > 0.09) {
            out.rescuerWx = S.wea;
            out.rescuerDesc = `财星(${S.wea}·${Math.round(weaPct*100)}%)克制偏印(枭)，食神得保`;
            out.rescueType = weaPct >= resPct * 0.75 ? 'full' : 'partial';
            out.gradeHint = out.rescueType === 'full' ? '食神格枭印破，财制枭救食，格局有救' : '食神格枭印破，财制枭力弱，格有瑕疵';
          } else {
            out.gradeHint = '食神格枭印夺食，无财救应，食神失用，格局破败';
          }
          return out;
        }
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 5. 伤官格 — 两种路径，各有破格
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const isShangGuan = patName.includes('伤官') || patName.includes('食伤格');
    if (isShangGuan) {
      const isJinShui = (dmWx === '金' && S.out === '水');
      const isRuoLocal2 = verdict.includes('身弱') || verdict.includes('极弱');      if (!isJinShui) {
        if (isRuoLocal2 && resPct > 0.10) {
          // 伤官配印路径：财透干破印
          if (weaPct > 0.11 && stemEffective(S.wea)) {
            out.isBroken = true;
            out.breakerWx = S.wea;
            out.breakerDesc = `财星(${S.wea}·${Math.round(weaPct*100)}%)透干破印，伤官配印用神（印星）被财克`;
            out.breakScenario = 'CAI_PO_YIN_SHANG';
            if (selfPct > 0.14) {
              out.rescuerWx = dmWx;
              out.rescuerDesc = `比劫(${dmWx}·${Math.round(selfPct*100)}%)制财，保住印星护身`;
              out.rescueType = selfPct >= weaPct * 0.8 ? 'full' : 'partial';
              out.gradeHint = out.rescueType === 'full' ? '伤官配印被财破，比劫救印，格局有救' : '伤官配印被财破，比劫力弱，格有瑕疵';
            } else {
              out.gradeHint = '伤官配印被财破，无比劫，印失护身之功，格局破败';
            }
            return out;
          }
        } else if (!isRuoLocal2 && resPct < 0.10) {
          // 伤官生财路径：官透干伤官见官
          if (offPct > 0.09 && stemEffective(S.off)) {
            out.isBroken = true;
            out.breakerWx = S.off;
            out.breakerDesc = `官星(${S.off}·${Math.round(offPct*100)}%)透干，伤官见官，格局破`;
            out.breakScenario = 'GUAN_PO_SHANG';
            // 伤官见官几乎无救，唯印星强时可护身缓解
            if (resPct > 0.20) {
              out.rescuerWx = S.res;
              out.rescuerDesc = `印星(${S.res}·${Math.round(resPct*100)}%)极强，压制伤官与官星之争，勉强护身`;
              out.rescueType = 'partial';
              out.gradeHint = '伤官见官，印星极强缓解，格有大瑕，人生多波折';
            } else {
              out.gradeHint = '伤官格见官，最凶无救，格局破败';
            }
            return out;
          }
        }
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 6. 印格 — 破格：财破印；官印相生时食伤克官
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const isYinGe = patName.includes('印格') || patName.includes('正印') || patName.includes('偏印');
    if (isYinGe && !patName.includes('从')) {
      if (weaPct > 0.12 && stemEffective(S.wea)) {
        out.isBroken = true;
        out.breakerWx = S.wea;
        out.breakerDesc = `财星(${S.wea}·${Math.round(weaPct*100)}%)透干破印，印格用神（印星）被克`;
        out.breakScenario = 'CAI_PO_YIN_YINGE';
        if (selfPct > 0.13 || branchMain(dmWx)) {
          out.rescuerWx = dmWx;
          out.rescuerDesc = `比劫(${dmWx}·${Math.round(selfPct*100)}%)制财，护住印星`;
          out.rescueType = selfPct >= weaPct * 0.75 ? 'full' : 'partial';
          out.gradeHint = out.rescueType === 'full' ? '印格财破，比劫制财救印，格局有救' : '印格财破，比劫力弱，格有瑕疵';
        } else {
          out.gradeHint = '印格财破印，无比劫救应，印星失用，格局破败';
        }
        return out;
      }
      // 官印相生格中，食伤克官
      if (offPct > 0.09 && outPct > 0.10 && stemEffective(S.out)) {
        out.isBroken = true;
        out.breakerWx = S.out;
        out.breakerDesc = `食伤(${S.out}·${Math.round(outPct*100)}%)透干克官，官印相生链条断裂，官无力生印`;
        out.breakScenario = 'SI_KE_GUAN_YIN';
        if (resPct > outPct * 1.1) {
          out.rescuerWx = S.res;
