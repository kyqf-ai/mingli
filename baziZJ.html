          out.rescuerDesc = `印星(${S.res}·${Math.round(resPct*100)}%)自身有力，可承接身，官失但印仍护身`;
          out.rescueType = 'partial';
          out.gradeHint = '官印相生食伤破官，印星自强护身，格有瑕';
        } else {
          out.gradeHint = '官印相生食伤克官，官印链断，格局受损';
        }
        return out;
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 7. 建禄格（取官为用）— 食伤制官
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    if (patName.includes('建禄') && offPct > 0.08) {
      if (outPct > 0.10 && stemEffective(S.out)) {
        out.isBroken = true;
        out.breakerWx = S.out;
        out.breakerDesc = `食伤(${S.out}·${Math.round(outPct*100)}%)透干制官，建禄格官用被破`;
        out.breakScenario = 'SI_KE_GUAN_JIANLU';
        if (resPct > 0.10) {
          out.rescuerWx = S.res;
          out.rescuerDesc = `印星(${S.res}·${Math.round(resPct*100)}%)制食伤，护住官星`;
          out.rescueType = resPct >= outPct * 0.9 ? 'full' : 'partial';
          out.gradeHint = out.rescueType === 'full' ? '建禄格食伤破官，印制食救官，格局有救' : '建禄格食伤破官，印制力弱，格有瑕疵';
        } else {
          out.gradeHint = '建禄格食伤制官，无印救应，官用被破，格局减弱';
        }
        return out;
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 8. 月刃格（七杀制刃）— 食伤制杀令刃无制
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    if (patName.includes('月刃') && offPct > 0.08) {
      if (outPct > 0.10 && stemEffective(S.out)) {
        out.isBroken = true;
        out.breakerWx = S.out;
        out.breakerDesc = `食伤(${S.out}·${Math.round(outPct*100)}%)透干制七杀，七杀无力制刃，月刃格破格`;
        out.breakScenario = 'SI_ZHI_SHA_YUEREN';
        if (weaPct > 0.10) {
          out.rescuerWx = S.wea;
          out.rescuerDesc = `财星(${S.wea}·${Math.round(weaPct*100)}%)生官杀，补充七杀制刃之力`;
          out.rescueType = weaPct >= outPct * 0.75 ? 'partial' : 'none';
          if (out.rescueType !== 'none') out.gradeHint = '月刃格食制杀，财生杀救格，部分恢复制刃';
          else out.gradeHint = '月刃格食制杀，财救力不足，制刃之局破败';
        } else {
          out.gradeHint = '月刃格食伤制杀无财生，刃无制，格局大破，凶';
        }
        return out;
      }
    }

    return out; // 格局未破
  }

  /**
   * getRescueGods(breakResult, dmWx, patternResult, ctx)
   * 破格有救应时，依据 breakScenario 重新构建喜用忌闲体系。
   *
   * 参数：
   *   breakResult  — checkPatternBreakStatus 返回的完整破格信息
   *   dmWx         — 日主五行
   *   patternResult — 格局判定结果
   *   ctx           — 上下文（用于记录日志）
   *
   * 核心路由逻辑：
   *   通过 breakResult.breakScenario 路由到对应救应规则，
   *   每个场景返回 { yongShen, xiShen, jiShen, xianShen } 结构。
   *   常见场景：
   *     GUAN_SHANG_OFF   — 官格食伤破格：印救应，升印为用
   *     GUAN_BIJIE_MERGE — 官格比劫混官：食伤制劫护官
   *     BIJIE_ZHENG_CAI  — 财格比劫争财：官制比护财
   *     CAI_PO_YIN_YINGE — 印格财破：比劫制财救印
   *     SI_KE_GUAN_JIANLU — 建禄格食制官：印制食救官
   *
   * 当 rescueType='partial' 时，破格信息会附注在用神后面提醒。
   * 当 rescueType='none'（无救应）时，此函数不被调用，
   *   改为从格局退化为旺衰论用（在 determineTriGodsSystem 中处理）。
   */
  function getRescueGods(breakStatus, dmWx, S, verdict) {
    const wrap = (arr) => [...new Set(arr)].filter(Boolean).map(wx => ({ wx, role: getShiShenName(dmWx, wx) }));
    const gods = { yongShen: [], xiShen: [], jiShen: [], xianShen: [] };
    const rWx = breakStatus.rescuerWx;
    const bWx = breakStatus.breakerWx;

    switch (breakStatus.breakScenario) {
      case 'GUAN_SHANG_OFF':          // 印制食救正官格（官格食伤破格）
        // 印为用（制食护官），官为喜（格局目标），食伤大忌，财生食亦忌
        gods.yongShen = wrap([S.res]);
        gods.xiShen   = wrap([S.off]);
        gods.jiShen   = wrap([S.out, S.wea]);
        gods.xianShen = wrap([dmWx]);
        break;
      case 'SI_KE_GUAN':            // 印制食救官格
        // 印为用（制食护官），官为喜，食伤为大忌，财为忌（生食伤），比劫闲
        gods.yongShen = wrap([S.res]);
        gods.xiShen   = wrap([S.off]);
        gods.jiShen   = wrap([S.out, S.wea]);
        gods.xianShen = wrap([dmWx]);
        break;
      case 'BIJIE_HUN_GUAN':        // 印化比劫缓和官格（BIJIE_HUN_GUAN）
        gods.yongShen = wrap([S.res]);
        gods.xiShen   = wrap([S.off]);
        gods.jiShen   = wrap([dmWx, S.out]);
        gods.xianShen = wrap([S.wea]);
        break;
      case 'YIN_DUO_SHI_SHA':       // 财制枭救食制杀
        // 财为用（制枭护食），食伤为喜，官杀为闲，比劫为忌（助旺再生食）
        gods.yongShen = wrap([S.wea]);
        gods.xiShen   = wrap([S.out]);
        gods.jiShen   = wrap([S.res, dmWx]);
        gods.xianShen = wrap([S.off]);
        break;
      case 'CAI_PO_YIN_SHA':        // 比劫制财救杀印相生
        // 比劫为用（制财护印），印为喜（印可化杀），财为大忌，食伤为次忌（耗身）
        gods.yongShen = wrap([dmWx]);
        gods.xiShen   = wrap([S.res]);
        gods.jiShen   = wrap([S.wea, S.out]);
        gods.xianShen = wrap([S.off]);
        break;
      case 'BIJIE_ZHENG_CAI':       // 官制比劫救财格
        // 官为用（制比护财），食伤生财为喜，比劫为大忌，印助比为次忌
        gods.yongShen = wrap([S.off]);
        gods.xiShen   = wrap([S.out, S.wea]);
        gods.jiShen   = wrap([dmWx, S.res]);
        gods.xianShen = wrap([]);
        break;
      case 'YIN_DUO_SHI_SHISHEN':   // 财制枭救食神格
        // 财为用（制枭），食神为喜（受财接续生秀），印为大忌，官杀闲
        gods.yongShen = wrap([S.wea]);
        gods.xiShen   = wrap([S.out]);
        gods.jiShen   = wrap([S.res]);
        gods.xianShen = wrap([S.off, dmWx]);
        break;
      case 'CAI_PO_YIN_SHANG':      // 比劫制财救伤官配印
        gods.yongShen = wrap([dmWx]);
        gods.xiShen   = wrap([S.res]);
        gods.jiShen   = wrap([S.wea, S.off]);
        gods.xianShen = wrap([S.out]);
        break;
      case 'GUAN_PO_SHANG':         // 印护身缓解伤官见官（部分救应）
        gods.yongShen = wrap([S.res]);
        gods.xiShen   = wrap([dmWx]);
        gods.jiShen   = wrap([S.off, S.wea]);
        gods.xianShen = wrap([S.out]);
        break;
      case 'CAI_PO_YIN_YINGE':      // 比劫制财救印格
        gods.yongShen = wrap([dmWx]);
        gods.xiShen   = wrap([S.res]);
        gods.jiShen   = wrap([S.wea, S.off]);
        gods.xianShen = wrap([S.out]);
        break;
      case 'SI_KE_GUAN_YIN':        // 印自强护身（官印相生官被食克）
        gods.yongShen = wrap([S.res]);
        gods.xiShen   = wrap([dmWx]);
        gods.jiShen   = wrap([S.wea, S.out]);
        gods.xianShen = wrap([S.off]);
        break;
      case 'SI_KE_GUAN_JIANLU':     // 印制食救建禄官
        gods.yongShen = wrap([S.res]);
        gods.xiShen   = wrap([S.off]);
        gods.jiShen   = wrap([S.out, S.wea]);
        gods.xianShen = wrap([dmWx]);
        break;
      case 'SI_ZHI_SHA_YUEREN':     // 财生杀救月刃格
        gods.yongShen = wrap([S.wea]);
        gods.xiShen   = wrap([S.off]);
        gods.jiShen   = wrap([S.out, S.res]);
        gods.xianShen = wrap([dmWx]);
        break;
      case 'QISHA_HUN_GUAN':        // 食伤制杀留官（正官格官杀混杂救应）
        // 食伤制七杀为当务之急（相神），正官仍是格局目标（用神方向）
        // 忌：印星制食伤令七杀无制；财星生七杀助凶
        gods.yongShen = wrap([S.out]);
        gods.xiShen   = wrap([S.off]);
        gods.jiShen   = wrap([S.res, S.wea]);
        gods.xianShen = wrap([dmWx]);
        break;
      case 'CAI_SHENG_SHA':         // 食伤制杀救财格（财旺生七杀）
        // 食伤制杀为用，财星为喜（格局根基仍在），七杀为忌，印助杀亦忌
        gods.yongShen = wrap([S.out]);
        gods.xiShen   = wrap([S.wea]);
        gods.jiShen   = wrap([S.off, S.res]);
        gods.xianShen = wrap([dmWx]);
        break;
      default:
        // 通用救应：救应神为用，破格者为大忌
        gods.yongShen = wrap([rWx]);
        gods.jiShen   = wrap([bWx]);
        gods.xianShen = wrap([]);
    }
    return gods;
  }

  /**
   * zipingYongShenRules(dmWx, verdict, patternResult, nodes, allyScore, enemyScore, ctx)
   * 《子平真诠》正格用神确定规则引擎（Stage 7.0 核心分支）。
   *
   * 内部优先顺序：
   *   1. 破格救应检测（checkPatternBreakStatus）：若格局已破且有救应，
   *      调用 getRescueGods 直接返回救应体系（跳过后续逻辑）
   *   2. 正官格：身强取官，兼看财生官；身弱取印，防食制官
   *   3. 七杀格：食伤制杀（身强）/ 印化杀（身弱）/ 杀印相生
   *   4. 食神格：财为相（驭食生财）; 身弱取印合食; 防枭神（偏印）夺食
   *   5. 伤官格：分日主五行（金水/木火/土）各有不同用神方向
   *   6. 财格（偏正财）：官杀护财（身强）/ 印比护身（身弱）
   *   7. 印格（偏正印）：官生印（官印相生）/ 财破印（用比劫）
   *   8. 建禄格：月令禄神，取官财为用
   *   9. 月刃格：七杀制刃，财生杀（身强）/ 官杀偏取七杀
   *
   * 每条分支均输出：
   *   gods       — { yongShen, xiShen, jiShen, xianShen } 喜用忌闲四神
   *   explanation — 推导说明（写入 Stage 7.1 日志）
   *   xiangShen  — 相神说明（可选）
   */
  function zipingYongShenRules(dmWx, verdict, patternResult, nodes, allyScore, enemyScore, ctx) {
    const S = DICT.SHISHEN[dmWx];
    const patName = patternResult?.pattern || '';
    const minorFlag = patternResult?.minorFlag || '';
    const wrap = (arr) => [...new Set(arr)].filter(Boolean).map(wx => ({ wx, role: getShiShenName(dmWx, wx) }));

    const isQiang = verdict.includes('身强') || verdict.includes('旺') || verdict.includes('极强') || verdict.includes('专旺');
    const isRuo   = verdict.includes('身弱') || verdict.includes('极弱');

    // V3.0 全局精确能量，引入藏干拆解数据表
    const { wxE, totalE } = getWxEnergyMap(nodes);
    const pct = wx => totalE > 0 ? (wxE[wx] || 0) / totalE : 0;

    const offPct  = pct(S.off);   
    const resPct  = pct(S.res);   
    const outPct  = pct(S.out);   
    const weaPct  = pct(S.wea);   
    const selfPct = pct(dmWx);    

    let gods = { yongShen: [], xiShen: [], jiShen: [], xianShen: [] };
    let explanation = '';
    let xiangShen = '';

    const patIs = (...names) => names.some(n => patName.includes(n));
    const isZhengGuan = patName.includes('正官') && !patName.includes('七杀');
    const isQiSha     = patName.includes('七杀') || patName.includes('官杀格');
    const isShiShen   = patName.includes('食神');
    const isShangGuan = patName.includes('伤官') || patName.includes('食伤格');
    const isYin       = patName.includes('印格') || patName.includes('正印') || patName.includes('偏印') || patName.includes('印星格');

    // ══════════════════════════════════════════════
    // V3.0 破格救应检测（《子平真诠》核心：破格看救应）
    // 仅对普通正格和建禄/月刃格生效；特殊格(从/化/专旺)不检测
    // ══════════════════════════════════════════════
    const skipBreakCheck = patternResult?.type === 'special' || patternResult?.type === 'special_shensha'
        || patternResult?.type === 'special_two' || patternResult?.type === 'special_three'
        || patternResult?.type === 'special_half';
    if (!skipBreakCheck) {
      const breakStatus = checkPatternBreakStatus(patternResult, nodes, dmWx, ctx, verdict);
      ctx.breakStatus = breakStatus; // 存储供UI使用
      if (breakStatus.isBroken) {
        ctx.log('Stage 7.0 破格', `⚠️ 【破格检测】${breakStatus.breakerDesc}${breakStatus.gradeHint ? '（' + breakStatus.gradeHint + '）' : ''}`);
        if (breakStatus.rescueType !== 'none') {
          ctx.tag('tag-warn', `⚠️ 破格有救·${breakStatus.rescueType === 'full' ? '格局成' : '格有瑕'}`);
          ctx.log('Stage 7.0 破格', `🛡️ 【救应检出】${breakStatus.rescuerDesc}（救应程度：${breakStatus.rescueType === 'full' ? '完整救应，格局仍成' : '部分救应，格有小疵'}）`);
          const rescueGods = getRescueGods(breakStatus, dmWx, S, verdict);
          const qualityLabel = breakStatus.rescueType === 'full' ? '有救应，格局成立（有小瑕疵）' : '有救应，格局勉强成立（格有较大瑕疵）';
          return {
            gods: rescueGods,
            explanation: `【破格有救】${patName}：${breakStatus.breakerDesc}。但${breakStatus.rescuerDesc}，${qualityLabel}，救应神(${breakStatus.rescuerWx})升为用神。`,
            xiangShen: `${breakStatus.rescuerWx}为救应用神，制忌神${breakStatus.breakerWx}`
          };
        } else {
          // 无救应：格局破败，降级为旺衰通用用神
          ctx.tag('tag-fatal', `💔 格局破败·${patName.split('·')[0]}`);
          ctx.log('Stage 7.0 破格', `💔 【格局破败】${breakStatus.gradeHint}，无救应，改以旺衰定用神（降格处理）`);
          let fallbackGods = { yongShen: [], xiShen: [], jiShen: [], xianShen: [] };
          let fallbackExpl = '';
          if (isQiang) {
            fallbackGods.yongShen = wrap([S.off]);
            fallbackGods.xiShen   = wrap([S.wea, S.out]);
            fallbackGods.jiShen   = wrap([S.res, dmWx]);
            fallbackGods.xianShen = wrap([]);
            fallbackExpl = `${patName}破败无救，日主身强，以官杀制身为降格用神`;
          } else if (isRuo) {
            fallbackGods.yongShen = wrap([S.res]);
            fallbackGods.xiShen   = wrap([dmWx]);
            fallbackGods.jiShen   = wrap([S.wea, S.off, S.out]);
            fallbackGods.xianShen = wrap([]);
            fallbackExpl = `${patName}破败无救，日主身弱，以印星护身为降格用神`;
          } else {
            fallbackGods.yongShen = wrap([S.off, S.out]);
            fallbackGods.xiShen   = wrap([S.wea]);
            fallbackGods.jiShen   = wrap([S.res, dmWx]);
            fallbackGods.xianShen = wrap([]);
            fallbackExpl = `${patName}破败无救，格局中和，综合调候以官杀食伤为用`;
          }
          return { gods: fallbackGods, explanation: fallbackExpl, xiangShen: '' };
        }
      }
    }

    // 【V3.2 修正】改用精确匹配，避免 patIs('官格') 误捕「伤官格」中的「官」字
    if (patName.includes('正官') && !patName.includes('七杀') && !patName.includes('伤官')) {
      if (isRuo) {
        explanation = `正官格·身弱：官旺克身，取印星化官护身为用（官印相生）；官星为相（不可太旺）；忌财多生官（令官更旺克身）；忌食伤制官（官被制，格局失用）；比劫为闲（帮身但无法解官克）`;
        xiangShen = `印星[${S.res}]化官，官星[${S.off}]为相（适度）`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([S.off]); gods.jiShen = wrap([S.out, S.wea]); gods.xianShen = wrap([dmWx]);
      } else if (isQiang) {
        explanation = `正官格·身强：官制身为用神；财生官为相（财官双美之象）；印护官亦喜（官印相生）；忌食伤克官（破格最凶）；忌比劫旺（争财令官无依）`;
        xiangShen = `财星[${S.wea}]生官（相神），印星[${S.res}]护官（次相）`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea, S.res]); gods.jiShen = wrap([S.out, dmWx]); gods.xianShen = wrap([]);
      } else {
        explanation = `正官格·中和：官印相生最贵，官为用神，印为相神；财生官为喜；忌食伤制官；比劫为闲`;
        xiangShen = `印星[${S.res}]护官（相神）`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.res, S.wea]); gods.jiShen = wrap([S.out]); gods.xianShen = wrap([dmWx]);
      }
    } else if (patIs('七杀') || isQiSha) {
      const hasYinXiang = !isQiang && (minorFlag.includes('杀印相生') || resPct > 0.18);
      if (isRuo) {
        explanation = `七杀格·身弱：杀旺克身，须印化杀护身（杀印相生）；印为用，比劫为喜（帮身分杀）；忌财生杀（更重克身）；忌食伤（耗身且与印相争）；七杀（官杀）为相神（印化之）`;
        xiangShen = `印星[${S.res}]化杀为用，比劫[${dmWx}]帮身为辅`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([dmWx]); gods.jiShen = wrap([S.wea, S.out]); gods.xianShen = wrap([S.off]);
      } else if (hasYinXiang) {
        explanation = `七杀格·杀印相生（中和·印有力）：官杀生印，印护身，化杀为权；印为用，杀为相；忌财破印（破格最凶）；食伤为闲（制杀后印无杀可化）。此格须日主非身强方可成立。`;
        xiangShen = `七杀[${S.off}]生印（印之相神）`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([S.off, dmWx]); gods.jiShen = wrap([S.wea]); gods.xianShen = wrap([S.out]);
      } else {
        explanation = `七杀格·食制杀（身强）：食神制杀最贵，以食伤为用；财顺食伤之秀、且与杀隔断为喜；忌印破食制（印克食神，令杀无制）；忌比劫旺（无印制则激杀）`;
        xiangShen = `食伤[${S.out}]制杀，财星[${S.wea}]顺流为相`;
        gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea, dmWx]); gods.jiShen = wrap([S.res]); gods.xianShen = wrap([S.off]);
      }
    } else if (patIs('财格') || (patIs('财') && patternResult?.type === 'standard')) {
      if (isRuo) {
        explanation = `财格·身弱：财多克耗日主，比劫帮身为用（劫财争夺，分担财压）；印护身为喜；忌财更旺（见财愈虚）；忌食伤（耗身生财雪上加霜）；忌官杀（财生官杀加重克身）`;
        xiangShen = `比劫[${dmWx}]帮身，印星[${S.res}]为相`;
        gods.yongShen = wrap([dmWx]); gods.xiShen = wrap([S.res]); gods.jiShen = wrap([S.wea, S.off, S.out]); gods.xianShen = wrap([]);
      } else {
        explanation = `财格·身强：财为用神；食伤生财为相神（最贵）；官星护财防比劫争财为喜；忌比劫多（争财）；印星闲（生身已旺无需）`;
        xiangShen = `食伤[${S.out}]生财（相神），官星[${S.off}]护财`;
        gods.yongShen = wrap([S.wea]); gods.xiShen = wrap([S.out, S.off]); gods.jiShen = wrap([dmWx]); gods.xianShen = wrap([S.res]);
      }
    } else if (patIs('食神') || isShiShen) {
      if (isRuo) {
        explanation = `食神格·身弱：食神泄气过重，须比劫帮身、印星护身为用；忌食伤再泄（泄则更虚）；忌财（食生财更耗）；忌官杀（克身无力承受）`;
        xiangShen = `比劫[${dmWx}]帮身，印星[${S.res}]护身`;
            // 【V3.1 修正】根据日主是否有真根，动态排定用神优先级
			const hasRoot = ctx.dmRoots.mainCount > 0 || ctx.dmRoots.subCount >= 2;
			if (hasRoot) {
			// 有根：比劫帮身为第一用神，印星为相
			xiangShen = `比劫[${dmWx}]帮身为用，印星[${S.res}]为相`;
			gods.yongShen = wrap([dmWx, S.res]);
			} else {
			// 无根：印星破食伤生身为第一用神，比劫为辅
			xiangShen = `印星[${S.res}]破食伤生身为用，比劫[${dmWx}]为辅`;
			gods.yongShen = wrap([S.res, dmWx]);
			}
		gods.xiShen = wrap([]); gods.jiShen = wrap([S.out, S.wea, S.off]); gods.xianShen = wrap([]);
      } else {
        if (offPct > 0.10) {
          explanation = `食神格·身强（七杀在局）：食神制杀最贵，食神为用、七杀为格；财顺食神之秀为喜；忌偏印枭神夺食（枭印克食神使杀无制，最凶）；七杀为闲（被食制）`;
          xiangShen = `食神[${S.out}]制七杀，财星[${S.wea}]为辅`;
          gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea, dmWx]); gods.jiShen = wrap([S.res]); gods.xianShen = wrap([S.off]);
        } else {
          explanation = `食神格·身强：食神顺流生财最美，财为相神；忌偏印枭神夺食（最凶，食神被克则格局破）；官杀须防（若食轻官重，食被官制则格局失用）`;
          xiangShen = `财星[${S.wea}]受食生（相神）`;
          gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.res]); gods.xianShen = wrap([S.off, dmWx]);
        }
      }
    } else if (patIs('伤官') || isShangGuan) {
      const dmGanChar = ctx.nodes.dG.char;
      const mZWx = ctx.nodes.mZ.effectiveWx;
      // 【V3.2 修正】金水伤官以「日主为金、食伤为水」定义，脱离月令依赖；水木伤官不属于此例
      const isJinShui = (dmWx === '金' && S.out === '水');
      const isJinShuiSpecial = isJinShui;

      if (isJinShuiSpecial) {
        explanation = `伤官格·金水伤官（特殊）：金水伤官寒而清，反喜见官（官暖金水，与伤官中和）；印护身为喜；财生官亦喜；忌比劫过旺；此为金水伤官特殊论法，与一般伤官相反`;
        xiangShen = `官星[${S.off}]暖局（金水伤官例外），印星[${S.res}]护身`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.res, S.wea]); gods.jiShen = wrap([dmWx]); gods.xianShen = wrap([S.out]);
      } else if (isRuo) {
        explanation = `伤官格·身弱：伤官配印格（贵格）—— 印制伤护身为用；比劫帮身为喜；大忌见官（伤官见官祸百端，印虽化但身已弱难承）；财生官令官旺、克制伤官之制，亦忌`;
        xiangShen = `印星[${S.res}]制伤官（相神）`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([dmWx]); gods.jiShen = wrap([S.off, S.wea]); gods.xianShen = wrap([S.out]);
      } else {
        explanation = `伤官格·身强：伤官生财（顺流）—— 财为用神，食伤为相；大忌见官（伤官见官凶）；忌印制伤官（截断生财通路）；比劫为闲（身已强，多则争财）`;
        xiangShen = `食伤[${S.out}]生财（相神）`;
        gods.yongShen = wrap([S.wea]); gods.xiShen = wrap([S.out]); gods.jiShen = wrap([S.off, S.res]); gods.xianShen = wrap([dmWx]);
      }
    } else if (patIs('印格') || patIs('正印') || patIs('偏印') || isYin) {
      const isYinTaiWang = resPct > 0.35 && isQiang; 
      if (isYinTaiWang) {
          const weaPct = pct(S.wea);
          const outPct = pct(S.out);

          if (weaPct > 0.12) {
              // 原局有财透出：财以破印为用
              explanation = `印格·印旺身强：原局财星有力，取财破印为用；食伤泄秀亦喜；忌官再生印；忌比劫助旺`;
              xiangShen = `财星[${S.wea}]破印制旺（相神）`;
              gods.yongShen = wrap([S.wea]);
              gods.xiShen   = wrap([S.out]);
          } else {
              // 原局无财：食伤泄秀为用
              explanation = `印格·印旺身强：原局无财，取食伤泄秀为用；财星承接食伤为喜；忌官再生印；忌比劫助旺`;
              xiangShen = `食伤[${S.out}]泄秀为用（相神：财星[${S.wea}]）`;
              gods.yongShen = wrap([S.out]);
              gods.xiShen   = wrap([S.wea]);
          }

          gods.jiShen   = wrap([S.res, dmWx]);
          gods.xianShen = wrap([S.off]);
      } else if (offPct > 0.08) {
        explanation = `印格·官印相生（最贵）：官生印，印护身，官印双美；印为用，官为相；忌财破印（财克印，官生印之路断，格局破）；忌食伤克官（官受制则无力生印）`;
        xiangShen = `官星[${S.off}]生印（相神）`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([S.off]); gods.jiShen = wrap([S.wea, S.out]); gods.xianShen = wrap([dmWx]);
      } else {
        explanation = `印格·无官（待官来生）：印护身，官星为最喜（官来生印成官印相生）；忌财破印（最凶）；食伤泄秀（须防身弱时耗身）；比劫帮身为闲`;
        xiangShen = `官星[${S.off}]来生印（最喜相神）`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([S.off]); gods.jiShen = wrap([S.wea]); gods.xianShen = wrap([S.out, dmWx]);
      }
    } else if (patIs('建禄') || patIs('专禄') || patIs('归禄')) {
      // 专禄格·归禄格：命理上与建禄格同构（月令/时支秉比肩禄位），
      // 取用逻辑完全参照建禄格：有官取官，有财取财，无财官则食伤泄秀。
      const isZhuanGuiLu = patIs('专禄') || patIs('归禄');
      if (offPct > 0.08 && weaPct > 0.08) {
        explanation = isZhuanGuiLu
          ? `专/归禄格·财官俱透：禄神当令，财官相生，取官为用（禄官格）；财生官为相（财官双美）；忌食伤克官；忌印星`
          : `建禄格·财官俱透：财官相生，日主身强可承，取官为用（禄官格）；财生官为相（财官双美）；忌食伤克官；忌印星（身已强，印更旺无益）`;
        xiangShen = `财星[${S.wea}]生官（相神）`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.out, S.res]); gods.xianShen = wrap([dmWx]);
      } else if (offPct > 0.08) {
        explanation = isZhuanGuiLu
          ? `专/归禄格·官在局：禄神当令，另取官制身为用；印护官为相；忌食伤制官（破格）；财生官为喜`
          : `建禄格·官在局：月令比肩秉令，另取官制身为用（禄用官制）；印护官为相（官印）；忌食伤制官（破格）；忌比劫旺（争财令官无依）；财为喜（生官）`;
        xiangShen = `印星[${S.res}]护官（相神），财星[${S.wea}]生官`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea, S.res]); gods.jiShen = wrap([S.out, dmWx]); gods.xianShen = wrap([]);
      } else if (weaPct > 0.08) {
        explanation = isZhuanGuiLu
          ? `专/归禄格·财在局（无官）：禄神秉令身强，取财为用；食伤生财为相；官护财亦喜；忌比劫争财；忌印助旺`
          : `建禄格·财在局（无官）：月令秉令身强，另取财为用（禄财格）；食伤生财为相；官护财亦喜；忌比劫多争财；忌印助旺身更旺`;
        xiangShen = `食伤[${S.out}]生财（相神）`;
        gods.yongShen = wrap([S.wea]); gods.xiShen = wrap([S.out, S.off]); gods.jiShen = wrap([dmWx, S.res]); gods.xianShen = wrap([]);
      } else {
        explanation = isZhuanGuiLu
          ? `专/归禄格·无财官（纯禄泄秀）：禄神当令身强，财官不透，取食伤泄秀为用（疏泄旺气，流通秀气）；财顺食伤之秀为喜；忌印制食伤；忌比劫助旺`
          : `建禄格·无财官（外格局）：月令秉令身强，财官不透，取食伤泄秀为用（疏泄旺气，流通秀气）；财顺食伤之秀为喜；忌印制食伤；忌比劫助旺`;
        xiangShen = `财星[${S.wea}]顺食伤之流（相神）`;
        gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.res, dmWx]); gods.xianShen = wrap([S.off]);
      }
    } else if (patIs('月刃')) {
      if (offPct > 0.08) {
        explanation = `月刃格·七杀在局：刃旺须制，七杀制刃最贵（刃逢杀制方成贵格，称「刃杀格」）；财生官杀为喜；忌食伤制官杀（杀被制则无力制刃，刃反凶）；忌印助刃更旺`;
        xiangShen = `财星[${S.wea}]生杀（相神），七杀制刃`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.out, S.res]); gods.xianShen = wrap([dmWx]);
      } else {
        explanation = `月刃格·无七杀：刃旺无制，取食伤顺势泄刃为用（刃逢食制，泄其锋芒）；财顺食伤之流为喜；忌印助刃更旺；忌比劫再来（刃更盛）；官星为闲（无力制刃，须慎）`;
        xiangShen = `财星[${S.wea}]顺食伤（相神）`;
        gods.yongShen = wrap([S.out]); gods.xiShen = wrap([S.wea]); gods.jiShen = wrap([S.res, dmWx]); gods.xianShen = wrap([S.off]);
      }
    } else {
      if (isQiang) {
        explanation = `格局[${patName}]·身强：日主过旺，取官杀制身、财星耗身、食伤泄秀为用；忌印比再助`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea, S.out]); gods.jiShen = wrap([S.res, dmWx]); gods.xianShen = wrap([]);
      } else if (isRuo) {
        explanation = `格局[${patName}]·身弱：日主过弱，取印星护身、比劫帮身为用；忌财官食伤耗克`;
        gods.yongShen = wrap([S.res]); gods.xiShen = wrap([dmWx]); gods.jiShen = wrap([S.wea, S.off, S.out]); gods.xianShen = wrap([]);
      } else {
        explanation = `格局[${patName}]·中和：五行中和流转，以格局月令所取之神为用，顺势流通`;
        gods.yongShen = wrap([S.off]); gods.xiShen = wrap([S.wea, S.res]); gods.jiShen = wrap([S.out]); gods.xianShen = wrap([dmWx]);
      }
    }

    return { gods, explanation, xiangShen };
  }

  /**
   * renderUI(ctx, diag)
   * 主渲染函数——将全部推演结果写入页面 DOM。
   *
   * 渲染内容：
   *   1. 命盘节点网格（#nodeGrid）：
   *      - 四柱各干支的节点卡片：字符/五行/十神/状态徽章/藏干/神煞/气势阶段
   *      - 合绊节点显示化气百分比徽章（⚡化X%）
   *      - 旬空节点加 is-void 样式，日主节点加 dm 样式
   *   2. 旺衰条（#barAlly/#barEnemy）：同类生扶 vs 异类克耗百分比
   *   3. 三才徽章（#sancaiHtml）：得令/得地/得势三个评定指标
   *   4. 五行能量条（#wuxingBar）：五行占比可视化
   *   5. 格局旺衰描述（#verdictBox/#patternBox）
   *   6. 用神矩阵（#godsMatrix）：用神/喜神/忌神/闲神四格
   *   7. 调候日志附注（#auditLogs）：穷通宝鉴参考
   *   8. 神煞面板（#shenshaPanel）：吉星/煞星分组展示
   *   9. 推演日志（#auditLogs）：全流水线处理日志
   *  10. 命盘标题信息（公历/农历/日主/性别等）
   *
   * ctx._wxCache：evaluatePatternAndStrength 已写入此缓存，
   *   renderUI 直接读取以确保 UI 与算法数据完全一致。
   */
  function renderUI(ctx, diag) {
    document.getElementById('outputArea').style.display = 'block';
    const baziPlain = `${ctx.nodes.yG.char}${ctx.nodes.yZ.char} ${ctx.nodes.mG.char}${ctx.nodes.mZ.char} ${ctx.nodes.dG.char}${ctx.nodes.dZ.char} ${ctx.nodes.hG.char}${ctx.nodes.hZ.char}`;
    
    const grid = document.getElementById('nodeGrid');
    grid.innerHTML = '';
    const layout = [ {g: ctx.nodes.yG, z: ctx.nodes.yZ, t: '年柱'}, {g: ctx.nodes.mG, z: ctx.nodes.mZ, t: '月柱'}, {g: ctx.nodes.dG, z: ctx.nodes.dZ, t: '日柱'}, {g: ctx.nodes.hG, z: ctx.nodes.hZ, t: '时柱'} ];
    
    layout.forEach(col => {
      let colDiv = document.createElement('div');
      colDiv.className = 'pillar-col';
      let colHtml = `<div class="pillar-header">${col.t}</div><div class="pillar-nayin">${col.g.naYin || '——'}</div>`;
      
      [col.g, col.z].forEach(n => {
        let isDm = n.id === 'dG' ? 'dm' : ''; let isVoid = n.isVoid ? 'is-void' : '';
        let exactGod = n.id === 'dG' ? '日主' : getExactShiShenName(ctx.nodes.dG.char, n.char, n.effectiveWx);
        
        let badgesHtml = Array.from(n.states).map(s => {
          let c = 'status-normal';
          if (['被反噬','被抽干','蚍蜉撼树','冰冻无用'].some(k => s.includes(k))) c = 'status-fatal';
          else if (['争妒合','从化','化冲'].some(k => s.includes(k))) c = 'status-damping';
          else if (['旺','相','根','生','气','枢纽','主','被激怒','中神'].some(k => s.includes(k))) c = 'status-buff';
          else if (['冲','重伤','死','囚','截','泄','受克','压','空亡','寒木','熔融','刑','害','冰封减力'].some(k => s.includes(k))) c = 'status-nerf';
          else if (['合','会','绊','化'].some(k => s.includes(k))) c = 'status-transform';
          return `<span class="status-badge ${c}">${s}</span>`;
        }).join('');
        // V3.0 UI：合绊节点额外显示化气百分比徽章
        if (n.transformRatio > 0 && n.targetWx && !n.isTransformed) {
          badgesHtml += `<span class="status-badge status-transform" title="气势向${n.targetWx}渗透 ${Math.round(n.transformRatio*100)}%">⚡化${n.targetWx}${Math.round(n.transformRatio*100)}%</span>`;
        }
        
        let phaseHtml = n.qiPhase ? `<div class="node-phase">${n.qiPhase}</div>` : '';
        let shenshaHtml = n.shenshas.length > 0 ? `<div class="node-shensha">${n.shenshas.map(sh => {
          const cls = ctx._shenshaClassMap?.[sh] || 'sh-default';
          return `<span class="shensha-badge ${cls}">${sh}</span>`;
        }).join('')}</div>` : '';

        let hiddenStemsHtml = '';
        if (n.type === '支') {
            let hiddenArr = DICT.HIDDEN[n.char] || [];
            if (hiddenArr.length > 0) {
                let hiddenBadges = hiddenArr.map(h => {
                    if (!h) return '';
                    let hWx = DICT.WX[h];
                    let hGod = getExactShiShenName(ctx.nodes.dG.char, h, hWx);
                    return `<span class="hidden-stem-badge" title="藏干: ${h} (${hWx})">${h}·${hGod}</span>`;
                }).join('');
                hiddenStemsHtml = `<div class="node-hidden-stems">${hiddenBadges}</div>`;
            }
        }
        // V3.0 UI：title 属性附加 transformRatio 信息
        const trInfo = (n.transformRatio > 0 && n.targetWx && !n.isTransformed)
            ? ` | 化气: ${Math.round(n.transformRatio*100)}%→${n.targetWx}` : '';
        colHtml += `<div class="node-card ${isDm} ${isVoid}" title="能量: ${n.energy.toFixed(2)} | 原五行: ${n.originalWx} | 当前: ${n.effectiveWx}${trInfo}">
            ${phaseHtml} <div class="node-char">${n.char}</div> <div class="node-wx wx-${n.effectiveWx}">${n.effectiveWx} · ${exactGod}</div>
            <div class="node-status">${badgesHtml}</div> 
            ${hiddenStemsHtml}

    const shenshaConfig = [

      { key:'金舆',     cls:'si-jinyu',   icon:'🏅', note:'金舆贵人：乘舆之象，富贵荣华，财禄丰厚，主贵人提携' },	  
      { key:'学堂',     cls:'si-xuetang', icon:'🎓', note:'学堂贵人（文昌学堂）：秉性聪慧，好学有成，利学业科考，技艺超群' },

      { key:'亡神',     cls:'si-wangshen',     icon:'💀', note:'亡神：主名誉受损、泄密、口舌官非，与官杀同柱影响仕途，宜谨言慎行' },
      { key:'孤辰',     cls:'si-guchen',       icon:'🌑', note:'孤辰：主孤独清高，六亲缘薄，感情易孤寡，男命婚缘迟' },

      { key:'天罗',     cls:'si-tianluodiwang',icon:'🕸️', note:'天罗（戌/亥·纳音火命）：束缚困局之象，男命尤忌，宜谨防官非牢狱、意外困境' },
      { key:'地网',     cls:'si-tianluodiwang',icon:'🕸️', note:'地网（辰/巳·纳音水土命）：束缚困局之象，女命尤忌，宜谨防官非牢狱、困境难脱' },
      { key:'阴差阳错', cls:'si-yinchayang',   icon:'🔀', note:'阴差阳错：日柱特殊神煞，主婚姻阴差阳错、感情错位，姻缘多波折' },
      { key:'咸池',     cls:'si-xianchi',      icon:'🌊', note:'咸池（桃花煞）：日支所出，主沉溺享乐、酒色风流，感情易纠缠' },
    ];
    const allZhis = ctx._shenshaNodes || [];
    let shenshaItems = [];
    shenshaConfig.forEach(cfg => {
      const isTlDw = cfg.key === '天罗' || cfg.key === '地网';
      const found = allZhis.filter(z => isTlDw
        ? z.shenshas.some(s => s.startsWith(cfg.key))
        : z.shenshas.includes(cfg.key)
      );
      if (found.length === 0) return;
      let locStr;
      if (cfg.key === '阴差阳错') {
        // 日柱级别神煞，定位显示日柱（日干+日支）
        const dGNode = ctx.nodes.dG;
        const dZNode = ctx.nodes.dZ;
        locStr = `日柱·${dGNode ? dGNode.char : ''}${dZNode ? dZNode.char : ''}`;
      } else if (isTlDw) {
        locStr = found.map(z => {
          const fullName = z.shenshas.find(s => s.startsWith(cfg.key)) || cfg.key;
          const note = fullName.includes('(') ? ' ' + fullName.slice(fullName.indexOf('(')) : '';
          return `${z.label}·${z.char}${note}`;
        }).join('、');
      } else {
        locStr = found.map(z => `${z.label}·${z.char}`).join('、');
      }
      shenshaItems.push(

          <span class="shensha-item-loc">${locStr}</span>
         </div>`
      );
    });

    // 天罗地网同时在局→追加一条合并提示卡
    const hasTL = allZhis.some(z => z.shenshas.some(s => s.startsWith('天罗')));
    const hasDW = allZhis.some(z => z.shenshas.some(s => s.startsWith('地网')));
    if (hasTL && hasDW) {
      shenshaItems.push(

    }

      shenshaPanel.style.display = 'block';

      // 将已渲染的 item 按吉/凶分组（利用 cfg.key 顺序：吉星在前，煞星在后）
      const jiItems = [], shaItems = [];
      shenshaConfig.forEach(cfg => {
        const isTlDw2 = cfg.key === '天罗' || cfg.key === '地网';
        const found2 = allZhis.filter(z => isTlDw2
          ? z.shenshas.some(s => s.startsWith(cfg.key))
          : z.shenshas.includes(cfg.key)
        );
        if (found2.length === 0 && cfg.key !== '阴差阳错') return;
        if (cfg.key === '阴差阳错' && !allZhis.some(z => z.shenshas.includes('阴差阳错'))) return;
        const item = shenshaItems.find(h => h.includes(`${cfg.icon} ${cfg.key}`));
        if (!item) return;
        (jiXingKeys.has(cfg.key) ? jiItems : shaItems).push(item);
      });
      // 天罗地网合并卡（如存在）
      const tlItem = shenshaItems.find(h => h.includes('天罗地网') && h.includes('全局'));
      if (tlItem) shaItems.push(tlItem);

      let panelHtml = `<div class="shensha-panel-title">🌟 神煞总览 <span style="font-size:0.8rem;font-weight:600;color:#5e7a63;">（悬停查看含义）</span></div>`;
      if (jiItems.length > 0) {
        panelHtml += `<div class="shensha-section-label" style="margin:6px 0 4px;font-size:0.75rem;font-weight:700;color:#2f9e44;letter-spacing:.05em;">✨ 吉星贵人</div>`;
        panelHtml += `<div class="shensha-grid">${jiItems.join('')}</div>`;
      }
      if (shaItems.length > 0) {
        panelHtml += `<div class="shensha-section-label" style="margin:10px 0 4px;font-size:0.75rem;font-weight:700;color:#c92a2a;letter-spacing:.05em;">⚠️ 煞星警示</div>`;
        panelHtml += `<div class="shensha-grid">${shaItems.join('')}</div>`;
      }
      shenshaPanel.innerHTML = panelHtml;
    } else {
      shenshaPanel.style.display = 'none';
    }

    const mainDash = document.getElementById('mainDashboard');

    // ── V3.0 UI 图表接入精准五行算法（包含地支藏干权重） ──
    const wxColors = { '木':'#2b8a3e','火':'#e03131','土':'#e67700','金':'#868e96','水':'#1c7ed6' };
    const { wxE: wxEui, totalE: totalEui } = getWxEnergyMap(ctx.nodes); 
    const wxPcts = {};
    ['木','火','土','金','水'].forEach(wx => { wxPcts[wx] = totalEui > 0 ? Math.round(wxEui[wx]/totalEui*100) : 0; });

    const dmStates = Array.from(ctx.nodes.dG.states).join('');
    const sc_deLing = dmStates.includes('当旺') || dmStates.includes('得相');
    // V3.0：得地须有本气通根，余气仅算"通根"不算"得地"（与正式判断一致）
    const sc_deDi = ctx.dmRoots ? ctx.dmRoots.mainCount > 0 : false;
    const sc_deDiSub = ctx.dmRoots ? ctx.dmRoots.subCount > 0 : false;
    const sc_deShi  = diag.ally > diag.enemy;
    const sancaiHtml = `
      <div class="sancai-row">
        <div class="sancai-badge ${sc_deLing ? 'sancai-yes':'sancai-no'}">
          ${sc_deLing ? '✅':'❌'} 得令<span class="sancai-sub">${ctx.nodes.mZ.char}月</span>
        </div>
        <div class="sancai-badge ${sc_deDi ? 'sancai-yes': (sc_deDiSub ? 'sancai-no' : 'sancai-no')}">
          ${sc_deDi ? '✅':'❌'} 得地<span class="sancai-sub">${sc_deDi ? '本气通根' : (sc_deDiSub ? '余气通根' : '无根')}</span>
        </div>
        <div class="sancai-badge ${sc_deShi ? 'sancai-yes':'sancai-no'}">
          ${sc_deShi ? '✅':'❌'} 得势<span class="sancai-sub">同类占优</span>
        </div>
      </div>`;

    const wxOrder = ['木','火','土','金','水'];
    const barSegs = wxOrder.map(wx => {
      const pct = wxPcts[wx];
      if (pct < 1) return '';
      // 宽度>=8%才在色条内显示文字，更小时由图例承载数值
      return `<div class="wuxing-bar-seg wxseg-${wx}" style="width:${pct}%" title="${wx} ${pct}%">${pct>=8 ? wx+' '+pct+'%' : pct>=4 ? pct+'%' : ''}</div>`;
    }).join('');
    const legendItems = wxOrder.map(wx => `
      <span class="wx-legend-item" title="${wx}五行占比">
        <span class="wx-legend-dot" style="background:${wxColors[wx]}"></span>${wx} <strong>${wxPcts[wx]}%</strong>
      </span>`).join('');
    const wuxingBarHtml = `
      <div class="wuxing-bar">${barSegs}</div>
      <div class="wuxing-legend">${legendItems}</div>`;

    const patParts = diag.patternStr.split(' · ');
    const patName  = patParts[0] || diag.patternStr;
    const patRest  = patParts.slice(1).join(' · ');
    const patMinorMatch = patRest.match(/▸\s*(.+)$/);
    const patDescClean  = patRest.replace(/▸.*$/, '').trim();
    const patMinorStr   = patMinorMatch ? patMinorMatch[1] : '';

    const suppPatterns = ctx.supplementaryPatterns || [];
    let suppHtml = '';
    if (suppPatterns.length > 0) {
      const suppItems = suppPatterns.map(sp => `
        <div class="supp-item">
          <div class="supp-item-name">
            ${sp.type === 'supp_two' ? '🌟' : sp.type === 'supp_three' ? '🌊' : sp.type === 'supp_half' ? '⚔️' : '🗡️'}
            ${sp.pattern}
            <span class="supp-source-tag">${sp.source}</span>
          </div>
          <div class="supp-item-desc">${sp.desc}</div>
          <div class="supp-item-yong">💡 参考用神方向：${sp.yongHint}</div>
        </div>`).join('');
      suppHtml = `
        <div class="supp-pattern-box" style="margin-top:10px;">
          <h4>📖 旁格参考 <span style="font-size:0.68rem;font-weight:600;color:#9e7a00;">（第三方理论 · 仅供辅助分析）</span></h4>
          ${suppItems}
        </div>`;
    }

    // 生成 CT 报告（调用完整报告生成器，传入所有上下文）
    const ctReportText = generateCTReport(ctx, diag, _renderBz, _renderLunar, _renderSolar, _renderGender);

    mainDash.innerHTML = `
      <div class="panel-left" style="overflow-y:auto;">
        <div class="panel-title">⚖️ 旺衰定局</div>
        <div class="ratio-bar">
          <div class="ratio-ally" id="barAlly">同类生扶</div>
          <div class="ratio-enemy" id="barEnemy">异类克耗</div>
        </div>
        ${sancaiHtml}
        <div class="result-huge" id="finalVerdict">${diag.verdict}</div>
        ${wuxingBarHtml}
        <div class="report-box" style="margin-top:12px;">
          <h4>🏛️ 格局（《子平真诠》权威判断）</h4>
          <div class="pattern-name">${patName}</div>
          ${patDescClean ? `<div class="pattern-desc">${patDescClean}</div>` : ''}
          ${patMinorStr  ? `<div class="pattern-minor">▸ ${patMinorStr}</div>` : ''}
          ${(() => {
            const bs = ctx.breakStatus;
            if (!bs || !bs.isBroken) return '<div class="break-status-box intact">格局成立，无破格忌神。</div>';
            if (bs.rescueType === 'full')    return `<div class="break-status-box broken-rescue"><strong>完整救应</strong>：${bs.breakerDesc}；${bs.rescuerDesc}。${bs.gradeHint}</div>`;
            if (bs.rescueType === 'partial') return `<div class="break-status-box broken-rescue"><strong>部分救应</strong>：${bs.breakerDesc}；${bs.rescuerDesc}（救应力弱）。${bs.gradeHint}</div>`;
            return `<div class="break-status-box broken-no-rescue">${bs.breakerDesc}。${bs.gradeHint}，用神改从旺衰定。</div>`;
          })()}
          ${suppHtml}
        </div>
        <div class="ct-report-card" style="margin-top:14px;">
          <div class="ct-report-header">
            <div class="ct-report-title">🔬 八字透析报告 <span style="font-size:0.7rem;font-weight:600;color:#868e96;">（结构透析·多派视角·不做唯一结论）</span></div>
            <div class="ct-btn-row">
              <button class="ct-btn ct-btn-copy" onclick="ctCopyReport()">📋 复制报告</button>
              <button class="ct-btn ct-btn-ai" onclick="ctShowAiModal()">🤖 AI解读指导</button>
              <span class="ct-copied-tip" id="ctCopiedTip">✓ 已复制！</span>
            </div>
          </div>
          <div class="ct-report-body" id="ctReportBody"></div>
        </div>
      </div>
      <div class="panel-right">
        <div class="panel-title">📝 推演审计（可逐条复核）</div>
        <div class="system-tags" id="systemTags"></div>
        <ul class="log-list" id="auditLogs"></ul>
      </div>
    `;

    document.getElementById('systemTags').innerHTML = ctx.tags.map(t => `<span class="sys-tag ${t.type}">${t.msg}</span>`).join('');
    
    const ul = document.getElementById('auditLogs');
    const frag = document.createDocumentFragment();
    ctx.logs.forEach((l, i) => {
      let li = document.createElement('li'); li.className = 'log-item';
      if (i < 12) li.style.animationDelay = `${i * 0.015}s`;
      li.innerHTML = `<span class="log-phase">${l.phase}</span> <span>${l.msg}</span>`;
      frag.appendChild(li);
    });
    ul.innerHTML = '';
    ul.appendChild(frag);

    let total = diag.ally + diag.enemy;
    let allyPct = total === 0 ? 50 : Math.round((diag.ally / total) * 100);
    document.getElementById('barAlly').style.width = `${allyPct}%`;
    document.getElementById('barAlly').innerText = `同类生扶 ${allyPct}%`;
    document.getElementById('barEnemy').innerText = `异类克耗 ${100 - allyPct}%`;

    // 填充透析报告内容（ctWrap 已在上方插入 DOM）
    const reportBodyEl = document.getElementById('ctReportBody');
    if (reportBodyEl) reportBodyEl.textContent = ctReportText;
    window._ctReportText = ctReportText;

    setTimeout(() => { const logs = document.getElementById('auditLogs'); if (logs) logs.scrollTop = logs.scrollHeight; }, 300);
  }

  /* =====================================================================
     大运排盘渲染函数
  ===================================================================== */
function renderDaYun(bz, gender, dayGan, birthYear, lunar, solar) {
    const panel = document.getElementById('daYunPanel');
    if (!panel) return;

    const yun = bz.getYun(gender);
    const daYun = yun.getDaYun();
    const currentYear = new Date().getFullYear();
    const genderLabel = gender === 1 ? '男命' : '女命';

    // ── 1. 起运日期信息提取（完全依赖原生API，剔除所有节气时间差手算） ──
    let startAge = 0;
    let startYearStr = '?';
    try {
        const startSolar = yun.getStartSolar();
        startYearStr = `${startSolar.getYear()}年${startSolar.getMonth()}月${startSolar.getDay()}日`;
        // 找第一个实际大运获取准确的起运岁数
        const firstReal = daYun.find(dy => !!dy.getGanZhi());
        if (firstReal) startAge = firstReal.getStartAge();
    } catch(e) {
        console.warn('起运信息读取异常', e);
    }

    // ── 2. 过滤童限/胎元 ──
    const realDaYun = daYun.filter(dy => !!dy.getGanZhi());

    const wxGradient = {
        '木': 'linear-gradient(135deg,#2b8a3e,#099268)',
        '火': 'linear-gradient(135deg,#e03131,#c92a2a)',
        '土': 'linear-gradient(135deg,#e67700,#d9480f)',
        '金': 'linear-gradient(135deg,#868e96,#495057)',
        '水': 'linear-gradient(135deg,#1c7ed6,#1864ab)',
    };

    // ── 3. 构建大运列 HTML ──
    let columnsHtml = '';
    realDaYun.forEach(dy => {
        const gz = dy.getGanZhi();
        const startYr = dy.getStartYear();
        const endYr = dy.getEndYear();
        // 核心修改：抛弃外层累加，直接取当前这步大运的起运年龄
        const dyStartAge = dy.getStartAge(); 
        const isCurrent = startYr <= currentYear && currentYear <= endYr;
        const isPast = endYr < currentYear;

        let pillarClass = 'dayun-pillar';
        if (isCurrent) pillarClass += ' is-current';
        else if (isPast) pillarClass += ' is-past';

        const ganChar = gz.charAt(0);
        const zhiChar = gz.charAt(1);
        const ganWx = DICT.WX[ganChar] || '土';
        const zhiWx = DICT.WX[zhiChar] || '土';
        const ssGan = getExactShiShenName(dayGan, ganChar, ganWx);
        const ssZhi = getExactShiShenName(dayGan, zhiChar, zhiWx);

        // 流年列表
        const liuNian = dy.getLiuNian();
        let lnHtml = '';
        liuNian.forEach(ln => {
            const lnYear = ln.getYear();
            const lnGz = ln.getGanZhi();
            const lnGan = lnGz.charAt(0);
            const lnZhi = lnGz.charAt(1);
            const lnWx = DICT.WX[lnGan] || '土';
            const lnZhiWx = DICT.WX[lnZhi] || '土';
            const lnZhiSs = getExactShiShenName(dayGan, lnZhi, lnZhiWx);
            const isNow = lnYear === currentYear;
            lnHtml += `<div class="dayun-ln-item${isNow?' is-now':''}">
                <span class="dayun-ln-year">${lnYear}</span>
                <span class="dayun-ln-gz" title="${lnGan}·${getExactShiShenName(dayGan, lnGan, lnWx)} / ${lnZhi}·${lnZhiSs}">${lnGz}</span>
                <span class="dayun-ln-ss">${lnZhiSs}</span> 
            </div>`;
        });

        const gzSection = `
            <div class="dayun-gz">${ganChar}<br>${zhiChar}</div>
            <div><span class="dayun-shishen" style="background:${wxGradient[ganWx]}">${ssGan}</span></div>
            <div style="margin-top:3px;">
                <span class="dayun-wx-badge" style="background:${wxGradient[zhiWx]}">${zhiWx}·${ssZhi}</span>
            </div>
            <div class="dayun-liunian-wrap" style="margin-top:8px;">
                <div class="dayun-liunian-title">流 年</div>
                <div class="dayun-liunian-list">${lnHtml}</div>
            </div>`;

        columnsHtml += `
            <div class="dayun-col">
                <div class="${pillarClass}">
                    <div class="dayun-age">${dyStartAge}岁</div>
                    <div class="dayun-year-range">${startYr}—${endYr}</div>
                    ${gzSection}
                </div>
            </div>`;
    });

    panel.style.display = 'block';
    panel.innerHTML = `
        <div class="dayun-panel">
            <div class="dayun-panel-header">
                <div class="dayun-panel-title">🌊 大运排盘</div>
                <div class="dayun-meta">
                    <div class="dayun-meta-item">🧭 <strong>${genderLabel}</strong></div>
                    <div class="dayun-meta-item">🚀 起运：<strong>${startYearStr}</strong>（${startAge}岁起运）</div>
                    <div class="dayun-meta-item">📅 当前：<strong>${currentYear}年</strong></div>
                </div>
            </div>
            <div class="dayun-scroll-wrap">
                <div class="dayun-track">${columnsHtml}</div>
            </div>
        </div>`;
}

  /**
   * generateCTReport — 生成完整透析报告（Markdown文本）
   */
  function generateCTReport(ctx, diag, bz, lunar, solar, gender) {
    if (!ctx || !diag) return '（推演未完成，无法生成报告）';
    let r = '';
    r += genCT_BasicInfo(ctx, diag, bz, lunar, solar, gender);
    r += genCT_WuxingEnergy(ctx);
    r += genCT_Pattern(ctx, diag);
    r += genCT_Conflicts(ctx);
    r += genCT_TiaoHou(ctx);
    r += genCT_YongShenDivergence(ctx, diag);
    r += genCT_DaYun(ctx, bz, gender, solar);
    r += genCT_ShenSha(ctx);
	r += genCT_LogicLogs(ctx);
    r += genCT_NeutralNote(ctx, diag);
    return r;
  }

  /* ── 1. 基础信息 ── */
  function genCT_BasicInfo(ctx, diag, bz, lunar, solar, gender) {
    const baziStr = `${ctx.nodes.yG.char}${ctx.nodes.yZ.char} ${ctx.nodes.mG.char}${ctx.nodes.mZ.char} ${ctx.nodes.dG.char}${ctx.nodes.dZ.char} ${ctx.nodes.hG.char}${ctx.nodes.hZ.char}`;
    const dmChar = ctx.nodes.dG.char;
    const dmWx   = ctx.nodes.dG.effectiveWx;
    const genderLabel = gender === 1 ? '男命' : '女命';
    let solarStr = '—', lunarStr = '—';
    try {
      if (solar) solarStr = `${solar.getYear()}年${solar.getMonth()}月${solar.getDay()}日`;
      if (lunar) lunarStr = `${lunar.getYearInChinese()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
    } catch(e) {}
    const birthYear = solar ? solar.getYear() : 0;
    const age = birthYear ? (new Date().getFullYear() - birthYear) : '—';

    return `╔════════════════════════════════╗
║      八字真鉴 V4.0 · 扫描报告     ║
╚════════════════════════════════╝

【基础信息】
─────────────────────────────
公历日期：${solarStr}
农历日期：${lunarStr}
性　　别：${genderLabel}
四柱八字：${baziStr}
日　　主：${dmChar}（${dmWx}）
参考年龄：约 ${age} 岁
─────────────────────────────
`;
  }

  /* ── 2. 五行能量分布 ── */
  function genCT_WuxingEnergy(ctx) {
    const { wxE, totalE } = ctx._wxCache || getWxEnergyMap(ctx.nodes);
    const WXS = ['木','火','土','金','水'];
    const pct = wx => totalE > 0 ? Math.round((wxE[wx]||0)/totalE*100) : 0;
    const bar = (p) => {
      const filled = Math.round(p / 5);
      return '█'.repeat(filled) + '░'.repeat(20 - filled) + ` ${p}%`;
    };
    let out = `\n【五行能量分布】\n─────────────────────────────\n`;
    WXS.forEach(wx => {
      const p = pct(wx);
      out += `${wx}：${bar(p)}\n`;
    });
    // 优势与短缺提示
    const sorted = WXS.map(wx=>({wx, p:pct(wx)})).sort((a,b)=>b.p-a.p);
    const dominant = sorted.filter(x=>x.p>=30).map(x=>`${x.wx}(${x.p}%)`).join('、');
    const scarce   = sorted.filter(x=>x.p<=5).map(x=>`${x.wx}(${x.p}%)`).join('、');
    if (dominant) out += `↑ 偏旺：${dominant}\n`;
    if (scarce)   out += `↓ 偏枯：${scarce}\n`;
    out += `─────────────────────────────\n`;
    return out;
  }

  /* ── 3. 格局识别 ── */
  function genCT_Pattern(ctx, diag) {
    const patParts = (diag.patternStr || '').split(' · ');
    const patName  = patParts[0] || diag.patternStr;
    const patRest  = patParts.slice(1).join(' · ');
    const patDescClean = patRest.replace(/▸.*$/, '').trim();
    const patMinorMatch = patRest.match(/▸\s*(.+)$/);
    const patMinorStr   = patMinorMatch ? patMinorMatch[1] : '';
    const verdict = diag.verdict || '';

    let out = `\n【格局识别】\n─────────────────────────────\n`;
    out += `主　格：${patName}\n`;
    if (patDescClean) out += `格局描述：${patDescClean}\n`;
    if (patMinorStr)  out += `补充说明：▸ ${patMinorStr}\n`;
    out += `旺衰判定：${verdict}\n`;

    // 破格状态
    const bs = ctx.breakStatus;
    if (bs && bs.isBroken) {
      out += `破格状态：⚠️ ${bs.breakerDesc}\n`;
      if (bs.rescueType !== 'none') out += `救应状态：🛡️ ${bs.rescuerDesc}（${bs.rescueType==='full'?'完整救应':'部分救应'}）\n`;
      else out += `救应状态：💔 无救应，${bs.gradeHint}\n`;
    } else {
      out += `破格状态：✅ 格局成立，无明显破格\n`;
    }

    // 旁格参考
    const supp = ctx.supplementaryPatterns || [];
    if (supp.length > 0) {
      out += `\n旁格参考（第三方理论·仅供辅助）：\n`;
      supp.forEach(sp => {
        out += `  · ${sp.pattern}（${sp.source}）：${sp.desc}\n`;
        out += `    参考用神方向：${sp.yongHint}\n`;
      });
    }
    out += `─────────────────────────────\n`;
    return out;
  }

  /* ── 4. 结构冲突扫描 ── */
  function genCT_Conflicts(ctx) {
    const { wxE, totalE } = ctx._wxCache || getWxEnergyMap(ctx.nodes);
    const pct = wx => totalE > 0 ? (wxE[wx]||0)/totalE : 0;
    const pctR = wx => Math.round(pct(wx)*100);
    const WXS = ['木','火','土','金','水'];
    const KE = {'木':'土','火':'金','土':'水','金':'木','水':'火'};
    const TONG_GUAN = {'木土':'火','土木':'火','水火':'木','火水':'木','木金':'水','金木':'水','土水':'金','水土':'金','火金':'土','金火':'土'};
    const logs = ctx.logs.map(l=>l.msg).join('\n');
    let conflicts = [];

    // 相战检测（双方>12%且相克）
    WXS.forEach(a => {
      const b = KE[a];
      if (!b) return;
      const pa = pct(a), pb = pct(b);
      if (pa > 0.12 && pb > 0.12) {
        const tk = TONG_GUAN[`${a}${b}`] || TONG_GUAN[`${b}${a}`] || '—';
        const tkPct = tk !== '—' ? `（通关五行${tk}仅${pctR(tk)}%）` : '';
        const intensity = Math.min(pa,pb) > 0.25 ? '⚔⚔ 激烈' : '⚔ 中等';
        conflicts.push(`${intensity}【${a}${b}交战】：${a}${pctR(a)}% 克 ${b}${pctR(b)}%。通关需求：${tk}${tkPct}`);
      }
    });

    // 独亢（某行>45%且其官杀极弱）
    const dmWx = ctx.nodes.dG.effectiveWx;
    const S = DICT.SHISHEN[dmWx];
    WXS.forEach(wx => {
      if (pct(wx) > 0.45) {
        const off = S?.off;
        if (off && pct(off) < 0.06) {
          conflicts.push(`🔥【${wx}气独亢】：${wx}占比${pctR(wx)}%，其官杀${off}仅${pctR(off)}%，几乎无制。`);
        } else {
          conflicts.push(`🔥【${wx}气偏旺】：${wx}占比${pctR(wx)}%，一行独大，需关注泄化。`);
        }
      }
    });

    // 缺行（<3%）
    WXS.forEach(wx => {
      if (pct(wx) < 0.03) {
        conflicts.push(`⬜【缺${wx}】：全局${wx}仅${pctR(wx)}%，极度匮乏。`);
      }
    });

    // 过泄/被抽干
    if (logs.includes('被抽干')) conflicts.push(`🕳️【食伤过泄·被抽干】：食伤能量严重抽空日主，日主虚浮。`);
    // 母慈灭子
    if (logs.includes('母慈灭子')) conflicts.push(`🌀【母慈灭子】：印星过旺，反克日主，身强若空。`);
    // 被反噬
    if (logs.includes('被反噬')) conflicts.push(`💢【财旺反噬】：财星过旺，日主弱不堪承，财反克身。`);
    // 蚍蜉撼树
    if (logs.includes('蚍蜉撼树')) conflicts.push(`🌊【蚍蜉撼树】：日主极弱，克泄力量过悬殊，孤弱难支。`);
    // 冰冻无用
    if (logs.includes('冰冻无用')) conflicts.push(`❄️【寒木冻水】：调候极需暖局，相关五行冰冻失效。`);

    // 地支冲刑害
    const allNodes = Object.values(ctx.nodes);
    const chongFounds = [], xingFounds = [], haiFounds = [];
    allNodes.forEach(n => {
      if (n.type !== '支') return;
      const states = Array.from(n.states||[]);
      states.forEach(s => {
        if (s.includes('受冲') || s.includes('冲')) chongFounds.push(`${n.label}${n.char}[${s}]`);
        else if (s.includes('刑')) xingFounds.push(`${n.label}${n.char}[${s}]`);
        else if (s.includes('害')) haiFounds.push(`${n.label}${n.char}[${s}]`);
      });
    });
    if (chongFounds.length) conflicts.push(`💥【地支相冲】：${[...new Set(chongFounds)].join('、')}`);
    if (xingFounds.length)  conflicts.push(`🗡️【地支相刑】：${[...new Set(xingFounds)].join('、')}`);
    if (haiFounds.length)   conflicts.push(`🔗【地支相害】：${[...new Set(haiFounds)].join('、')}`);

    // 伏吟反吟
    if (logs.includes('天克地冲') || logs.includes('反吟')) conflicts.push(`🪞【天克地冲·反吟】：日柱或年柱出现天克地冲，人生多波折反复。`);
    if (logs.includes('伏吟')) conflicts.push(`🪞【伏吟】：干支相同重叠，气势郁结不畅。`);

    let out = `\n【结构冲突扫描】\n─────────────────────────────\n`;
    if (conflicts.length === 0) {
      out += `（未检测到显著结构冲突，命局相对平和）\n`;
    } else {
      conflicts.forEach(c => { out += `${c}\n`; });
    }
    out += `─────────────────────────────\n`;
    return out;
  }

  /* ── 5. 调候需求 ── */
  function genCT_TiaoHou(ctx) {
    const mZChar = ctx.nodes.mZ.char;
    const thermal = ctx.thermalState || '常温';
    let out = `\n【调候需求（穷通宝鉴参考）】\n─────────────────────────────\n`;
    out += `月　令：${mZChar}月\n`;
    out += `热力状态：${thermal}\n`;

    const rx = ctx.tiaohuoRx;
    if (rx) {
      if (rx.yong) out += `调候用神：${rx.yong}\n`;
      if (rx.xi)   out += `调候喜神：${rx.xi}\n`;
      if (rx.ji)   out += `调候忌神：${Array.isArray(rx.ji)?rx.ji.join('、'):rx.ji}\n`;
      if (rx.desc) out += `调候说明：${rx.desc}\n`;
    } else {
      // 通用月令调候参考表
      const TIAO_REF = {
        '子':'子月寒冬，喜火土暖局，忌金水助寒。','丑':'丑月严寒，以火暖为先，土金次之。',
        '寅':'寅月余寒，喜丙火暖局，次取壬水调和。','卯':'卯月春和，五行中和，调候需求较低。',
        '辰':'辰月春末，湿土偏重，喜甲木疏土，次取壬水。','巳':'巳月初热，调候以壬水润局为要。',
        '午':'午月极热，壬水调候首要，次取庚金。','未':'未月酷热，壬水为先，庚金次之。',
        '申':'申月初秋，五行渐和，调候参考较低。','酉':'酉月秋凉，格局为主，调候次之。',
        '戌':'戌月秋末，燥土需壬水润，次取甲木疏土。','亥':'亥月入冬，戊土暖局为先，次取丙火。'
      };
      out += `调候说明：${TIAO_REF[mZChar] || '调候需结合全局五行配置具体分析。'}\n`;
    }

    // 调候与格局矛盾提示
    if (rx && ctx.breakStatus && !ctx.breakStatus.isBroken) {
      const logs = ctx.logs.map(l=>l.msg).join(' ');
      if (logs.includes('调候') && logs.includes('交战')) {
        out += `⚠️ 矛盾提示：调候所需五行与格局用神方向存在分歧，属命局内在张力，详见用神分歧板块。\n`;
      }
    }
    out += `─────────────────────────────\n`;
    return out;
  }

  /* ── 6. 各派用神分歧（核心） ── */
  function genCT_YongShenDivergence(ctx, diag) {
    const dmWx   = ctx.nodes.dG.effectiveWx;
    const verdict = diag.verdict || '';
    const S = DICT.SHISHEN[dmWx];
    const { wxE, totalE } = ctx._wxCache || getWxEnergyMap(ctx.nodes);
    const pct = wx => totalE > 0 ? Math.round((wxE[wx]||0)/totalE*100) : 0;
    const KE = {'木':'土','火':'金','土':'水','金':'木','水':'火'};
    const TONG_GUAN_MAP = {'木土':'火','土木':'火','水火':'木','火水':'木','木金':'水','金木':'水','土水':'金','水土':'金','火金':'土','金火':'土'};

    const isQiang = verdict.includes('身强') || verdict.includes('旺') || verdict.includes('极强');
    const isRuo   = verdict.includes('身弱') || verdict.includes('极弱');

    let out = `\n【各派用神分歧（多维视角·不做唯一结论）】\n─────────────────────────────\n`;
    out += `说明：以下分别从不同命理学派视角呈现，可能相互矛盾，需综合命理师判断。\n\n`;

    // ① 子平格局派
    const patName = (diag.patternStr || '').split(' · ')[0];
    let zpView = '';
    if (diag.triGods) {
      const yong = (diag.triGods.yongShen||[]).map(x=>x.wx).join('、');
      const xi   = (diag.triGods.xiShen||[]).map(x=>x.wx).join('、');
      const ji   = (diag.triGods.jiShen||[]).map(x=>x.wx).join('、');
      zpView = `用神：${yong||'—'}；喜神：${xi||'—'}；忌神：${ji||'—'}`;
    }
    out += `① 子平格局派（${patName}）：\n   ${zpView}\n\n`;

    // ② 扶抑派
    let fuYiView = '';
    if (isQiang) {
      fuYiView = `日主偏强，宜取官杀（${S.off}）克制、食伤（${S.out}）泄气、财星（${S.wea}）耗身；忌印星（${S.res}）、比劫（${dmWx}）再助。`;
    } else if (isRuo) {
      fuYiView = `日主偏弱，宜取印星（${S.res}）生扶、比劫（${dmWx}）帮身；忌财官食伤过旺耗克。`;
    } else {
      fuYiView = `日主中和，宜顺格局流通，五行流转为要，无绝对喜忌。`;
    }
    out += `② 扶抑派（旺衰角度）：\n   ${fuYiView}\n\n`;

    // ③ 调候派
    const rx = ctx.tiaohuoRx;
    let tiaoView = '';
    if (rx) {
      tiaoView = `月令${ctx.nodes.mZ.char}月，${ctx.thermalState}，调候首取${rx.yong||'—'}`;
      if (rx.xi) tiaoView += `，喜${rx.xi}`;
      if (rx.ji) tiaoView += `，忌${Array.isArray(rx.ji)?rx.ji.join('、'):rx.ji}`;
      tiaoView += `。${rx.desc||''}`;
    } else {
      tiaoView = `月令${ctx.nodes.mZ.char}月，热力状态：${ctx.thermalState}，无强烈调候触发，以格局为主。`;
    }
    out += `③ 调候派（穷通宝鉴）：\n   ${tiaoView}\n\n`;

    // ④ 通关派（基于冲突扫描）
    const WXS = ['木','火','土','金','水'];
    let tongguanLines = [];
    WXS.forEach(a => {
      const b = KE[a];
      if (!b) return;
      const pa = totalE>0?(wxE[a]||0)/totalE:0;
      const pb = totalE>0?(wxE[b]||0)/totalE:0;
      if (pa > 0.12 && pb > 0.12) {
        const tk = TONG_GUAN_MAP[`${a}${b}`] || TONG_GUAN_MAP[`${b}${a}`];
        if (tk) tongguanLines.push(`${a}（${Math.round(pa*100)}%）与${b}（${Math.round(pb*100)}%）交战，通关需${tk}（现${Math.round((totalE>0?(wxE[tk]||0)/totalE:0)*100)}%）`);
      }
    });
    const tongguanView = tongguanLines.length > 0 ? tongguanLines.join('；') : '原局无明显五行相战，通关需求较低。';
    out += `④ 通关派（制化角度）：\n   ${tongguanView}\n\n`;

    // ⑤ 算法量化参考（若有）
    const qr = ctx.quantResult;
    if (qr) {
      const matchStr = qr.isMatch ? '与格局用神吻合' : `与格局用神${qr.zpYong||''}存在分歧`;
      out += `⑤ 算法量化参考（五维综合·不代表绝对结论）：\n`;
      out += `   评分最高：${qr.top1.wx}（${qr.top1.role}，${qr.top1.score}分），${matchStr}\n`;
      out += `   次选：${qr.top2.wx}（${qr.top2.role}，${qr.top2.score}分）\n`;
      out += `   评分最低：${qr.bottom.wx}（${qr.bottom.role}，${qr.bottom.score}分）\n`;
    }

    out += `─────────────────────────────\n`;
    return out;
  }

  /* ── 7. 大运关键节点 ── */
  function genCT_DaYun(ctx, bz, gender, solar) {
  let out = `\n【大运关键节点】\n─────────────────────────────\n`;
  if (!bz || !solar) { out += `（大运数据不可用）\n─────────────────────────────\n`; return out; }
  try {
    const yun = bz.getYun(gender);
    const daYun = yun.getDaYun().filter(dy => !!dy.getGanZhi());
    const currentYear = new Date().getFullYear();
    const dayGan = ctx.nodes.dG.char;

    // 起运信息
    let startAge = 0, startYearStr = '?';
    try {
      const startSolar = yun.getStartSolar();
      startYearStr = `${startSolar.getYear()}年${startSolar.getMonth()}月`;
      if (daYun.length > 0) startAge = daYun[0].getStartAge();
    } catch(e) {}
    out += `起运时间：${startYearStr}（${startAge}岁起运）\n`;

    // 当前大运 + 前后各一步
    daYun.forEach((dy, j) => {
      const gz = dy.getGanZhi();
      const startYr = dy.getStartYear();
      const endYr   = dy.getEndYear();
      const dyAge   = dy.getStartAge(); // 核心修改：直接使用API年龄
      const isCurrent = startYr <= currentYear && currentYear <= endYr;
      const isNext    = startYr > currentYear && startYr <= currentYear+15;
      if (!isCurrent && !isNext && j > 0 && !daYun[j-1]) return;

      const ganChar = gz.charAt(0), zhiChar = gz.charAt(1);
      const ganWx = DICT.WX[ganChar]||'土', zhiWx = DICT.WX[zhiChar]||'土';
      const ssGan = getExactShiShenName(dayGan, ganChar, ganWx);
      const ssZhi = getExactShiShenName(dayGan, zhiChar, zhiWx);
      const marker = isCurrent ? ' ◀ 当前大运' : (isNext ? ' ← 即将' : '');
      out += `  ${dyAge}岁 ${startYr}—${endYr}：${gz}（${ssGan}·${ssZhi}）${marker}\n`;
    });

    // 当前流年提示
    const curDy = daYun.find(dy => dy.getStartYear() <= currentYear && currentYear <= dy.getEndYear());
    if (curDy) {
      const lns = curDy.getLiuNian();
      const curLn = lns.find(ln => ln.getYear() === currentYear);
      const nxtLn = lns.find(ln => ln.getYear() === currentYear + 1);
      if (curLn) {
        const lgz = curLn.getGanZhi();
        const lganWx = DICT.WX[lgz[0]] || '土', lzhiWx = DICT.WX[lgz[1]] || '土';
        out += `\n当前流年 ${currentYear}：${lgz}（${getExactShiShenName(dayGan, lgz[0], lganWx)}·${getExactShiShenName(dayGan, lgz[1], lzhiWx)}）\n`;
      }
      if (nxtLn) {
        const ngz = nxtLn.getGanZhi();
        const nganWx = DICT.WX[ngz[0]] || '土', nzhiWx = DICT.WX[ngz[1]] || '土';
        out += `下一流年 ${currentYear+1}：${ngz}（${getExactShiShenName(dayGan, ngz[0], nganWx)}·${getExactShiShenName(dayGan, ngz[1], nzhiWx)}）\n`;
      }
    }
  } catch(e) {
    out += `（大运计算异常：${e.message}）\n`;
  }
  out += `─────────────────────────────\n`;
  return out;
}

  /* ── 8. 神煞标注 ── */
  function genCT_ShenSha(ctx) {
    const allZhis = ctx._shenshaNodes || [];
    const KEY_SHENSHA = ['天乙','文昌','禄神','将星','驿马','羊刃','桃花','华盖','太极','金舆','学堂','天厨','劫煞','亡神','孤辰','寡宿','红艳','天罗','地网','阴差阳错','咸池'];
    let jiLines = [], shaLines = [];
    const JI_SET = new Set(['天乙','文昌','禄神','将星','驿马','羊刃','桃花','华盖','太极','金舆','学堂','天厨']);
    KEY_SHENSHA.forEach(key => {
      const isTlDw = key==='天罗'||key==='地网';
      const found = allZhis.filter(z => isTlDw
        ? z.shenshas.some(s=>s.startsWith(key))
        : z.shenshas.includes(key));
      if (found.length===0 && key!=='阴差阳错') return;
      if (key==='阴差阳错' && !allZhis.some(z=>z.shenshas.includes('阴差阳错'))) return;
      let locStr;
      if (key==='阴差阳错') {
        locStr = `日柱·${ctx.nodes.dG.char}${ctx.nodes.dZ.char}`;
      } else if (isTlDw) {
        locStr = found.map(z=>`${z.label}·${z.char}`).join('、');
      } else {
        locStr = found.map(z=>`${z.label}·${z.char}`).join('、');
      }
      const line = `${key}：${locStr}`;
      (JI_SET.has(key) ? jiLines : shaLines).push(line);
    });
    let out = `\n【神煞标注】\n─────────────────────────────\n`;
    if (jiLines.length) { out += `吉星：\n`; jiLines.forEach(l=>{ out+=`  ⭐ ${l}\n`; }); }
    if (shaLines.length){ out += `煞星：\n`; shaLines.forEach(l=>{ out+=`  🗡️ ${l}\n`; }); }
    if (!jiLines.length && !shaLines.length) out += `（无显著神煞）\n`;
    out += `─────────────────────────────\n`;
    return out;
  }

  /* ── 9. 中立结构倾向注记 ── */
  function genCT_NeutralNote(ctx, diag) {
    const { wxE, totalE } = ctx._wxCache || getWxEnergyMap(ctx.nodes);
    const pct = wx => totalE>0?Math.round((wxE[wx]||0)/totalE*100):0;
    const dmWx = ctx.nodes.dG.effectiveWx;
    const S = DICT.SHISHEN[dmWx];
    const verdict = diag.verdict || '';
    const WXS = ['木','火','土','金','水'];
    const sorted = WXS.map(wx=>({wx,p:pct(wx)})).sort((a,b)=>b.p-a.p);
    const top1 = sorted[0];
    const isQiang = verdict.includes('身强') || verdict.includes('旺') || verdict.includes('极强');
    const isRuo   = verdict.includes('身弱') || verdict.includes('极弱');

    // 生成温和倾向描述
    let note = '';
    if (top1 && top1.p >= 35) {
      note += `此命局${top1.wx}气偏旺（${top1.p}%），`;
      if (top1.wx === dmWx) note += `日主自身能量充沛，`;
      else if (top1.wx === S.res) note += `印星力量雄厚，`;
      else if (top1.wx === S.off) note += `官杀力量较强，`;
      else if (top1.wx === S.out) note += `食伤力量充足，`;
      else if (top1.wx === S.wea) note += `财星力量突出，`;
    }
    if (isQiang) note += `日主整体偏强，内在能量较足，倾向于向外输出与表达。`;
    else if (isRuo) note += `日主整体偏弱，内在支撑有限，倾向于寻求依附与扶助。`;
    else note += `日主中和平衡，气势较为均匀，发展空间较为开阔。`;

    const thermal = ctx.thermalState;
    if (thermal === '寒冻') note += `\n命局偏寒，暖局之需贯穿全局，适当的温暖环境与阳光性格有助调节。`;
    else if (thermal === '酷热') note += `\n命局偏热，润局之需贯穿全局，清凉宁静的环境与处事方式有助平衡。`;

    const supp = ctx.supplementaryPatterns || [];
    if (supp.length > 0) note += `\n原局另有${supp.map(s=>s.pattern).join('、')}等旁格参考，命局结构层次丰富。`;

    let out = `\n【结构倾向中立注记】\n─────────────────────────────\n`;
    out += `（仅描述命局结构倾向，不判断吉凶，不做唯一结论）\n`;
    out += `${note}\n`;
    out += `─────────────────────────────\n`;
    out += `\n📌 本报告由八字真鉴 V4.0 透析引擎生成\n`;

    return out;
  }
  
/* ── 新增：底层逻辑审计日志模块 ── */
function genCT_LogicLogs(ctx) {
  let out = `\n【底层推演审计日志 (Chain of Thought)】\n─────────────────────────────\n`;
  if (!ctx.logs || ctx.logs.length === 0) {
    out += `（无审计日志记录）\n`;
  } else {
    ctx.logs.forEach(l => {
      // 格式化输出：[阶段名] 具体描述
      out += `[${l.phase}] ${l.msg}\n`;
    });
  }
  out += `─────────────────────────────\n`;
  return out;
}

  function ctCopyReport() {
    const text = window._ctReportText || '';
    if (!text) return;
    const tip = document.getElementById('ctCopiedTip');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        if (tip) { tip.classList.add('show'); setTimeout(()=>tip.classList.remove('show'), 2000); }
      }).catch(() => ctFallbackCopy(text, tip));
    } else {
      ctFallbackCopy(text, tip);
    }
  }
  function ctFallbackCopy(text, tip) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); if(tip){tip.classList.add('show');setTimeout(()=>tip.classList.remove('show'),2000);} }
    catch(e) { prompt('请手动复制以下内容：', text); }
    document.body.removeChild(ta);
  }
