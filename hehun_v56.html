    /**
     * 检查某地支是否参与合化，并返回合化后的实际五行
     */
    function getHeHuaEffect(targetZhi, allZhi) {
        const sanHeGroups = [
            { zhi: ['申','子','辰'], wx: '水' },
            { zhi: ['亥','卯','未'], wx: '木' },
            { zhi: ['寅','午','戌'], wx: '火' },
            { zhi: ['巳','酉','丑'], wx: '金' }
        ];
        for (let group of sanHeGroups) {
            if (group.zhi.includes(targetZhi)) {
                const count = group.zhi.filter(z => allZhi.includes(z)).length;
                if (count >= 3) return { resultWx: group.wx, reason: `三合${group.wx}局` };
                if (count === 2) {
                    const other = group.zhi.find(z => z !== targetZhi && allZhi.includes(z));
                    if (other) {
                        const isShengDi = (targetZhi === group.zhi[0] && other === group.zhi[1]) || (targetZhi === group.zhi[1] && other === group.zhi[0]);
                        const isMuDi = (targetZhi === group.zhi[1] && other === group.zhi[2]) || (targetZhi === group.zhi[2] && other === group.zhi[1]);
                        if (isShengDi || isMuDi) return { resultWx: group.wx, reason: `半合${group.wx}局` };
                    }
                }
            }
        }
        const liuHeMap = { '子丑':'土','寅亥':'木','卯戌':'火','辰酉':'金','巳申':'水','午未':'土' };
        for (let z of allZhi) {
            if (z === targetZhi) continue;
            const key1 = targetZhi + z, key2 = z + targetZhi;
            const wx = liuHeMap[key1] || liuHeMap[key2];
            if (wx) return { resultWx: wx, reason: `六合化${wx}` };
        }
        return null;
    }

    /**
     * 获取合局对某五行的加成（用于强弱计算）
     */
    function getHeJuBonus(zhiList, targetWx) {
        let bonus = 0;
        const sanHeGroups = [
            { zhi: ['申','子','辰'], wx: '水' },
            { zhi: ['亥','卯','未'], wx: '木' },
            { zhi: ['寅','午','戌'], wx: '火' },
            { zhi: ['巳','酉','丑'], wx: '金' }
        ];
        sanHeGroups.forEach(group => {
            const count = group.zhi.filter(z => zhiList.includes(z)).length;
            if (count >= 3 && group.wx === targetWx) bonus += 20;
            else if (count === 2 && group.wx === targetWx) bonus += 8;
        });
        const liuHeMap = { '子丑':'土','寅亥':'木','卯戌':'火','辰酉':'金','巳申':'水','午未':'土' };
        for (let i = 0; i < zhiList.length; i++) {
            for (let j = i+1; j < zhiList.length; j++) {
                const key1 = zhiList[i] + zhiList[j], key2 = zhiList[j] + zhiList[i];
                const wx = liuHeMap[key1] || liuHeMap[key2];
                if (wx === targetWx) bonus += 6;
            }
        }
        return bonus;
    }

    // ================= 拓扑节点类 (BaziNode Class) =================
    class BaziNode {
        constructor(id, label, char, type) {
          this.id = id; this.label = label; this.char = char;           
          this.originalWx = QUANTUM_DICT.WX[char]; this.currentWx = this.originalWx; 
          this.type = type; 
          this.energy = 1.0; 
          
          this.states = [];       
          this.shenshas = [];     
          this.qiPhase = '';      
          this.isVoid = false;    
          this.isTransformed = false; 
          this.isHuoYi = false;
          this.transformedWx = null;
        }
        
        addState(stateStr, energyMult = 1.0) {
          if(!this.states.includes(stateStr)) {
            this.states.push(stateStr);
            this.energy *= energyMult;
          }
        }
        
        hasState(stateStr) { return this.states.some(s => s.includes(stateStr)); }
        isActive() { return !this.hasState('重伤'); }
    }

    // ================= Quantum算法模块 (Refactored Core Algorithms) =================
    function getShiShenName(dmWx, targetWx) {
        if(!dmWx || !targetWx) return '未知';
        for(let role in QUANTUM_DICT.SHISHEN[dmWx]) { 
          if(QUANTUM_DICT.SHISHEN[dmWx][role] === targetWx) return {self:'比劫', res:'印星', off:'官杀', wea:'财星', out:'食伤'}[role];
        } return '未知';
    }

    function processNaYinAndPhase(nodes, nayinDict, dmChar) {
        for (const p of ['y', 'm', 'd', 'h']) {
            nodes[`${p}G`].naYin = nayinDict[p];
            nodes[`${p}Z`].naYin = nayinDict[p];
        }

        [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ].forEach(z => {
          let phase = QUANTUM_DICT.QI_PHASE[dmChar][z.char];
          z.qiPhase = phase;
          if(phase === '临官' || phase === '帝旺') {
            z.addState('强根', 1.1);
          }
        });
    }

    function processVoid(nodes, bz) {
        const dayPillar = bz.getDayGan() + bz.getDayZhi();
        
        const idx = QUANTUM_DICT.JIAZI.indexOf(dayPillar);
        if (idx === -1) return;
        
        const xunShouIdx = Math.floor(idx / 10) * 10;
        const xunShou = QUANTUM_DICT.JIAZI[xunShouIdx];
        const voidIdx1 = (xunShouIdx + 10) % 60;
        const voidIdx2 = (xunShouIdx + 11) % 60;
        const void1 = QUANTUM_DICT.JIAZI[voidIdx1].charAt(1);
        const void2 = QUANTUM_DICT.JIAZI[voidIdx2].charAt(1);
        
        let voidFound = false;
        ['yZ', 'mZ', 'dZ', 'hZ'].forEach(key => {
          let node = nodes[key];
          if(node.char === void1 || node.char === void2) {
            node.isVoid = true;
            node.addState('空亡', 0.3);
            voidFound = true;
          }
        });
    }

    function processShenSha(nodes) {
        let yZhi = nodes.yZ.char, dZhi = nodes.dZ.char, dGan = nodes.dG.char;
        let zhis = [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ];

        const yangrenMap = {'甲':'卯', '丙':'午', '戊':'午', '庚':'酉', '壬':'子'};
        const getTaohua = (z) => ({'申':'酉','子':'酉','辰':'酉','亥':'子','卯':'子','未':'子','寅':'卯','午':'卯','戌':'卯','巳':'午','酉':'午','丑':'午'}[z]);
        const getHuagai = (z) => ({'寅':'戌','午':'戌','戌':'戌','亥':'未','卯':'未','未':'未','申':'辰','子':'辰','辰':'辰','巳':'丑','酉':'丑','丑':'丑'}[z]);

        let tY = getTaohua(yZhi), tD = getTaohua(dZhi);
        let hY = getHuagai(yZhi), hD = getHuagai(dZhi);
        let yr = yangrenMap[dGan];

        zhis.forEach(z => {
          if(z.char === yr) { z.shenshas.push('羊刃'); }
          if(z.char === tY || z.char === tD) z.shenshas.push('桃花');
          if(z.char === hY || z.char === hD) z.shenshas.push('华盖');
        });
    }

    function applySeasonalBaseline(nodes, monthZhi) {
        const rules = {
          '木': { '亥':1.2, '子':1.2, '寅':1.4, '卯':1.4, '巳':0.8, '午':0.8, '辰':0.7, '戌':0.7, '丑':0.7, '未':0.7, '申':0.6, '酉':0.6 },
          '火': { '寅':1.2, '卯':1.2, '巳':1.4, '午':1.4, '辰':0.8, '戌':0.8, '丑':0.8, '未':0.8, '申':0.6, '酉':0.6, '亥':0.6, '子':0.6 },
          '土': { '巳':1.2, '午':1.2, '辰':1.4, '戌':1.4, '丑':1.4, '未':1.4, '申':0.8, '酉':0.8, '亥':0.7, '子':0.7, '寅':0.6, '卯':0.6 },
          '金': { '辰':1.2, '戌':1.2, '丑':1.2, '未':1.2, '申':1.4, '酉':1.4, '亥':0.8, '子':0.8, '寅':0.6, '卯':0.6, '巳':0.6, '午':0.6 },
          '水': { '申':1.2, '酉':1.2, '亥':1.4, '子':1.4, '寅':0.8, '卯':0.8, '巳':0.6, '午':0.6, '辰':0.7, '戌':0.7, '丑':0.7, '未':0.7 }
        };
        for(let key in nodes) {
          let n = nodes[key];
          let factor = rules[n.originalWx][monthZhi] || 1.0;
          let stateName = factor >= 1.4 ? '当旺' : factor >= 1.2 ? '得相' : factor >= 0.8 ? '休气' : factor >= 0.7 ? '囚气' : '死绝';
          n.addState(stateName, factor);
        }
    }

    function processVerticalInteractions(nodes) {
        const pairs = [ {g: nodes.yG, z: nodes.yZ}, {g: nodes.mG, z: nodes.mZ}, {g: nodes.dG, z: nodes.dZ}, {g: nodes.hG, z: nodes.hZ} ];
        pairs.forEach(pair => {
          let gan = pair.g, zhi = pair.z;
          
          if (gan.currentWx === zhi.currentWx) {
            gan.addState('同气', 1.3); zhi.addState('同气', 1.3);
          } else {
            if(QUANTUM_DICT.SHISHEN[gan.currentWx].off === zhi.currentWx) {
              gan.addState('盖头', 0.9); zhi.addState('受压', 0.75);
            } else if (QUANTUM_DICT.SHISHEN[zhi.currentWx].off === gan.currentWx) {
              zhi.addState('截脚', 0.9); gan.addState('截脚', 0.75);
            }
          }
          
          let hiddenGans = QUANTUM_DICT.HIDDEN[zhi.char] || [];
          for(let i=0; i<hiddenGans.length; i++) {
            if(QUANTUM_DICT.WX[hiddenGans[i]] === gan.currentWx) {
              let rootType = ['本','中','余'][i];
              let weight = QUANTUM_DICT.HIDDEN_WEIGHT[i];
              gan.addState(`通${rootType}气根`, 1.0 + weight);
              if(i === 0) gan.addState('强根', 1.05);
              break; 
            }
          }
        });
    }

    function processStemInteractions(nodes) {
        const stems = [nodes.yG, nodes.mG, nodes.dG, nodes.hG];
        for(let i=0; i<stems.length - 1; i++) {
          let n1 = stems[i], n2 = stems[i+1];
          
          if (QUANTUM_DICT.HE_GAN[n1.char] === n2.char) {
            continue; 
          }

          let isObstructed = false;
          if (!isObstructed) {
              if (QUANTUM_DICT.SHISHEN[n1.currentWx].out === n2.currentWx) { n2.addState('受生', 1.2); }
              else if (QUANTUM_DICT.SHISHEN[n2.currentWx].out === n1.currentWx) { n1.addState('受生', 1.2); }
              
              if (QUANTUM_DICT.SHISHEN[n1.currentWx].off === n2.currentWx) { n2.addState('受克', 0.75); } 
              else if (QUANTUM_DICT.SHISHEN[n2.currentWx].off === n1.currentWx) { n1.addState('受克', 0.75); }
          }
        }
    }

    function processCombinations(nodes) {
        const zhiNodes = [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ];
        const zhiChars = zhiNodes.map(n => n.char);

        // 三会局
        const sanHui = [
            { n: '寅卯辰', e: ['寅', '卯', '辰'], w: '木' },
            { n: '巳午未', e: ['巳', '午', '未'], w: '火' },
            { n: '申酉戌', e: ['申', '酉', '戌'], w: '金' },
            { n: '亥子丑', e: ['亥', '子', '丑'], w: '水' }
        ];

        let huiMatch = sanHui.find(h => h.e.every(c => zhiChars.includes(c)));

        if (huiMatch) {
            let isSuccessful = nodes.mZ.char === huiMatch.e[1];

            zhiNodes.forEach(n => {
                if (huiMatch.e.includes(n.char)) {
                    n.isHuoYi = true;
                    if (isSuccessful) {
                        n.isTransformed = true;
                        n.transformedWx = huiMatch.w;
                        if (n.originalWx === huiMatch.w) {
                            n.addState('三会主', 1.8);
                        } else {
                            n.addState('从化', 1.0);
                        }
                    } else {
                        n.addState('三会绊', 0.7);
                    }
                }
            });

        } else {
            // 三合局
            const sanHe = [
                { n: '亥卯未', e: ['亥', '卯', '未'], w: '木' },
                { n: '寅午戌', e: ['寅', '午', '戌'], w: '火' },
                { n: '巳酉丑', e: ['巳', '酉', '丑'], w: '金' },
                { n: '申子辰', e: ['申', '子', '辰'], w: '水' }
            ];

            let heMatch = sanHe.find(h => h.e.every(c => zhiChars.includes(c)));

            if (heMatch) {
                let isSuccessful = nodes.mZ.char === heMatch.e[1];

                zhiNodes.forEach(n => {
                    if (heMatch.e.includes(n.char)) {
                        n.isHuoYi = true;
                        if (isSuccessful) {
                            n.isTransformed = true;
                            n.transformedWx = heMatch.w;
                            if (n.originalWx === heMatch.w) {
                                n.addState('三合主', 1.6);
                            } else {
                                n.addState('从化', 1.0);
                            }
                        } else {
                            n.addState('三合绊', 0.7);
                        }
                    }
                });
            }
        }

        // 六合
        const zhiPairs = [
            [nodes.yZ, nodes.mZ],
            [nodes.mZ, nodes.dZ],
            [nodes.dZ, nodes.hZ]
        ];
        const liuHe = [
            { e: ['子', '丑'] },
            { e: ['寅', '亥'] },
            { e: ['卯', '戌'] },
            { e: ['辰', '酉'] },
            { e: ['巳', '申'] },
            { e: ['午', '未'] }
        ];

        zhiPairs.forEach(pair => {
            const a = pair[0].char;
            const b = pair[1].char;

            let match = liuHe.find(h => 
                (h.e[0] === a && h.e[1] === b) || 
                (h.e[0] === b && h.e[1] === a)
            );

            if (match) {
                pair[0].isHuoYi = true;
                pair[1].isHuoYi = true;
                pair[0].addState('六合', 1.3);
                pair[1].addState('六合', 1.3);
            }
        });
    }

    function processBranchInteractions(nodes) {
        const adjPairs = [[nodes.yZ, nodes.mZ], [nodes.mZ, nodes.dZ], [nodes.dZ, nodes.hZ]];
        adjPairs.forEach(pair => {
          if(QUANTUM_DICT.CHONG_ZHI[pair[0].char] === pair[1].char) {
            let e0 = pair[0].energy; let e1 = pair[1].energy;
            if (e0 > e1 * 1.4) {
              pair[0].addState('冲克占优', 0.85); pair[1].addState('重伤', 0.2);
            } else if (e1 > e0 * 1.4) {
              pair[1].addState('冲克占优', 0.85); pair[0].addState('重伤', 0.2);
            } else {
              pair[0].addState('受冲', 0.5); pair[1].addState('受冲', 0.5);
            }
          }
        });
    }

    function processMediation(nodes) {
        const MEDIATION_MAP = { '金-木': '水', '木-土': '火', '土-水': '金', '水-火': '木', '火-金': '土' };
        let nodeArr = Object.values(nodes);
        let mediatedPairs = new Set();
        
        for (let i = 0; i < nodeArr.length; i++) {
          for (let j = 0; j < nodeArr.length; j++) {
            if (i === j) continue;
            let A = nodeArr[i], B = nodeArr[j];
            if (!A.isActive() || !B.isActive()) continue;
            
            let effectiveAwx = A.isTransformed ? A.transformedWx : A.currentWx;
            let effectiveBwx = B.isTransformed ? B.transformedWx : B.currentWx;
            
            if (QUANTUM_DICT.SHISHEN[effectiveAwx].off !== effectiveBwx) continue;

            let mediatorWx = MEDIATION_MAP[`${effectiveAwx}-${effectiveBwx}`];
            if (mediatorWx) {
              let mediators = nodeArr.filter(n => {
                  let nWx = n.isTransformed ? n.transformedWx : n.currentWx;
                  return nWx === mediatorWx && n.isActive() && !n.isVoid;
              });
              
              if (mediators.length > 0) {
                let strongestC = mediators.reduce((prev, curr) => (prev.energy > curr.energy) ? prev : curr);
                if (strongestC.energy < 0.6) continue;
                
                let pairId = `${A.id}->${B.id}`;
                if (mediatedPairs.has(pairId)) continue;
                mediatedPairs.add(pairId);

                A.addState('通关泄', 1.0);
                B.addState('受化生', 1.0);
                strongestC.addState('枢纽', 1.1);
              }
            }
          }
        }
    }

    function processFuyinFanyin(nodes) {
        let pillars = [
           {name: '年柱', g: nodes.yG, z: nodes.yZ},
           {name: '月柱', g: nodes.mG, z: nodes.mZ},
           {name: '日柱', g: nodes.dG, z: nodes.dZ},
           {name: '时柱', g: nodes.hG, z: nodes.hZ}
        ];
        for(let i=0; i<pillars.length; i++){
            for(let j=i+1; j<pillars.length; j++){
                let p1 = pillars[i], p2 = pillars[j];
                if(p1.g.char === p2.g.char && p1.z.char === p2.z.char) {
                }
                let ganChong = QUANTUM_DICT.SHISHEN[p1.g.currentWx].off === p2.g.currentWx || QUANTUM_DICT.SHISHEN[p2.g.currentWx].off === p1.g.currentWx;
                let zhiChong = QUANTUM_DICT.CHONG_ZHI[p1.z.char] === p2.z.char;
                if(ganChong && zhiChong) {
                }
            }
        }
    }

    // V-Next风格的格局判断函数
    function isStemSeverelyDamaged(stem, nodes) {
        const pillarMap = { 'yG':'yZ', 'mG':'mZ', 'dG':'dZ', 'hG':'hZ' };
        const sitBranch = nodes[pillarMap[stem.id]];
        if (sitBranch) {
            let sitEffectiveWx = sitBranch.isTransformed ? sitBranch.transformedWx : sitBranch.currentWx;
            if (QUANTUM_DICT.SHISHEN[sitEffectiveWx].off === stem.currentWx) return true;
        }
        
        const stemList = [nodes.yG, nodes.mG, nodes.dG, nodes.hG];
        const idx = stemList.findIndex(s => s.id === stem.id);
        const left = idx > 0 ? stemList[idx-1] : null;
        const right = idx < 3 ? stemList[idx+1] : null;
        
        for (let neighbor of [left, right]) {
          if (!neighbor) continue;
          if (QUANTUM_DICT.SHISHEN[neighbor.currentWx].off === stem.currentWx) {
            if (!neighbor.hasState('合') && !neighbor.isHuoYi) return true;
          }
        }
        
        if (stem.isTransformed && stem.transformedWx !== stem.originalWx) return true;
        if (stem.isVoid && stem.energy < 0.5) return true;
        
        return false;
    }

    function hasRealRoot(nodes, dmWx) {
        const branches = [nodes.yZ, nodes.mZ, nodes.dZ, nodes.hZ];
        for (let z of branches) {
          if (!z.isActive() || z.isVoid) continue;
          
          const hidden = QUANTUM_DICT.HIDDEN[z.char];
          for (let i = 0; i < hidden.length; i++) {
            if (hidden[i] && QUANTUM_DICT.WX[hidden[i]] === dmWx) {
                if (!z.hasState('重伤') && !z.hasState('受冲')) return true;
            }
          }
        }
        return false;
    }

    function getEffectiveMonthWx(monthZhiNode) {
        if (monthZhiNode.isTransformed && monthZhiNode.transformedWx !== monthZhiNode.originalWx) {
          return monthZhiNode.transformedWx;
        }
        const hidden = QUANTUM_DICT.HIDDEN[monthZhiNode.char];
        return QUANTUM_DICT.WX[hidden[0]];
    }

    function hasStrongEnemy(nodes, dmWx) {
        const allNodes = [...Object.values(nodes)];
        for (let n of allNodes) {
          if (n.id === 'dG') continue;
          if (!n.isActive() || n.isVoid) continue;
          
          let effectiveWx = n.isTransformed ? n.transformedWx : n.currentWx;
          const role = getShiShenName(dmWx, effectiveWx);
          
          if (role === '官杀' || role === '财星' || role === '食伤') {
            if (n.type === '支') {
              const hidden = QUANTUM_DICT.HIDDEN[n.char];
              if (hidden[0] && QUANTUM_DICT.WX[hidden[0]] === effectiveWx) return true;
            }
            if (n.energy > 0.7) return true;
          }
        }
        return false;
    }

    function checkHuaQiGe(nodes, dmWx) {
        const dmChar = nodes.dG.char; 
        const neighbors = [nodes.mG, nodes.hG]; 
        
        const huaMap = {
          '甲己': '土', '己甲': '土', '乙庚': '金', '庚乙': '金',
          '丙辛': '水', '辛丙': '水', '丁壬': '木', '壬丁': '木',
          '戊癸': '火', '癸戊': '火'
        };
        
        for (let neighbor of neighbors) {
          if (!neighbor || !neighbor.isActive() || neighbor.isVoid) continue;
          
          const pair = dmChar + neighbor.char;
          const huaWx = huaMap[pair];
          if (!huaWx) continue; // 不符合天干五合则跳过
          
          // 检验月令是否为化神五行，如果不是，则检验相合双干在月令是否旺相
          const monthWx = getEffectiveMonthWx(nodes.mZ);
          if (monthWx !== huaWx) {
            const phase1 = QUANTUM_DICT.QI_PHASE[dmChar][nodes.mZ.char];
            const phase2 = QUANTUM_DICT.QI_PHASE[neighbor.char][nodes.mZ.char];
            if (!['长生','临官','帝旺'].includes(phase1) && !['长生','临官','帝旺'].includes(phase2)) continue;
          }
          
          // 检验全盘地支是否有化神的根气 (修复：遍历全藏干)
          let hasRoot = false;
          ['yZ','mZ','dZ','hZ'].forEach(k => {
            const z = nodes[k];
            const hidden = QUANTUM_DICT.HIDDEN[z.char];
            for (let i = 0; i < hidden.length; i++) {
              if (hidden[i] && QUANTUM_DICT.WX[hidden[i]] === huaWx) hasRoot = true;
            }
          });
          if (!hasRoot) continue;
          
          // 检验化神双干自身是否受损
          if (isStemSeverelyDamaged(nodes.dG, nodes) || isStemSeverelyDamaged(neighbor, nodes)) continue;
          
          return { pattern: `${huaWx}化气格`, type: 'special', desc: `日干[${dmChar}]与${neighbor.label}[${neighbor.char}]合化${huaWx}成功` };
        }
        return null;
    }

    function determineFullPattern(nodes, dmWx, allyScore, enemyScore) {
        const mZ = nodes.mZ;
        const dmGan = nodes.dG.char;
        const isYangGan = ['甲','丙','戊','庚','壬'].includes(dmGan);
        
        if (allyScore / (enemyScore || 1) > 3.0 && !hasStrongEnemy(nodes, dmWx)) {
          const wxName = {'木':'曲直格','火':'炎上格','土':'稼穑格','金':'从革格','水':'润下格'};
          if (wxName[dmWx]) {
            return { pattern: wxName[dmWx], type: 'special', desc: `全局${dmWx}气专旺，顺其势而行` };
          }
        }
        
        const ratio = allyScore / (enemyScore || 1);
        if (ratio < 0.35 && !hasRealRoot(nodes, dmWx)) {
          const counts = { '官杀':0, '财星':0, '食伤':0 };
          ['yG','mG','hG','yZ','mZ','dZ','hZ'].forEach(k => {
            const n = nodes[k];
            if (!n.isActive()) return;
            let effectiveWx = n.isTransformed ? n.transformedWx : n.currentWx;
            const role = getShiShenName(dmWx, effectiveWx);
            if (counts.hasOwnProperty(role)) counts[role] += (n.type === '支' ? 2 : 1);
          });
          let maxRole = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
          return { pattern: `从${maxRole}格`, type: 'special', desc: `日主无根，从于旺势` };
        }
        
        const huaGe = checkHuaQiGe(nodes, dmWx);
        if (huaGe) {
          return huaGe;
        }
        
        const effectiveMonthWx = getEffectiveMonthWx(mZ);
        if (effectiveMonthWx === dmWx) {
          const patternName = isYangGan ? '建禄格' : '月刃格';
          return { pattern: patternName, type: 'misc', desc: '比肩秉令，喜财官' };
        }
        
        const hidden = QUANTUM_DICT.HIDDEN[mZ.char];
        const stems = [nodes.yG, nodes.mG, nodes.hG];
        
        for (let h of hidden) {
          const matchStem = stems.find(s => s.char === h && s.isActive() && !s.isVoid);
          if (matchStem) {
            if (isStemSeverelyDamaged(matchStem, nodes)) {
              continue;
            }
            const role = getShiShenName(dmWx, QUANTUM_DICT.WX[h]);
            return { pattern: `${role}格`, type: 'standard', desc: `月令透出${h}，成${role}格` };
          }
        }
        
        if (mZ.isTransformed && mZ.transformedWx !== mZ.originalWx) {
          const role = getShiShenName(dmWx, mZ.transformedWx);
          return { pattern: `${role}格`, type: 'standard', desc: `月令合化，以${role}为格` };
        }
        
        const mainRole = getShiShenName(dmWx, effectiveMonthWx);
        return { pattern: `${mainRole}格`, type: 'standard', desc: `月令本气为${mainRole}，未透` };
      }

    // V-Next风格的格局与强弱判断函数
    function evaluatePatternAndStrength(nodes, dmGan) {
        const dmWx = nodes.dG.currentWx;
        const monthZhi = nodes.mZ.char;
        const isYinGan = ['乙','丁','己','辛','癸'].includes(dmGan);
        
        let allyScore = 0; 
        let enemyScore = 0; 
        let resHealthIssue = false;
        let isTiaoHouCritical = false;
        
        const seasonData = QUANTUM_DICT.SEASON_TIANTU[monthZhi];
        if (seasonData) {
            if (['癸','壬'].includes(dmGan) && seasonData.hot.includes(dmGan)) isTiaoHouCritical = true;
            if (['丁','丙'].includes(dmGan) && seasonData.cold.includes(dmGan)) isTiaoHouCritical = true;
        }
        
        let hasRootLocal = hasRealRoot(nodes, dmWx);
        
        for(let key in nodes) {
          if(key === 'dG') continue; 
          let n = nodes[key];
          if(!n.isActive()) continue; 

          let baseWeight = 12;
          if (key === 'mZ') {
              if (n.hasState('重伤')) { baseWeight = 8; }
              else if (n.isTransformed && n.transformedWx !== n.originalWx) { baseWeight = 28; }
              else { baseWeight = 35; }
          } else if (key === 'dZ') baseWeight = 15;
          else if (key === 'yZ') baseWeight = 20;
          else if (key === 'hZ') baseWeight = 12;

          let effectiveWx = n.isTransformed ? n.transformedWx : n.currentWx;
          let finalEnergy = baseWeight * n.energy;
          let role = getShiShenName(dmWx, effectiveWx);
          
          if(role === '印星' && n.hasState('重伤')) resHealthIssue = true;
          if(role === '比劫' || role === '印星') allyScore += finalEnergy;
          else enemyScore += finalEnergy;
        }

        let ratio = allyScore / (enemyScore || 1);
        let verdict = '';
        let isTrueSpecial = false;
        
        if (!hasRootLocal) {
            if (isTiaoHouCritical) {
                verdict = '身弱 (调候优先)';
            } else if (ratio < 0.3) {
                verdict = isYinGan ? '真从格 (阴干易从)' : '真从格 (阳干失势)';
                isTrueSpecial = true;
            } else {
                verdict = '假从 / 极弱';
            }
        } else if (ratio > 3.5) {
            let enemiesAlive = hasStrongEnemy(nodes, dmWx);
            
            if (!enemiesAlive) {
                verdict = '真专旺格 (纯粹无杂)';
                isTrueSpecial = true;
            } else {
                verdict = '假专旺 / 极强';
            }
        } 
        else if (ratio > 1.25) { verdict = '身强 (可担财官)'; }
        else if (ratio < 0.85) { verdict = '身弱 (杀重身轻)'; }
        else { verdict = '中和 (平衡流转)'; }

        const patternResult = determineFullPattern(nodes, dmWx, allyScore, enemyScore);
        
        // 根据格局类型和强弱返回用神信息
        let yongShen = { primary: [], secondary: [], avoid: [] };
        
        if (isTrueSpecial && ratio < 0.3) { // 真从格
            // 从格的用神就是异党
            if (patternResult.pattern.includes('从官杀')) {
                yongShen.primary = ['官杀'];
                yongShen.secondary = ['财星'];
            } else if (patternResult.pattern.includes('从财')) {
                yongShen.primary = ['财星'];
                yongShen.secondary = ['官杀'];
            } else if (patternResult.pattern.includes('从食伤')) {
                yongShen.primary = ['食伤'];
                yongShen.secondary = ['财星'];
            } else if (patternResult.pattern.includes('从比劫')) {
                yongShen.primary = ['比劫'];
                yongShen.secondary = ['印星'];
            }
        } else if (isTrueSpecial && ratio > 3.5) { // 专旺格
            yongShen.primary = ['食伤'];
            yongShen.secondary = ['印星'];
        } else if (verdict.includes('身弱')) {
            yongShen.primary = [QUANTUM_DICT.SHISHEN[dmWx].res]; // 印星
            yongShen.secondary = [dmWx]; // 比劫
        } else if (verdict.includes('身强')) {
            yongShen.primary = [QUANTUM_DICT.SHISHEN[dmWx].off]; // 官杀
            yongShen.secondary = [QUANTUM_DICT.SHISHEN[dmWx].out]; // 食伤
            yongShen.avoid = [dmWx, QUANTUM_DICT.SHISHEN[dmWx].res]; // 避开比劫和印星
        } else { // 中和
            yongShen.primary = [QUANTUM_DICT.SHISHEN[dmWx].off];
            yongShen.secondary = [QUANTUM_DICT.SHISHEN[dmWx].out];
        }
        
        return { 
            strength: verdict, 
            pattern: patternResult, 
            yongShen: yongShen,
            ally: allyScore,
            enemy: enemyScore
        };
    }

    /**
     * 选择用神、喜神、忌神（使用V-Next逻辑）
     */
    function selectYongShenVNext(info) {
        const dayGan = info.dayGan;
        const monthZhi = info.yueZhi;
        const zhiList = info.zhiList;
        const ganList = info.ganList;
        const hideGanList = info.hideGanList;

        // 构建V-Next风格的节点
        const nodes = {
            yG: new BaziNode('yG', '年干', ganList[0], '干'), yZ: new BaziNode('yZ', '年支', zhiList[0], '支'),
            mG: new BaziNode('mG', '月干', ganList[1], '干'), mZ: new BaziNode('mZ', '月令', zhiList[1], '支'),
            dG: new BaziNode('dG', '日干', ganList[2], '干'),   dZ: new BaziNode('dZ', '日支', zhiList[2], '支'),
            hG: new BaziNode('hG', '时干', ganList[3], '干'), hZ: new BaziNode('hZ', '时支', zhiList[3], '支')
        };

        // 初始化纳音
        const nayinDict = {
            y: info.naYinList[0], m: info.naYinList[1], d: info.naYinList[2], h: info.naYinList[3]
        };

        // 执行V-Next流程
        processNaYinAndPhase(nodes, nayinDict, dayGan);
        processVoid(nodes, info.ec);
        processShenSha(nodes);
        applySeasonalBaseline(nodes, monthZhi);
        processVerticalInteractions(nodes);
        processStemInteractions(nodes);
        processCombinations(nodes);
        processBranchInteractions(nodes);
        processMediation(nodes);
        processFuyinFanyin(nodes);

        // 获取最终格局和强弱
        const result = evaluatePatternAndStrength(nodes, dayGan);
        return result;
    }

    // ================= 八字信息获取（整合优化）=================
    function getBaziInfo(solar, gender) {
        const lunar = solar.getLunar();
        const ec = lunar.getEightChar(); ec.setSect(2);
        const lunarMonth = Math.abs(lunar.getMonth());
        const yearGZ = ec.getYear(), monthGZ = ec.getMonth(), dayGZ = ec.getDay(), timeGZ = ec.getTime();
        const ganList = [yearGZ[0], monthGZ[0], dayGZ[0], timeGZ[0]];
        const zhiList = [yearGZ[1], monthGZ[1], dayGZ[1], timeGZ[1]];
        const dayGan = ganList[2], dayZhi = zhiList[2], nianZhi = zhiList[0];
        const shiShenGan = [ec.getYearShiShenGan(), ec.getMonthShiShenGan(), '日主', ec.getTimeShiShenGan()];
        const shiShenZhi = [ec.getYearShiShenZhi(), ec.getMonthShiShenZhi(), ec.getDayShiShenZhi(), ec.getTimeShiShenZhi()];
        const naYinList = [ec.getYearNaYin(), ec.getMonthNaYin(), ec.getDayNaYin(), ec.getTimeNaYin()];
        const hideGanList = [normalizeHideGan(ec.getYearHideGan()), normalizeHideGan(ec.getMonthHideGan()), normalizeHideGan(ec.getDayHideGan()), normalizeHideGan(ec.getTimeHideGan())];

        const monthZhi = zhiList[1];
        const monthHeInfo = getHeHuaEffect(monthZhi, zhiList);
        const effectiveMonthWx = monthHeInfo ? monthHeInfo.resultWx : zhiWuXing(monthZhi);

        // 使用V-Next的格局判断
        const vnextResult = selectYongShenVNext({ dayGan, zhiList, ganList, hideGanList, lunarMonth, yueZhi: monthZhi, effectiveMonthWx, ec, naYinList });

        const shensha = {
            yincha: YINCHA_YANGCUO.includes(dayGZ),
            guchen: zhiList.includes(getGuChen(nianZhi)),
            guasu: zhiList.includes(getGuaSu(nianZhi)),
            taohua: zhiList.includes(getXianChi(nianZhi)),
            taohuaZhi: getXianChi(nianZhi),
            hongyan: zhiList.includes(getHongYan(dayGan)),
            hongyanZhi: getHongYan(dayGan),
            liuxia: zhiList.includes(getLiuXia(dayGan)),
            liuxiaZhi: getLiuXia(dayGan),
            yangren: zhiList.includes(getYangRen(dayGan)),
            tianyi: getTianYi(dayGan),
            kuiGang: isKuiGang(dayGan, dayZhi)
        };

        let daYunList = [], qiYunAge = 0;
        try { 
            const yun = ec.getYun(gender, 2); 
            if (yun) { 
                qiYunAge = yun.getStartYear(); 
                const dy = yun.getDaYun(); 
                if (dy) daYunList = dy.map(d => d.getGanZhi()); 
            } 
        } catch (e) {}

        return { 
            solar, lunar, ec, yearGZ, monthGZ, dayGZ, timeGZ, 
            ganList, zhiList, dayGan, dayZhi, nianZhi, yueZhi: zhiList[1],
            shiShenGan, shiShenZhi, naYinList, hideGanList, 
            shensha, qiYunAge, daYunList, lunarMonth, shengXiao: lunar.getYearShengXiao(),
            pattern: { 
                strength: vnextResult.strength, 
                type: vnextResult.strength.includes('强') ? 'strong' : (vnextResult.strength.includes('弱') ? 'weak' : 'neutral'), 
                yongShen: vnextResult.yongShen 
            }
        };
    }

            '害:酉戌': '水', '害:子未': '木', '害:寅巳': '水', '害:丑午': '金', '害:卯辰': '火', '害:申亥': '木',

        MONTH_STRENGTH: {
            '寅':{'木':1.5,'火':1.2,'土':0.9,'金':0.7,'水':1.0},'卯':{'木':1.5,'火':1.1,'土':0.8,'金':0.6,'水':1.0},
            '辰':{'木':1.0,'火':1.0,'土':1.3,'金':1.0,'水':0.8},'巳':{'木':0.9,'火':1.5,'土':1.1,'金':0.9,'水':0.6},
            '午':{'木':0.8,'火':1.5,'土':1.2,'金':0.8,'水':0.5},'未':{'木':0.7,'火':1.3,'土':1.4,'金':0.9,'水':0.6},
            '申':{'木':0.8,'火':0.6,'土':0.9,'金':1.5,'水':1.2},'酉':{'木':0.7,'火':0.5,'土':0.8,'金':1.5,'水':1.1},
            '戌':{'木':0.8,'火':0.9,'土':1.3,'金':1.1,'水':0.7},'亥':{'木':1.1,'火':0.6,'土':0.7,'金':0.8,'水':1.5},
            '子':{'木':1.0,'火':0.5,'土':0.6,'金':0.7,'水':1.5},'丑':{'木':0.9,'火':0.6,'土':1.3,'金':1.0,'水':0.8}
        },
        computeWuxingPower(info, wx) {
            if (!wx) return 0;
            let power = 0;
            const coeff = this.MONTH_STRENGTH[info.yueZhi] || {};
            const mCoeff = coeff[wx] || 1.0;
            
            // 天干力量
            info.ganList.forEach(g => { 
                if (ganWuXing(g) === wx) {
                    // 考虑通根增强
                    const rootBonus = info.zhiList.filter(z => zhiWuXing(z) === wx).length * 0.5;
                    power += Math.round((3 + rootBonus) * mCoeff);
                }
            });
            
            // 地支力量
            info.zhiList.forEach(z => { 
                if (zhiWuXing(z) === wx) power += Math.round(5 * mCoeff); 
            });
            
            // 藏干力量
            info.hideGanList.forEach(hides => {
                hides.forEach(cg => { 
                    if (ganWuXing(cg) === wx) power += Math.round(1 * mCoeff); 
                });
            });
            
            return power;
        },
        evaluateConflict(manInfo, womanInfo, conflictType, zhi1, zhi2, baseScore) {
            const maxPenalty = Math.abs(baseScore);
            if (maxPenalty === 0) return { bonus: 0, reason: '' };
            
            const allZhi = [...manInfo.zhiList, ...womanInfo.zhiList];
            let recovered = 0, reasons = [];
            
            // 贪合忘冲/害
            const checkHe = (z) => { 
                for (let az of allZhi) { 
                    if (zhiLiuHe(z, az) || isZhiSanHe(z, az)) return { zhi: az, type: '合' }; 
                } 
                return null; 
            };
            
            [zhi1, zhi2].forEach(z => { 
                const he = checkHe(z); 
                if (he) { 
                    reasons.push(`【${he.zhi}】与【${z}】相合，贪合忘${conflictType}`); 
                    recovered += maxPenalty * 0.4; 
                } 
            });
            
            // 五行通关
            const key = `${conflictType}:${zhi1}${zhi2}`;
            const passWx = this.CONFLICT_MAP[key] || this.CONFLICT_MAP[`${conflictType}:${zhi2}${zhi1}`];
            
            if (passWx) {
                const manPower = this.computeWuxingPower(manInfo, passWx);
                const womanPower = this.computeWuxingPower(womanInfo, passWx);
                const totalPower = manPower + womanPower;
                
                // 检查通关五行是否为双方喜用
                const isManYong = manInfo.pattern.yongShen.primary.includes(passWx) || manInfo.pattern.yongShen.secondary.includes(passWx);
                const isWomanYong = womanInfo.pattern.yongShen.primary.includes(passWx) || womanInfo.pattern.yongShen.secondary.includes(passWx);
                
                if (totalPower >= 10 && (isManYong || isWomanYong)) {
                    recovered += maxPenalty * 0.3;
                    reasons.push(`${passWx}行通关有力且为喜用`);
                } else if (totalPower >= 10) {
                    recovered += maxPenalty * 0.15;
                    reasons.push(`${passWx}行通关但非喜用，化解有限`);
                }
            }
            
            recovered = Math.min(recovered, maxPenalty * 0.8);
            if (recovered > 0) return { 
                bonus: Math.round(recovered), 
                reason: `【智能化解】${[...new Set(reasons)].join('；')}。挽回 ${Math.round(recovered)} 分。` 
            };
            return { bonus: 0, reason: '' };
        }
    };

    // 大运同步分析
    function analyzeDaYun(m, w) {
        if (!m.daYunList.length || !w.daYunList.length) return [];
        const currentAge = (gender, solar) => { return new Date().getFullYear() - solar.getYear(); };
        const mAge = currentAge(1, m.solar), wAge = currentAge(0, w.solar);
        const getCurrentDaYunIndex = (age, qiYun) => Math.max(0, Math.floor((age - qiYun) / 10));
        const mIdx = getCurrentDaYunIndex(mAge, m.qiYunAge), wIdx = getCurrentDaYunIndex(wAge, w.qiYunAge);
        const maxIdx = Math.min(m.daYunList.length, w.daYunList.length) - 1;
        let syncScore = 0;
        for (let i = Math.max(0, mIdx-1); i <= Math.min(maxIdx, mIdx+1); i++) {
            const md = m.daYunList[i], wd = w.daYunList[i];
            if (!md || !wd) continue;
            if (tianGanHe(md[0], wd[0]) || zhiLiuHe(md[1], wd[1])) syncScore += 2;
            else if (zhiLiuChong(md[1], wd[1])) syncScore -= 2.5;
        }
        const final = Math.max(-6, Math.min(6, syncScore));
        if (Math.abs(final) < 1) return [];
        return [{ name: '当前大运同步', category:'structure', score: final, reason: final>0 ? '大运和谐' : '大运冲突，需注意' }];
    }

    // ================= 主计算 =================
    function computeHehun() {
        const mDate = document.getElementById('manDate').value, mShi = document.getElementById('manShichen').value;
        const wDate = document.getElementById('womanDate').value, wShi = document.getElementById('womanShichen').value;
        if (!mDate || !wDate) { alert('请填写双方出生日期'); return null; }
        const mTime = shichenToHourMinute(mShi), wTime = shichenToHourMinute(wShi);
        const [my, mm, md] = mDate.split('-').map(Number), [wy, wm, wd] = wDate.split('-').map(Number);
        const mSolar = Solar.fromYmdHms(my, mm, md, mTime.h, mTime.m, 0), wSolar = Solar.fromYmdHms(wy, wm, wd, wTime.h, wTime.m, 0);
        const mInfo = getBaziInfo(mSolar, 1), wInfo = getBaziInfo(wSolar, 0);
        
        let allItems = [
            ...analyzeNianZhu(mInfo, wInfo), 
            ...analyzeYueZhu(mInfo, wInfo), 
            ...analyzeRiZhu(mInfo, wInfo), 
            ...analyzeShiZhu(mInfo, wInfo),
            ...analyzePattern(mInfo, wInfo), 
            ...analyzeShensha(mInfo, wInfo), 
            ...analyzeTaoHua(mInfo, wInfo), // V5.1新增
            ...analyzeTenGod(mInfo, wInfo), 
            ...analyzeHardIssues(mInfo, wInfo),
            ...analyzeDaYun(mInfo, wInfo)  // V5.1新增
        ];
        
        let totalScore = 60, hasFatal = false;
        allItems.forEach(i => { totalScore += i.score; if (i.fatal) hasFatal = true; });
        totalScore = Math.max(0, Math.min(100, Math.round(totalScore)));
        
        let grade, gradeDesc;
        if (hasFatal) { grade='红线警示'; gradeDesc='存在绝对硬伤，建议慎重'; }
        else if (totalScore>=90) { grade='天作之合'; gradeDesc='上等婚配'; }
        else if (totalScore>=80) { grade='金玉良缘'; gradeDesc='良好婚配'; }
        else if (totalScore>=70) { grade='中平之合'; gradeDesc='中等婚配'; }
        else if (totalScore>=60) { grade='勉强可婚'; gradeDesc='需多包容'; }
        else { grade='婚配大忌'; gradeDesc='冲克过多'; }
        return { score: totalScore, grade, gradeDesc, manInfo: mInfo, womanInfo: wInfo, allItems, hasFatal };
    }

    // ================= 渲染函数 =================
    function renderBaziPan(info, title, gender) {
        const pillars = ['年柱','月柱','日柱','时柱'];
        let html = `<div class="bazi-pan"><div class="pan-title"><i class="fa-solid ${gender===1?'fa-mars':'fa-venus'}"></i> ${title} <span class="pattern-tag">${info.pattern.type==='strong'?'身强':(info.pattern.type==='weak'?'身弱':'中和')}</span></div>`;
        html += `<div class="shengxiao-name">${info.yearGZ}年 · ${info.shengXiao}</div>`;
        html += `<div class="yongshen-display"><strong>用神：</strong>${info.pattern.yongShen.primary.join('、')||'无'} · <strong>喜神：</strong>${info.pattern.yongShen.secondary.join('、')||'无'}</div><div class="pan-grid">`;
        for (let i=0;i<4;i++) {
            const hideStr = info.hideGanList[i].join('');
            html += `<div class="pillar ${i===2?'day-pillar':''}"><div class="pillar-title">${pillars[i]}</div><div class="tian-gan">${info.ganList[i]}</div><div class="di-zhi">${info.zhiList[i]}</div><div class="cang-gan"><span>藏 ${hideStr||'—'}</span></div><div class="nayin"><span>${info.naYinList[i]}</span></div><div style="font-size:0.7rem;color:#8d6e63">${info.shiShenGan[i]||'—'}</div></div>`;
        }
        return html + `</div></div>`;
    }

    function renderResult(data) {
        if (!data) return;
        const { score, grade, gradeDesc, manInfo, womanInfo, allItems, hasFatal } = data;
        const redItems = allItems.filter(i=>i.category==='redline');
        const structItems = allItems.filter(i=>i.category==='structure');
        const adjustItems = allItems.filter(i=>i.category==='adjustment');
        
        let html = `<div class="pan-container">${renderBaziPan(manInfo,'乾造',1)}${renderBaziPan(womanInfo,'坤造',0)}</div>`;
        html += `<div class="score-wrap"><div class="score-num">${score}</div><div class="score-meta"><span class="level-tag">${grade}</span><span class="grade-desc">${gradeDesc}</span></div></div>`;
        html += `<div class="layer-tags"><span class="layer-tag redline"><i class="fa-solid fa-triangle-exclamation"></i> 红线层 ±30</span><span class="layer-tag structure"><i class="fa-solid fa-scale-balanced"></i> 结构层 ±15</span><span class="layer-tag adjustment"><i class="fa-solid fa-sliders"></i> 调候层 ±5</span></div>`;
        
        if (redItems.length) {
            html += `<div class="fatal-box"><div style="font-weight:700;margin-bottom:12px"><i class="fa-solid fa-heart-crack"></i> 红线警示</div>`;
            redItems.forEach(i => {
                html += `<div class="fatal-item">${i.fatal?'<span style="color:#c62828">[致命]</span>':'<span style="color:#e65100">[严重]</span>'} <strong>${i.name}</strong>：${i.reason}</div>`;
                if (i.resolution) html += `<div class="resolution-text"><i class="fa-solid fa-wand-magic-sparkles"></i> ${i.resolutionText}</div>`;
            });
            html += `</div>`;
        }
        
        const goodStruct = structItems.filter(i=>i.score>0);
        if (goodStruct.length) {
            html += `<div class="structure-box"><div style="font-weight:700;color:#2e7d32"><i class="fa-solid fa-check-circle"></i> 格局优势</div>`;
            goodStruct.forEach(i => html += `<div class="structure-item">✓ <strong>${i.name}</strong>：${i.reason}</div>`);
            html += `</div>`;
        }
        
        // V5.1 改进：分类显示详情
        html += `<div class="analysis-category"><h3>核心要素分析</h3></div>`;
        html += `<div class="detail-grid">`;
        [...redItems, ...structItems].filter(i=>i.category!=='redline' || !i.fatal).sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).forEach(i => {
            const plus = i.score>0;
            html += `<div class="detail-card ${plus?'plus':'minus'}"><div class="detail-header"><span class="detail-label"><i class="fa-solid ${plus?'fa-plus-circle':'fa-minus-circle'}"></i> ${i.name}</span><span class="point ${plus?'plus':'minus'}">${plus?'+':''}${i.score}</span></div><div class="detail-text">${i.reason}</div></div>`;
        });
        html += `</div>`;
        
        html += `<div class="analysis-category"><h3>辅助要素分析</h3></div>`;
        html += `<div class="detail-grid">`;
        adjustItems.sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).forEach(i => {
            const plus = i.score>0;
            html += `<div class="detail-card ${plus?'plus':'minus'}"><div class="detail-header"><span class="detail-label"><i class="fa-solid ${plus?'fa-plus-circle':'fa-minus-circle'}"></i> ${i.name}</span><span class="point ${plus?'plus':'minus'}">${plus?'+':''}${i.score}</span></div><div class="detail-text">${i.reason}</div></div>`;
        });
        html += `</div>`;
        
        html += `<div class="advice-box"><h3><i class="fa-solid fa-user-doctor"></i> 月老建议</h3><ul>`;
        if (hasFatal) html += `<li><strong>核心建议：</strong>存在红线硬伤，若非情深义重，建议另择良缘。若执意婚配，需择吉日、多包容。</li>`;
        else if (score>=80) html += `<li><strong>核心建议：</strong>天作之合，彼此是对方的喜用神。</li>`;
        else if (score>=60) html += `<li><strong>核心建议：</strong>有缘分但需经营，建议婚前合八字选吉日。</li>`;
        else html += `<li><strong>核心建议：</strong>婚配阻力较大，需通过风水、职业调和。</li>`;
        const mYong = manInfo.pattern.yongShen.primary[0], wYong = womanInfo.pattern.yongShen.primary[0];
        if (mYong && wYong) html += `<li><strong>五行调理：</strong>男方宜用${WX_COLOR_MAP[mYong]}，女方宜用${WX_COLOR_MAP[wYong]}</li>`;
        html += `</ul></div>`;
        document.getElementById('resultArea').innerHTML = html;
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo({ top: document.getElementById('resultArea').offsetTop-20, behavior:'smooth' });
    }

    // ================= 启动 =================
    function checkLib() {
        if (typeof Solar === 'undefined') { document.getElementById('libError').style.display='block'; document.getElementById('calcBtn').disabled=true; return false; }
        document.getElementById('libError').style.display='none'; return true;
    }
    document.getElementById('calcBtn').addEventListener('click', function() {
        if (!checkLib()) return;
        const btn = this; btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 红线推演中...';
        setTimeout(() => {
            try { const res = computeHehun(); if (res) renderResult(res); }
            catch (e) { alert('计算错误：'+e.message); console.error(e); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-heart-pulse"></i> 开启红线·推演姻缘'; }
        }, 100);
    });
    setTimeout(checkLib, 1000);
})();
</script>
</body>
</html>
